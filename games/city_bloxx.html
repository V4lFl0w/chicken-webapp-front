<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>City Bloxx</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #4facfe; overflow: hidden; touch-action: none; font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; }
        canvas { display: block; }
        
        #backBtn {
            position: absolute; top: 15px; left: 15px;
            background: linear-gradient(to bottom, #ffcc00, #f39c12); color: #4a2511;
            border: 2px solid #fff; border-radius: 8px;
            padding: 8px 15px; font-weight: 900; font-size: 14px;
            z-index: 100; cursor: pointer; text-decoration: none; display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-transform: uppercase;
        }
        #backBtn:active { transform: translateY(2px); box-shadow: 0 2px 3px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <button id="backBtn" onclick="window.location.href='../index.html'">◀ В МЕНЮ</button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
        tg.setHeaderColor('#4facfe');

        const user = tg.initDataUnsafe?.user || { id: 12345, first_name: "Builder", username: "Guest" };
        const BACKEND_URL = "https://coral-app-jxzy5.ondigitalocean.app/game-api";

        let bankCoins = 0;       
        let bestScore = 0;       
        let nickname = user.username || user.first_name || "Строитель";

        async function loadUserData() {
            try {
                const res = await fetch(`${BACKEND_URL}/get_user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: user.id, username: nickname })
                });
                const data = await res.json();
                bankCoins = Number(data.coins) || 0;
            } catch(e) { console.error("Ошибка БД:", e); }
        }
        
        async function sendScoreToDatabase(finalScore, collectedCoins) {
            try {
                const res = await fetch(`${BACKEND_URL}/save_score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: user.id, username: nickname, score: 0, coins: collectedCoins }) 
                });
                const result = await res.json();
                bankCoins = Number(result.coins_total); 
            } catch (e) {}
        }

        loadUserData();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let audioCtx; const sfxBuffers = {};
        async function initWebAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            const loadBuffer = async (url, key) => {
                try {
                    const res = await fetch(url); const buf = await res.arrayBuffer();
                    sfxBuffers[key] = await audioCtx.decodeAudioData(buf);
                } catch (e) {}
            };
            await Promise.all([
                loadBuffer('https://coral-app-jxzy5.ondigitalocean.app/game/shoot.mp3', 'drop'), 
                loadBuffer('https://coral-app-jxzy5.ondigitalocean.app/game/boom.mp3', 'hit')    
            ]);
        }

        function playSFX(key, volumeLevel) {
            if (!audioCtx || !sfxBuffers[key]) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const source = audioCtx.createBufferSource(); source.buffer = sfxBuffers[key];
            const gainNode = audioCtx.createGain(); gainNode.gain.value = volumeLevel; 
            source.connect(gainNode); gainNode.connect(audioCtx.destination); source.start(0);
        }

        // --- ПЕРЕМЕННЫЕ ИГРЫ ---
        let gameState = 'MENU'; 
        let score = 0; let population = 0; let combo = 0; let sessionCoins = 0; let lives = 3;

        const blockW = 90; const blockH = 65;
        let blocks = []; 
        let activeBlock = null; 

        let cameraY = 0; let targetCameraY = 0;
        let shakeTime = 0;

        // ФИЗИКА МАЯТНИКА (ТЕПЕРЬ ПЛАВНАЯ)
        let ropeLength = 180;
        let craneTick = 0;
        let craneSpeed = 0.035; // Очень плавная базовая скорость
        let maxAngle = Math.PI / 3.5; // Максимальный угол отклонения

        let particles = []; let floatTexts = [];
        let bgBuildings = []; // Город на фоне

        // Генерация заднего фона
        for(let i=0; i<15; i++) {
            bgBuildings.push({
                x: Math.random() * canvas.width, width: 40 + Math.random() * 60,
                height: 100 + Math.random() * 300, color: `rgba(20, 40, 60, ${0.1 + Math.random()*0.15})`,
                speedOffset: 0.2 + Math.random() * 0.3
            });
        }

        function createFloatText(x, y, text, color, size = 20) {
            floatTexts.push({ x: x, y: y, text: text, color: color, life: 1.0, size: size, vy: -1.5 });
        }

        function createConfetti(x, y, isPerfect) {
            playSFX('hit', 0.15);
            shakeTime = isPerfect ? 10 : 5; // Тряска экрана
            const colors = isPerfect ? ['#ffcc00', '#fff', '#ffff99'] : ['#ccc', '#888'];
            for (let i = 0; i < (isPerfect ? 25 : 10); i++) {
                particles.push({
                    x: x + (Math.random() - 0.5) * blockW, y: y + h/2,
                    vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8 - 2,
                    life: 1.0, decay: 0.02 + Math.random() * 0.02,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: Math.random() * (isPerfect ? 6 : 4) + 2
                });
            }
        }

        function resetGame() {
            score = 0; population = 0; combo = 0; sessionCoins = 0; lives = 3;
            blocks = []; cameraY = 0; targetCameraY = 0; craneTick = 0; craneSpeed = 0.035;
            
            blocks.push({ x: canvas.width / 2, y: canvas.height - 30, w: blockW + 30, h: 60, type: 'base', isPerfect: false });
            
            spawnBlock();
            gameState = 'PLAYING';
            document.getElementById('backBtn').style.display = 'none';
        }

        function spawnBlock() {
            activeBlock = { x: canvas.width / 2, y: -50, w: blockW, h: blockH, isDropping: false, vy: 0, type: 'normal' };
        }

        // КРАСИВАЯ ОТРИСОВКА БЛОКА
        function drawBlock(ctx, x, y, w, h, type, isPerfect) {
            ctx.save(); ctx.translate(x, y);
            
            if (type === 'base') {
                // Фундамент
                let grad = ctx.createLinearGradient(0, -h/2, 0, h/2);
                grad.addColorStop(0, '#555'); grad.addColorStop(1, '#222');
                ctx.fillStyle = grad; ctx.fillRect(-w/2, -h/2, w, h);
                ctx.fillStyle = '#111'; ctx.fillRect(-w/2, -h/2, w, 8); // бордюр
            } else {
                // Основной блок (красный кирпич, градиент)
                let grad = ctx.createLinearGradient(-w/2, 0, w/2, 0);
                grad.addColorStop(0, '#d35400'); grad.addColorStop(0.5, '#e74c3c'); grad.addColorStop(1, '#c0392b');
                
                // Тень снизу
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(-w/2 + 4, -h/2 + 4, w, h);
                
                ctx.fillStyle = grad; ctx.fillRect(-w/2, -h/2, w, h);
                
                // Белый карниз (Крыша)
                ctx.fillStyle = '#ecf0f1'; ctx.fillRect(-w/2 - 4, -h/2, w + 8, 8);
                ctx.fillStyle = '#bdc3c7'; ctx.fillRect(-w/2 - 4, -h/2 + 8, w + 8, 3); // тень карниза

                // Окна (Голубые с бликами)
                for(let i=-1; i<=1; i++) {
                    let wx = i * 26 - 10; let wy = -h/2 + 20;
                    ctx.fillStyle = '#3498db'; ctx.fillRect(wx, wy, 20, 30); // Стекло
                    ctx.fillStyle = '#2980b9'; ctx.fillRect(wx, wy, 20, 4);  // Тень внутри рамы
                    
                    // Блик
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.beginPath(); ctx.moveTo(wx, wy+10); ctx.lineTo(wx+10, wy); ctx.lineTo(wx+20, wy); ctx.lineTo(wx, wy+20); ctx.fill();
                    
                    // Рама
                    ctx.strokeStyle = '#ecf0f1'; ctx.lineWidth = 2; ctx.strokeRect(wx, wy, 20, 30);
                    ctx.fillRect(wx + 9, wy, 2, 30); // перекладина
                }

                // Свечение при комбо/перфекте
                if (isPerfect) {
                    ctx.shadowBlur = 20; ctx.shadowColor = '#ffcc00';
                    ctx.strokeStyle = 'rgba(255, 204, 0, 0.8)'; ctx.lineWidth = 3;
                    ctx.strokeRect(-w/2, -h/2, w, h);
                    ctx.shadowBlur = 0;
                }
            }
            ctx.restore();
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            cameraY += (targetCameraY - cameraY) * 0.08; // Плавная камера
            if (shakeTime > 0) shakeTime--;

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }

            for (let i = floatTexts.length - 1; i >= 0; i--) {
                let ft = floatTexts[i]; ft.y += ft.vy; ft.life -= 0.02;
                if (ft.life <= 0) floatTexts.splice(i, 1);
            }

            if (activeBlock) {
                if (!activeBlock.isDropping) {
                    // ПЛАВНАЯ ФИЗИКА
                    craneTick += craneSpeed;
                    let angle = Math.sin(craneTick) * maxAngle;
                    
                    let pivotX = canvas.width / 2;
                    let pivotY = cameraY - 50; 
                    
                    activeBlock.x = pivotX + Math.sin(angle) * ropeLength;
                    activeBlock.y = pivotY + Math.cos(angle) * ropeLength; 
                } else {
                    activeBlock.vy += 0.8; // Гравитация
                    activeBlock.y += activeBlock.vy;

                    let topBlock = blocks[blocks.length - 1];

                    // СТОЛКНОВЕНИЕ
                    if (activeBlock.y + activeBlock.h / 2 >= topBlock.y - topBlock.h / 2) {
                        let distance = Math.abs(activeBlock.x - topBlock.x);
                        
                        if (distance < activeBlock.w / 2 + 15) {
                            // ПОПАЛ
                            let isPerfect = false;
                            let addedPop = 0;

                            if (distance <= 12) { // PERFECT
                                activeBlock.x = topBlock.x; 
                                isPerfect = true; combo++;
                                addedPop = 30 + (combo * 5); score += 50 * combo;
                                createFloatText(activeBlock.x, activeBlock.y - 40, `PERFECT! +${addedPop} 👨‍👩‍👧`, '#ffcc00', 26);
                            } else if (distance <= 25) { // GOOD
                                combo = 0; addedPop = 15; score += 20;
                                createFloatText(activeBlock.x, activeBlock.y - 40, `GOOD! +${addedPop} 👨‍👩‍👧`, '#00ffcc', 22);
                            } else { // OKAY (КРИВО)
                                combo = 0; addedPop = 5; score += 10;
                                createFloatText(activeBlock.x, activeBlock.y - 40, `OKAY +${addedPop} 👨‍👩‍👧`, '#ffffff', 18);
                            }

                            population += addedPop;
                            activeBlock.y = topBlock.y - blockH;
                            activeBlock.isPerfect = isPerfect;
                            blocks.push(activeBlock);
                            createConfetti(activeBlock.x, activeBlock.y, isPerfect);
                            
                            // ЭКОНОМИКА ХАБА: Каждые 3 этажа даем монеты
                            if (blocks.length % 3 === 0) {
                                let reward = isPerfect ? 5 : 2;
                                sessionCoins += reward;
                                createFloatText(activeBlock.x + 60, activeBlock.y - 20, `+${reward} 🪙`, '#ffcc00', 20);
                            }

                            targetCameraY -= blockH;
                            craneSpeed = Math.min(0.06, craneSpeed + 0.0005); // Плавное усложнение
                            spawnBlock();

                        } else {
                            // ПРОМАХ
                            combo = 0; playSFX('hit', 0.2); lives--; shakeTime = 15;
                            createFloatText(activeBlock.x, activeBlock.y, "ПРОМАХ!", '#ff3366', 28);
                            
                            if (lives <= 0) {
                                gameState = 'GAME_OVER'; document.getElementById('backBtn').style.display = 'block';
                                sendScoreToDatabase(score, sessionCoins);
                            } else { spawnBlock(); }
                        }
                    }

                    if (activeBlock && activeBlock.y > cameraY + canvas.height + 100) {
                        combo = 0; lives--; shakeTime = 15;
                        createFloatText(canvas.width/2, cameraY + canvas.height/2, "УПАЛ!", '#ff3366', 28);
                        if (lives <= 0) {
                            gameState = 'GAME_OVER'; document.getElementById('backBtn').style.display = 'block';
                            sendScoreToDatabase(score, sessionCoins);
                        } else { spawnBlock(); }
                    }
                }
            }
        }

        function draw() {
            // ДИНАМИЧЕСКИЙ ФОН (Зависит от высоты)
            let heightFactor = Math.min(1, blocks.length / 60);
            let skyR = Math.max(10, 79 - heightFactor * 70);
            let skyG = Math.max(20, 172 - heightFactor * 150);
            let skyB = Math.max(40, 254 - heightFactor * 200);
            
            let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, `rgb(${skyR}, ${skyG}, ${skyB})`);
            grad.addColorStop(1, `rgb(${skyR+40}, ${skyG+40}, ${skyB+20})`);
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ПАРАЛЛАКС ГОРОДА НА ФОНЕ
            bgBuildings.forEach(bg => {
                let bgY = canvas.height - bg.height + (cameraY * bg.speedOffset);
                if (bgY < canvas.height) { // Рисуем только если видно
                    ctx.fillStyle = bg.color;
                    ctx.fillRect(bg.x, bgY, bg.width, canvas.height - bgY);
                }
            });

            let shakeX = 0; let shakeY = 0;
            if (shakeTime > 0) {
                shakeX = (Math.random() - 0.5) * 10; shakeY = (Math.random() - 0.5) * 10;
            }

            if (gameState === 'MENU') {
                ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; 
                ctx.font = 'bold 50px Trebuchet MS';
                ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.fillText('CITY BLOXX', canvas.width / 2, canvas.height / 3);
                ctx.shadowBlur = 0;

                ctx.font = '16px Trebuchet MS'; ctx.fillStyle = '#e0f7fa';
                ctx.fillText('Построй самый высокий небоскреб!', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.globalAlpha = Math.abs(Math.sin(Date.now() / 300));
                ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 28px Trebuchet MS';
                ctx.fillText('>>> ТАПНИ ДЛЯ СТАРТА <<<', canvas.width / 2, canvas.height / 2 + 60);
                ctx.globalAlpha = 1.0;
                
                document.getElementById('backBtn').style.display = 'block';
                requestAnimationFrame(draw); return;
            }

            // --- МИР ---
            ctx.save(); ctx.translate(shakeX, -cameraY + shakeY);

            // Трос крана
            if (activeBlock && !activeBlock.isDropping) {
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, cameraY - 50); 
                ctx.lineTo(activeBlock.x, activeBlock.y - activeBlock.h/2);
                ctx.strokeStyle = '#34495e'; ctx.lineWidth = 4; ctx.stroke();
                
                // Каретка крана
                ctx.fillStyle = '#f1c40f'; ctx.fillRect(canvas.width/2 - 20, cameraY - 60, 40, 20);
            }

            // Построенные блоки
            blocks.forEach(b => drawBlock(ctx, b.x, b.y, b.w, b.h, b.type, b.isPerfect));

            // Падающий блок
            if (activeBlock) drawBlock(ctx, activeBlock.x, activeBlock.y, activeBlock.w, activeBlock.h, activeBlock.type, false);

            particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life); ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); });
            ctx.globalAlpha = 1.0;

            floatTexts.forEach(ft => {
                ctx.fillStyle = ft.color; ctx.globalAlpha = Math.max(0, ft.life);
                ctx.font = `bold ${ft.size}px Trebuchet MS`; ctx.textAlign = 'center';
                ctx.shadowBlur = 4; ctx.shadowColor = '#000';
                ctx.fillText(ft.text, ft.x, ft.y); ctx.shadowBlur = 0;
            });
            ctx.globalAlpha = 1.0;

            ctx.restore();
            // --- КОНЕЦ МИРА ---

            // --- КРАСИВЫЙ UI ПОВЕРХ ---
            // Панель статуса сверху
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, canvas.width, 50);

            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 18px Trebuchet MS'; ctx.textAlign = 'left';
            ctx.fillText(`👥 ${population}`, 15, 32);
            
            if (combo > 1) { ctx.fillStyle = '#ffcc00'; ctx.fillText(`🔥 КОМБО x${combo}`, 120, 32); }

            ctx.fillStyle = '#ffcc00'; ctx.textAlign = 'right';
            ctx.fillText(`🪙 ${bankCoins + sessionCoins}`, canvas.width - 15, 32);

            // Сердца под панелью
            ctx.textAlign = 'right'; ctx.font = '22px Arial';
            ctx.fillText('❤️'.repeat(Math.max(0, lives)), canvas.width - 15, 80);

            // ИНДИКАТОР ПРОГРЕССА СЛЕВА (Шкала)
            let maxTarget = 50; 
            let currentF = blocks.length - 1;
            let barH = 200; let barW = 12; let barX = 15; let barY = 100;
            
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(barX, barY, barW, barH); // Фон шкалы
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(barX, barY, barW, barH); // Рамка
            
            let fillH = Math.min(1, currentF / maxTarget) * barH;
            let gradBar = ctx.createLinearGradient(0, barY + barH, 0, barY);
            gradBar.addColorStop(0, '#e74c3c'); gradBar.addColorStop(0.5, '#f1c40f'); gradBar.addColorStop(1, '#2ecc71');
            ctx.fillStyle = gradBar;
            ctx.fillRect(barX, barY + barH - fillH, barW, fillH); // Заливка

            ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Trebuchet MS'; ctx.textAlign = 'center';
            ctx.fillText(`${currentF} ЭТ.`, barX + barW/2, barY - 10);

            if (gameState === 'GAME_OVER') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height); 
                ctx.fillStyle = '#e74c3c'; ctx.textAlign = 'center'; ctx.font = 'bold 50px Trebuchet MS'; 
                ctx.fillText('СТРОЙКА ОКОНЧЕНА', canvas.width / 2, canvas.height / 2 - 60); 
                
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 24px Trebuchet MS'; 
                ctx.fillText(`Построено: ${blocks.length - 1} этажей`, canvas.width / 2, canvas.height / 2); 
                ctx.fillText(`Население: ${population} 👥`, canvas.width / 2, canvas.height / 2 + 40); 
                
                ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 28px Trebuchet MS'; 
                ctx.fillText(`Заработано: +${sessionCoins} 🪙`, canvas.width / 2, canvas.height / 2 + 100); 
                
                ctx.font = '18px Trebuchet MS'; ctx.fillStyle = '#00ffcc'; 
                ctx.fillText('Тапни, чтобы начать заново', canvas.width / 2, canvas.height / 2 + 160);
            }

            update(); requestAnimationFrame(draw);
        }

        window.addEventListener('touchstart', (e) => {
            initWebAudio();
            if (e.target.id === 'backBtn') return;

            if (gameState === 'MENU' || gameState === 'GAME_OVER') { resetGame(); return; }
            if (gameState === 'PLAYING' && activeBlock && !activeBlock.isDropping) {
                activeBlock.isDropping = true; playSFX('drop', 0.1);
            }
        }, { passive: false });

        draw(); tg.ready();
    </script>
</body>
</html>
