<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>City Bloxx</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #87CEEB; overflow: hidden; touch-action: none; font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; }
        canvas { display: block; }
        
        #backBtn {
            position: absolute; top: 15px; left: 15px;
            background: linear-gradient(to bottom, #ffcc00, #f39c12); color: #4a2511;
            border: 2px solid #fff; border-radius: 12px;
            padding: 10px 18px; font-weight: 900; font-size: 14px;
            z-index: 100; cursor: pointer; display: none;
            box-shadow: 0 6px 0 #b8730b, 0 10px 15px rgba(0,0,0,0.3); 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.1s;
        }
        #backBtn:active { transform: translateY(6px); box-shadow: 0 0 0 #b8730b, 0 4px 6px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <button id="backBtn" onclick="window.location.href='../index.html'">◀ В МЕНЮ</button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
        tg.setHeaderColor('#87CEEB');

        const user = tg.initDataUnsafe?.user || { id: 12345, first_name: "Builder", username: "Guest" };
        const BACKEND_URL = "https://coral-app-jxzy5.ondigitalocean.app/game-api";

        let bankCoins = 0;       
        let bestScore = 0;       
        let nickname = user.username || user.first_name || "Строитель";

        async function loadUserData() {
            try {
                const res = await fetch(`${BACKEND_URL}/get_user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: user.id, username: nickname })
                });
                const data = await res.json();
                bankCoins = Number(data.coins) || 0;
            } catch(e) { console.error("Ошибка БД:", e); }
        }
        
        async function sendScoreToDatabase(finalScore, collectedCoins) {
            try {
                const res = await fetch(`${BACKEND_URL}/save_score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: user.id, username: nickname, score: 0, coins: collectedCoins }) 
                });
                const result = await res.json();
                bankCoins = Number(result.coins_total); 
            } catch (e) {}
        }

        loadUserData();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let audioCtx; const sfxBuffers = {};
        async function initWebAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            const loadBuffer = async (url, key) => {
                try {
                    const res = await fetch(url); const buf = await res.arrayBuffer();
                    sfxBuffers[key] = await audioCtx.decodeAudioData(buf);
                } catch (e) {}
            };
            await Promise.all([
                loadBuffer('https://coral-app-jxzy5.ondigitalocean.app/game/shoot.mp3', 'drop'), 
                loadBuffer('https://coral-app-jxzy5.ondigitalocean.app/game/boom.mp3', 'hit')    
            ]);
        }

        function playSFX(key, volumeLevel) {
            if (!audioCtx || !sfxBuffers[key]) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const source = audioCtx.createBufferSource(); source.buffer = sfxBuffers[key];
            const gainNode = audioCtx.createGain(); gainNode.gain.value = volumeLevel; 
            source.connect(gainNode); gainNode.connect(audioCtx.destination); source.start(0);
        }

        // --- ПЕРЕМЕННЫЕ ИГРЫ ---
        let gameState = 'MENU'; 
        let score = 0; let population = 0; let combo = 0; let sessionCoins = 0; let lives = 3;

        const blockW = 100; const blockH = 75;
        let blocks = []; 
        let activeBlock = null; 
        let fallingBlocks = []; // Для промахнувшихся блоков (чтобы игра не висла)
        let spawnDelay = 0; // Задержка появления нового блока

        let cameraY = 0; let targetCameraY = 0;
        let shakeTime = 0;
        let towerSquish = 0; // Пружинящий эффект башни

        // ФИЗИКА
        let ropeLength = 200;
        let craneTick = 0;
        let craneSpeed = 0.035;
        let maxAngle = Math.PI / 3.2; 

        let particles = []; let floatTexts = [];
        let bgLayers = { back: [], mid: [], front: [], clouds: [] };

        // ГЕНЕРАЦИЯ ЖИВОГО ФОНА
        function initBackground() {
            bgLayers = { back: [], mid: [], front: [], clouds: [] };
            for(let i=0; i<10; i++) bgLayers.back.push({ x: Math.random()*canvas.width, w: 60+Math.random()*60, h: 200+Math.random()*300, offset: 0.1 });
            for(let i=0; i<8; i++) bgLayers.mid.push({ x: Math.random()*canvas.width, w: 70+Math.random()*70, h: 100+Math.random()*200, offset: 0.3 });
            for(let i=0; i<6; i++) bgLayers.front.push({ x: Math.random()*canvas.width, w: 80+Math.random()*80, h: 50+Math.random()*150, offset: 0.6 });
            for(let i=0; i<8; i++) bgLayers.clouds.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height/2, speed: 0.2+Math.random()*0.5, size: 30+Math.random()*40, op: 0.3+Math.random()*0.3 });
        }
        initBackground();

        function createFloatText(x, y, text, color, size = 20) {
            floatTexts.push({ x: x, y: y, text: text, color: color, life: 1.0, size: size, vy: -2 });
        }

        function createConfetti(x, y, isPerfect) {
            playSFX('hit', 0.15);
            shakeTime = isPerfect ? 12 : 5; 
            towerSquish = isPerfect ? 20 : 8; // Пружина! Башня сжимается на 20px
            const colors = isPerfect ? ['#ffcc00', '#fff', '#00ffcc'] : ['#ccc', '#888'];
            for (let i = 0; i < (isPerfect ? 30 : 10); i++) {
                particles.push({
                    x: x + (Math.random() - 0.5) * blockW, y: y + blockH/2,
                    vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10 - 3,
                    life: 1.0, decay: 0.02 + Math.random() * 0.02,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: Math.random() * (isPerfect ? 8 : 4) + 2
                });
            }
        }

        function resetGame() {
            score = 0; population = 0; combo = 0; sessionCoins = 0; lives = 3;
            blocks = []; fallingBlocks = []; floatTexts = []; particles = [];
            cameraY = 0; targetCameraY = 0; craneTick = 0; craneSpeed = 0.035; spawnDelay = 0;
            
            blocks.push({ x: canvas.width / 2, y: canvas.height - 30, w: blockW + 40, h: 80, type: 'base', isPerfect: false });
            
            spawnBlock();
            gameState = 'PLAYING';
            document.getElementById('backBtn').style.display = 'none';
        }

        function spawnBlock() {
            activeBlock = { x: canvas.width / 2, y: -50, w: blockW, h: blockH, isDropping: false, vy: 0, type: 'normal', angle: 0 };
        }

        // КРАСИВЫЙ РЕНДЕР БЛОКОВ
        function drawBlock(ctx, block, isFalling) {
            ctx.save(); 
            ctx.translate(block.x, block.y);
            if (isFalling) ctx.rotate(block.angle); // Вращение при падении
            
            let w = block.w; let h = block.h;

            if (block.type === 'base') {
                ctx.fillStyle = '#2c3e50'; ctx.fillRect(-w/2, -h/2, w, h);
                ctx.fillStyle = '#1a252f'; ctx.fillRect(-w/2, -h/2, w, 15);
                ctx.fillStyle = '#e67e22'; ctx.fillRect(-w/4, -h/2+15, w/2, h); // Входная дверь
            } else {
                // Основной цвет (зависит от комбо)
                let hue = block.isPerfect ? 40 : 5; // Золотой или Красный
                let grad = ctx.createLinearGradient(-w/2, -h/2, w/2, h/2);
                grad.addColorStop(0, `hsl(${hue}, 80%, 60%)`);
                grad.addColorStop(1, `hsl(${hue}, 80%, 40%)`);
                
                // Тень блока
                ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(-w/2 + 6, -h/2 + 6, w, h);
                
                ctx.fillStyle = grad; ctx.fillRect(-w/2, -h/2, w, h);
                
                // Карниз (Псевдо 3D)
                ctx.fillStyle = '#f5f6fa'; ctx.fillRect(-w/2 - 6, -h/2, w + 12, 10);
                ctx.fillStyle = '#dcdde1'; ctx.fillRect(-w/2 - 6, -h/2 + 10, w + 12, 4);

                // Окна
                for(let i=-1; i<=1; i++) {
                    let wx = i * 28 - 12; let wy = -h/2 + 25;
                    ctx.fillStyle = block.isPerfect ? '#f1c40f' : '#34e7e4'; // Свет горит, если перфект
                    ctx.fillRect(wx, wy, 24, 35);
                    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(wx, wy, 24, 5); // Тень в раме
                    
                    // Блик стекла
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.beginPath(); ctx.moveTo(wx, wy+15); ctx.lineTo(wx+15, wy); ctx.lineTo(wx+24, wy); ctx.lineTo(wx, wy+24); ctx.fill();
                    
                    // Белая рама
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(wx, wy, 24, 35);
                    ctx.fillRect(wx + 11, wy, 2, 35); 
                }

                if (block.isPerfect) {
                    ctx.shadowBlur = 25; ctx.shadowColor = '#ffcc00';
                    ctx.strokeStyle = 'rgba(255, 204, 0, 0.9)'; ctx.lineWidth = 3;
                    ctx.strokeRect(-w/2, -h/2, w, h); ctx.shadowBlur = 0;
                }
            }
            ctx.restore();
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // Пружина башни (возвращается в 0)
            towerSquish += (0 - towerSquish) * 0.15;
            
            // Плавная камера
            cameraY += (targetCameraY - cameraY) * 0.08; 
            if (shakeTime > 0) shakeTime--;

            // Облака
            bgLayers.clouds.forEach(c => { c.x += c.speed; if(c.x > canvas.width + c.size) c.x = -c.size; });

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }

            for (let i = floatTexts.length - 1; i >= 0; i--) {
                let ft = floatTexts[i]; ft.y += ft.vy; ft.life -= 0.015;
                if (ft.life <= 0) floatTexts.splice(i, 1);
            }

            // Логика задержки спавна (решает проблему "зависания")
            if (spawnDelay > 0) {
                spawnDelay--;
                if (spawnDelay <= 0 && lives > 0) spawnBlock();
            }

            // Логика блоков, которые промазали и падают
            for (let i = fallingBlocks.length - 1; i >= 0; i--) {
                let b = fallingBlocks[i];
                b.vy += 0.8; b.y += b.vy; b.x += b.vx; b.angle += b.va;
                if (b.y > cameraY + canvas.height + 100) fallingBlocks.splice(i, 1); // Удаляем, когда упал за экран
            }

            if (activeBlock) {
                if (!activeBlock.isDropping) {
                    craneTick += craneSpeed;
                    let angle = Math.sin(craneTick) * maxAngle;
                    let pivotX = canvas.width / 2; let pivotY = cameraY - 50; 
                    
                    activeBlock.x = pivotX + Math.sin(angle) * ropeLength;
                    activeBlock.y = pivotY + Math.cos(angle) * ropeLength; 
                } else {
                    activeBlock.vy += 0.9; // Мощная гравитация
                    activeBlock.y += activeBlock.vy;

                    let topBlock = blocks[blocks.length - 1];

                    // СТОЛКНОВЕНИЕ С ВЕРХНИМ БЛОКОМ
                    if (activeBlock.y + activeBlock.h / 2 >= topBlock.y - topBlock.h / 2) {
                        let distance = Math.abs(activeBlock.x - topBlock.x);
                        
                        if (distance < activeBlock.w / 2 + 20) {
                            // ПОПАЛ НА БАШНЮ
                            let isPerfect = false; let addedPop = 0;

                            if (distance <= 15) { // PERFECT
                                activeBlock.x = topBlock.x; isPerfect = true; combo++;
                                addedPop = 30 + (combo * 5); score += 50 * combo;
                                createFloatText(activeBlock.x, activeBlock.y - 50, `PERFECT! +${addedPop} 👨‍👩‍👧`, '#ffcc00', 30);
                            } else if (distance <= 35) { // GOOD
                                combo = 0; addedPop = 15; score += 20;
                                createFloatText(activeBlock.x, activeBlock.y - 50, `GOOD! +${addedPop} 👨‍👩‍👧`, '#00ffcc', 24);
                            } else { // OKAY (КРИВО)
                                combo = 0; addedPop = 5; score += 10;
                                createFloatText(activeBlock.x, activeBlock.y - 50, `OKAY +${addedPop}`, '#ffffff', 20);
                            }

                            population += addedPop;
                            activeBlock.y = topBlock.y - blockH;
                            activeBlock.isPerfect = isPerfect;
                            blocks.push(activeBlock);
                            createConfetti(activeBlock.x, activeBlock.y, isPerfect);
                            
                            // Экономика
                            if (blocks.length % 3 === 0) {
                                let reward = isPerfect ? 5 : 2; sessionCoins += reward;
                                createFloatText(activeBlock.x + 80, activeBlock.y - 20, `+${reward} 🪙`, '#ffcc00', 22);
                            }

                            targetCameraY -= blockH;
                            craneSpeed = Math.min(0.065, craneSpeed + 0.0008); 
                            
                            activeBlock = null;
                            spawnDelay = 20; // Пауза перед новым блоком

                        } else {
                            // ПРОМАХ (задел край)
                            combo = 0; playSFX('hit', 0.2); lives--; shakeTime = 20;
                            createFloatText(activeBlock.x, activeBlock.y, "ПРОМАХ!", '#ff3366', 32);
                            
                            // Превращаем блок в падающий объект с физикой вращения
                            activeBlock.vx = (activeBlock.x > topBlock.x) ? 3 : -3; 
                            activeBlock.va = (activeBlock.x > topBlock.x) ? 0.1 : -0.1;
                            fallingBlocks.push(activeBlock);
                            activeBlock = null;

                            if (lives <= 0) {
                                gameState = 'GAME_OVER'; document.getElementById('backBtn').style.display = 'block';
                                sendScoreToDatabase(score, sessionCoins);
                            } else { spawnDelay = 40; } // Ждем дольше при промахе
                        }
                    }

                    // ЕСЛИ УПАЛ ВООБЩЕ МИМО (не задев башню)
                    else if (activeBlock && activeBlock.y > cameraY + canvas.height + 100) {
                        combo = 0; lives--; shakeTime = 20;
                        createFloatText(canvas.width/2, cameraY + canvas.height/2, "УПАЛ!", '#ff3366', 32);
                        activeBlock = null;
                        if (lives <= 0) {
                            gameState = 'GAME_OVER'; document.getElementById('backBtn').style.display = 'block';
                            sendScoreToDatabase(score, sessionCoins);
                        } else { spawnDelay = 40; }
                    }
                }
            }
        }

        function draw() {
            // СОЧНЫЙ ФОН: Небо темнеет
            let heightFactor = Math.min(1, blocks.length / 50);
            let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, `rgb(${Math.max(10, 135 - heightFactor * 100)}, ${Math.max(20, 206 - heightFactor * 150)}, ${Math.max(50, 235 - heightFactor * 150)})`);
            grad.addColorStop(1, `rgb(${Math.max(50, 175 - heightFactor * 80)}, ${Math.max(100, 226 - heightFactor * 100)}, ${Math.max(150, 255 - heightFactor * 50)})`);
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Солнце/Луна
            ctx.fillStyle = heightFactor > 0.5 ? '#f1c40f' : '#ffeba3';
            ctx.beginPath(); ctx.arc(canvas.width - 80, 150 + cameraY * 0.05, 50, 0, Math.PI*2); ctx.fill();

            // Облака
            ctx.fillStyle = '#fff';
            bgLayers.clouds.forEach(c => {
                ctx.globalAlpha = c.op; ctx.beginPath(); ctx.arc(c.x, c.y + cameraY*0.1, c.size, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(c.x + c.size*0.8, c.y + cameraY*0.1 + c.size*0.2, c.size*0.8, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // Город (Параллакс)
            const drawCityLayer = (layer, colorHex) => {
                ctx.fillStyle = colorHex;
                layer.forEach(bg => {
                    let bgY = canvas.height - bg.h + (cameraY * bg.offset);
                    if (bgY < canvas.height) ctx.fillRect(bg.x, bgY, bg.w, canvas.height - bgY);
                });
            };
            drawCityLayer(bgLayers.back, 'rgba(44, 62, 80, 0.2)');
            drawCityLayer(bgLayers.mid, 'rgba(52, 73, 94, 0.4)');
            drawCityLayer(bgLayers.front, 'rgba(44, 62, 80, 0.7)');

            let shakeX = 0; let shakeY = 0;
            if (shakeTime > 0) { shakeX = (Math.random() - 0.5) * 15; shakeY = (Math.random() - 0.5) * 15; }

            if (gameState === 'MENU') {
                ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; 
                ctx.font = '900 56px Trebuchet MS'; ctx.shadowBlur = 15; ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.fillText('CITY BLOXX', canvas.width / 2, canvas.height / 3); ctx.shadowBlur = 0;
                
                ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 22px Trebuchet MS';
                ctx.fillText('>>> ТАПНИ ДЛЯ СТАРТА <<<', canvas.width / 2, canvas.height / 2 + 50);
                
                document.getElementById('backBtn').style.display = 'block';
                requestAnimationFrame(draw); return;
            }

            // --- МИР ---
            ctx.save(); 
            // Пружина башни добавляется к камере!
            ctx.translate(shakeX, -cameraY + shakeY + towerSquish);

            // Кран
            if (activeBlock && !activeBlock.isDropping) {
                let pivotX = canvas.width / 2; let pivotY = cameraY - 50;
                
                // Трос
                ctx.beginPath(); ctx.moveTo(pivotX, pivotY); ctx.lineTo(activeBlock.x, activeBlock.y - activeBlock.h/2);
                ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 4; ctx.stroke();
                
                // Крюк/Держатель
                ctx.fillStyle = '#f1c40f'; 
                ctx.fillRect(activeBlock.x - 25, activeBlock.y - activeBlock.h/2 - 10, 50, 10);
            }

            // Башня
            blocks.forEach(b => drawBlock(ctx, b, false));
            // Падающий блок
            if (activeBlock) drawBlock(ctx, activeBlock, false);
            // Промахнувшиеся блоки (летят вниз)
            fallingBlocks.forEach(b => drawBlock(ctx, b, true));

            // Эффекты
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life); ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); });
            ctx.globalAlpha = 1.0;
            
            floatTexts.forEach(ft => {
                ctx.fillStyle = ft.color; ctx.globalAlpha = Math.max(0, ft.life);
                ctx.font = `900 ${ft.size}px Trebuchet MS`; ctx.textAlign = 'center';
                ctx.shadowBlur = 5; ctx.shadowColor = '#000'; ctx.fillText(ft.text, ft.x, ft.y); ctx.shadowBlur = 0;
            });
            ctx.globalAlpha = 1.0;

            ctx.restore();
            // --- КОНЕЦ МИРА ---

            // --- КРАСИВЫЙ UI ПОВЕРХ ---
            // Стеклянная панель
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; ctx.fillRect(0, 0, canvas.width, 60);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)'; ctx.fillRect(0, 58, canvas.width, 2);

            ctx.fillStyle = '#ffffff'; ctx.font = '900 20px Trebuchet MS'; ctx.textAlign = 'left';
            ctx.fillText(`👥 ${population}`, 15, 38);
            if (combo > 1) { ctx.fillStyle = '#ffaa00'; ctx.fillText(`🔥 x${combo}`, 110, 38); }

            ctx.fillStyle = '#ffcc00'; ctx.textAlign = 'right';
            ctx.fillText(`🪙 ${bankCoins + sessionCoins}`, canvas.width - 15, 38);

            ctx.textAlign = 'right'; ctx.font = '24px Arial';
            ctx.fillText('❤️'.repeat(Math.max(0, lives)), canvas.width - 15, 95);

            // ИНДИКАТОР ПРОГРЕССА СЛЕВА
            let maxTarget = 50; let currentF = blocks.length - 1;
            let barH = 250; let barW = 14; let barX = 20; let barY = 120;
            
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 7); ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2; ctx.stroke();
            
            let fillH = Math.min(1, currentF / maxTarget) * barH;
            let gradBar = ctx.createLinearGradient(0, barY + barH, 0, barY);
            gradBar.addColorStop(0, '#e74c3c'); gradBar.addColorStop(0.5, '#f1c40f'); gradBar.addColorStop(1, '#2ecc71');
            ctx.fillStyle = gradBar;
            ctx.beginPath(); ctx.roundRect(barX, barY + barH - fillH, barW, fillH, 7); ctx.fill();

            ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Trebuchet MS'; ctx.textAlign = 'center';
            ctx.shadowBlur = 4; ctx.shadowColor = '#000';
            ctx.fillText(`${currentF} ЭТ.`, barX + barW/2, barY - 15); ctx.shadowBlur = 0;

            if (gameState === 'GAME_OVER') {
                ctx.fillStyle = 'rgba(10, 20, 30, 0.9)'; ctx.fillRect(0, 0, canvas.width, canvas.height); 
                ctx.fillStyle = '#ff3366'; ctx.textAlign = 'center'; ctx.font = '900 52px Trebuchet MS'; 
                ctx.fillText('ОБВАЛ!', canvas.width / 2, canvas.height / 2 - 80); 
                
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 26px Trebuchet MS'; 
                ctx.fillText(`Построено: ${blocks.length - 1} этажей`, canvas.width / 2, canvas.height / 2 - 10); 
                ctx.fillText(`Население: ${population} 👥`, canvas.width / 2, canvas.height / 2 + 30); 
                
                ctx.fillStyle = '#ffcc00'; ctx.font = '900 32px Trebuchet MS'; 
                ctx.fillText(`Прибыль: +${sessionCoins} 🪙`, canvas.width / 2, canvas.height / 2 + 90); 
                
                ctx.globalAlpha = Math.abs(Math.sin(Date.now() / 300));
                ctx.font = 'bold 20px Trebuchet MS'; ctx.fillStyle = '#00ffcc'; 
                ctx.fillText('ТАПНИ ЧТОБЫ ПЕРЕИГРАТЬ', canvas.width / 2, canvas.height / 2 + 170);
                ctx.globalAlpha = 1.0;
            }

            update(); requestAnimationFrame(draw);
        }

        window.addEventListener('touchstart', (e) => {
            initWebAudio();
            if (e.target.id === 'backBtn') return;

            if (gameState === 'MENU' || gameState === 'GAME_OVER') { resetGame(); return; }
            if (gameState === 'PLAYING' && activeBlock && !activeBlock.isDropping) {
                activeBlock.isDropping = true; playSFX('drop', 0.1);
            }
        }, { passive: false });

        draw(); tg.ready();
    </script>
