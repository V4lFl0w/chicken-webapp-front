<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Defense - AAA Graphics</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #1e272e; overflow: hidden; touch-action: none; font-family: 'Montserrat', sans-serif; user-select: none; color: white; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ */
        #topUI {
            position: absolute; top: 0; left: 0; width: 100%; height: 75px;
            background: linear-gradient(180deg, #1e272e 0%, rgba(30, 39, 46, 0.95) 100%);
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; box-sizing: border-box; z-index: 100;
            border-bottom: 2px solid #f1c40f; box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }
        #backBtn {
            background: linear-gradient(to bottom, #ff9f43, #ee5253); color: #fff;
            border: 2px solid #ff9f43; border-radius: 8px; padding: 8px 12px; font-weight: 900; font-size: 12px;
            cursor: pointer; box-shadow: 0 4px 0 #833471; text-transform: uppercase;
        }
        #backBtn:active { transform: translateY(4px); box-shadow: 0 0 0 #833471; }
        
        #speedBtn {
            background: linear-gradient(to bottom, #0fb9b1, #38ada9); color: #fff;
            border: 2px solid #fff; border-radius: 8px; padding: 8px 12px; font-weight: 900; font-size: 12px;
            cursor: pointer; box-shadow: 0 4px 0 #079992;
        }
        #speedBtn:active { transform: translateY(4px); box-shadow: 0 0 0 #079992; }

        .top-center { display: flex; flex-direction: column; align-items: center; gap: 4px;}
        .wave-text { font-size: 18px; font-weight: 900; text-shadow: 0 2px 4px #000; letter-spacing: 1px;}
        .stats-container { display: flex; gap: 15px; font-size: 14px; font-weight: 900; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 20px;}
        .stat-gold { color: #f1c40f; } .stat-lives { color: #ff4757; }

        /* НИЖНЯЯ ПАНЕЛЬ СТРОИТЕЛЬСТВА */
        #bottomUI {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100px;
            background: linear-gradient(0deg, #1e272e 0%, rgba(30, 39, 46, 0.95) 100%);
            display: flex; justify-content: space-around; align-items: flex-start;
            padding: 10px 5px 25px 5px; box-sizing: border-box; z-index: 100;
            border-top: 2px solid #f1c40f; box-shadow: 0 -5px 20px rgba(0,0,0,0.6);
        }
        .build-btn {
            width: 70px; height: 75px; background: #2f3640; border: 2px solid #718093;
            border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 6px 0 #192a56; transition: 0.1s; cursor: pointer; position: relative;
        }
        .build-btn.active { border-color: #f1c40f; background: #353b48; transform: translateY(-6px); box-shadow: 0 12px 0 #192a56, 0 0 15px rgba(241, 196, 15, 0.5); }
        .build-btn.meteor.active { border-color: #ff4757; box-shadow: 0 12px 0 #833471, 0 0 15px rgba(255, 71, 87, 0.5); }
        
        .card-icon { font-size: 26px; margin-bottom: 2px; }
        .card-price { font-size: 14px; font-weight: 900; color: #f1c40f; text-shadow: 1px 1px 0 #000; margin-top: 2px;}
        .card-name { font-size: 9px; font-weight: 700; color: #dcdde1; text-transform: uppercase; }

        /* ИКОНКИ CSS */
        .icon-cannon { position: relative; width: 26px; height: 26px; }
        .icon-cannon::before { content: ''; position: absolute; bottom: 2px; left: 3px; width: 20px; height: 12px; background: #808e9b; border-radius: 4px; border: 2px solid #fff; }
        .icon-cannon::after { content: ''; position: absolute; top: 4px; left: 10px; width: 16px; height: 8px; background: #1e272e; transform: rotate(-30deg); }
        .icon-magic { position: relative; width: 26px; height: 26px; }
        .icon-magic::before { content: ''; position: absolute; bottom: 2px; left: 3px; width: 20px; height: 12px; background: #485460; border-radius: 4px; border: 2px solid #fff; }
        .icon-magic::after { content: ''; position: absolute; top: -4px; left: 8px; width: 10px; height: 16px; background: #00d2d3; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        .icon-tesla { position: relative; width: 26px; height: 26px; }
        .icon-tesla::before { content: ''; position: absolute; bottom: 2px; left: 3px; width: 20px; height: 12px; background: #3c40c6; border-radius: 4px; border: 2px solid #fff; }
        .icon-tesla::after { content: ''; position: absolute; top: 0px; left: 11px; width: 4px; height: 14px; background: #fff; box-shadow: 0 0 8px #fff; }

        /* МЕНЮ АПГРЕЙДА */
        #towerMenu {
            position: absolute; display: none; flex-direction: row; gap: 8px;
            background: rgba(30, 39, 46, 0.95); padding: 12px; border-radius: 16px;
            border: 2px solid #00d2d3; z-index: 150; transform: translate(-50%, -120%);
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }
        .action-btn { background: linear-gradient(to bottom, #01a3a4, #009432); border: none; border-radius: 8px; color: #fff; font-weight: 900; font-size: 13px; padding: 10px; cursor: pointer; box-shadow: 0 4px 0 #006266; text-transform: uppercase; }
        .action-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #006266; }
        .action-btn.sell { background: linear-gradient(to bottom, #ff4757, #e84118); box-shadow: 0 4px 0 #833471; }

        /* ОВЕРЛЕИ */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,20,23,0.95); z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; backdrop-filter: blur(5px);}
        .overlay h1 { color: #f1c40f; font-size: 38px; margin-bottom: 10px; text-transform: uppercase; text-shadow: 0 4px 10px #000;}
        .overlay-btn { background: linear-gradient(to bottom, #00d2d3, #01a3a4); color: #fff; padding: 15px 40px; border-radius: 12px; font-size: 22px; font-weight: 900; border: none; box-shadow: 0 6px 0 #006266; cursor: pointer; margin-top: 30px;}
        .overlay-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #006266; }
    </style>
</head>
<body>
    
    <div id="topUI">
        <button id="backBtn" onclick="window.location.href='../index.html'">◀ ХАБ</button>
        <div class="top-center">
            <div class="wave-text">ВОЛНА <span id="uiWave" style="color: #f1c40f;">1</span></div>
            <div class="stats-container">
                <span class="stat-gold" id="uiGold">🪙 200</span>
                <span class="stat-lives" id="uiLives">20 ❤️</span>
            </div>
        </div>
        <button id="speedBtn" onclick="toggleSpeed()">⏩ x1</button>
    </div>

    <div id="bottomUI">
        <div class="build-btn active" onclick="selectAction('basic', this)">
            <div class="icon-cannon"></div><div class="card-name">Пушка</div><div class="card-price">50g</div>
        </div>
        <div class="build-btn" onclick="selectAction('magic', this)">
            <div class="icon-magic"></div><div class="card-name">Кристалл</div><div class="card-price">120g</div>
        </div>
        <div class="build-btn" onclick="selectAction('tesla', this)">
            <div class="icon-tesla"></div><div class="card-name">Тесла</div><div class="card-price">200g</div>
        </div>
        <div class="build-btn meteor" onclick="selectAction('meteor', this)">
            <div class="card-icon">☄️</div><div class="card-name">Метеорит</div><div class="card-price">150g</div>
        </div>
    </div>

    <div id="towerMenu">
        <button class="action-btn" id="btn-up" onclick="upgradeTower()">АПГРЕЙД</button>
        <button class="action-btn sell" id="btn-sell" onclick="sellTower()">ПРОДАТЬ</button>
    </div>

    <div id="tutOverlay" class="overlay">
        <h1>ЗАЩИТА ЗАМКА</h1>
        <p style="color: #dcdde1; font-size: 16px; max-width: 320px; line-height: 1.6; font-weight: 700;">
            1. Выбирай пушки в меню снизу.<br>
            2. Строй их на <span style="color:#f1c40f">каменных плитах</span>.<br>
            3. Тапай по башне для улучшения.<br>
            4. "Метеорит" выжигает толпу.<br><br>
            <span style="color:#ff4757">Огр-Босс придет на 5 волне!</span>
        </p>
        <button class="overlay-btn" onclick="startGame()">В БОЙ!</button>
    </div>

    <div id="goOverlay" class="overlay">
        <h1 style="color:#ff4757">ЗАМОК ПАЛ</h1>
        <p id="goStats" style="font-size: 22px; color: #f1c40f; font-weight: 900; line-height: 1.5;"></p>
        <button class="overlay-btn" onclick="resetGame()">РЕВАНШ</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); if(tg.disableVerticalSwipes) tg.disableVerticalSwipes();
        tg.setHeaderColor('#1e272e');

        const user = tg.initDataUnsafe?.user || { id: 12345, first_name: "Hero" };
        const BACKEND_URL = "https://coral-app-jxzy5.ondigitalocean.app/game-api";
        let nickname = user.first_name || "Генерал";

        async function sendScoreToDatabase(collectedCoins) {
            try { await fetch(`${BACKEND_URL}/save_score`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ telegram_id: user.id, username: nickname, score: wave, coins: collectedCoins }) }); } catch (e) {}
        }

        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        // ЗВУКИ
        let audioCtx; const sfx = {};
        async function initAudio() {
            if (audioCtx) return; audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const load = async (url, key) => { try { const r = await fetch(url); const b = await r.arrayBuffer(); sfx[key] = await audioCtx.decodeAudioData(b); } catch(e){} };
            await Promise.all([load('https://coral-app-jxzy5.ondigitalocean.app/game/shoot.mp3', 'shoot'), load('https://coral-app-jxzy5.ondigitalocean.app/game/boom.mp3', 'boom')]);
        }
        function play(key, vol, pitch=1) {
            if(!audioCtx || !sfx[key]) return; if(audioCtx.state==='suspended') audioCtx.resume();
            const src = audioCtx.createBufferSource(); src.buffer = sfx[key]; src.playbackRate.value = pitch;
            const gain = audioCtx.createGain(); gain.gain.value = vol; src.connect(gain); gain.connect(audioCtx.destination); src.start(0);
        }

        // КОНСТАНТЫ ИГРОВОЙ ЗОНЫ (ЖЕСТКИЕ ОТСТУПЫ)
        const UI_TOP = 85; 
        const UI_BOT = canvas.height - 110;
        const PLAY_H = UI_BOT - UI_TOP;
        const W = canvas.width;
        
        let gameState = 'TUTORIAL'; 
        let lives = 20, gold = 200, wave = 1, sessionCoins = 0, gameSpeed = 1, frame = 0, screenShake = 0;
        let enemies = [], towers = [], bullets = [], particles = [], floatTexts = [], marks = [], shockwaves = [], lightnings = [];
        let selectedAction = 'basic'; let selectedPlot = null;
        let waveTimer = 50, enemiesToSpawn = 5, spawnCooldown = 0;

        // ГЕНЕРАЦИЯ КАРТЫ СТРОГО В ИГРОВОЙ ЗОНЕ
        const pathW = 40; 
        let waypoints = [], plots = [], env = [];

        function initMap() {
            waypoints = [
                { x: W*0.15, y: -50 }, 
                { x: W*0.15, y: UI_TOP + PLAY_H*0.15 },
                { x: W*0.85, y: UI_TOP + PLAY_H*0.15 }, 
                { x: W*0.85, y: UI_TOP + PLAY_H*0.45 },
                { x: W*0.25, y: UI_TOP + PLAY_H*0.45 }, 
                { x: W*0.25, y: UI_TOP + PLAY_H*0.75 },
                { x: W*0.75, y: UI_TOP + PLAY_H*0.75 }, 
                { x: W*0.75, y: UI_BOT + 50 } // Замок
            ];

            plots = []; env = [];
            let plotCoords = [
                [0.4, 0.05], [0.65, 0.05], [0.5, 0.3], [0.2, 0.3],
                [0.85, 0.6], [0.5, 0.6], [0.55, 0.85], [0.15, 0.85],
                [0.85, 0.3], [0.15, 0.6]
            ];
            plotCoords.forEach(p => { plots.push({x: W*p[0], y: UI_TOP + PLAY_H*p[1], occ: false, tower: null}); });

            for(let i=0; i<35; i++) {
                env.push({x: Math.random()*W, y: UI_TOP + 10 + Math.random()*(PLAY_H-20), type: Math.random()>0.4?'tree':'rock', sz: 12+Math.random()*15});
            }
        }
        initMap(); 

        let showTut = localStorage.getItem('td_tut_final3');
        if (!showTut) { document.getElementById('tutOverlay').style.display = 'flex'; } 
        else { document.getElementById('tutOverlay').style.display = 'none'; gameState = 'PLAYING'; }

        window.startGame = function() { localStorage.setItem('td_tut_final3', 'true'); document.getElementById('tutOverlay').style.display = 'none'; gameState = 'PLAYING'; }
        
        window.resetGame = function() {
            document.getElementById('goOverlay').style.display = 'none';
            wave = 1; gold = 200; lives = 20; sessionCoins = 0; enemiesToSpawn = 5; waveTimer = 50; gameSpeed = 1; screenShake = 0;
            document.getElementById('speedBtn').innerText = `⏩ x1`; document.getElementById('speedBtn').style.background = '';
            enemies = []; towers = []; bullets = []; particles = []; floatTexts = []; marks = []; shockwaves = []; lightnings = [];
            plots.forEach(p => { p.occ = false; p.tower = null; });
            closeTowerMenu(); updateUI(); gameState = 'PLAYING';
        }

        window.toggleSpeed = function() {
            gameSpeed = gameSpeed === 1 ? 2 : 1;
            document.getElementById('speedBtn').innerText = `⏩ x${gameSpeed}`;
            document.getElementById('speedBtn').style.background = gameSpeed === 2 ? 'linear-gradient(to bottom, #ff4757, #e84118)' : '';
            play('shoot', 0.1, 3);
        }

        window.selectAction = function(action, el) {
            selectedAction = action;
            document.querySelectorAll('.build-btn').forEach(c => c.classList.remove('active'));
            el.classList.add('active'); closeTowerMenu(); play('shoot', 0.05, 2);
        }

        function updateUI() {
            document.getElementById('uiWave').innerText = wave;
            document.getElementById('uiGold').innerText = `🪙 ${gold}`;
            document.getElementById('uiLives').innerText = `${lives} ❤️`;
        }

        function triggerShake(intensity) { screenShake = Math.max(screenShake, intensity); }
        function spawnText(x, y, txt, col, sz=16, cr=false) { floatTexts.push({x, y, txt, col, sz: cr?sz*1.5:sz, life: 1, vy: cr?-2:-1}); }
        function explode(x, y, col, sm=1, blood=false) {
            if(!blood) {
                play('boom', 0.15*sm, 0.8+Math.random()*0.4); 
                shockwaves.push({x, y, r:5, mr:40*sm, life:1});
                marks.push({x,y,sz:20*sm,life:400, bl:false});
                if(sm > 1.5) triggerShake(5*sm);
            } else { marks.push({x,y,sz:15*sm,life:200, bl:true}); }
            for(let i=0; i<12*sm; i++) particles.push({x, y, vx:(Math.random()-0.5)*10*sm, vy:(Math.random()-0.5)*10*sm-(blood?1:0), life:1+Math.random()*0.5, d:0.03+Math.random()*0.03, col, sz:Math.random()*4*sm+2, sp:!blood});
        }

        function castMeteor(tx, ty) {
            gold -= 150; updateUI(); selectedAction = 'basic'; 
            document.querySelectorAll('.build-btn').forEach(c=>c.classList.remove('active')); document.getElementById('bottomUI').children[0].classList.add('active');
            spawnText(tx, ty-50, "УДАР!", "#ff4757", 24, true);
            setTimeout(()=>{ if(gameState!=='PLAYING') return; explode(tx, ty, '#ff9f43', 4); enemies.forEach(e=>{ if(Math.hypot(e.x-tx, e.y-ty)<140){ e.hp-=500; if(e.hp<=0 && !e.dead) kill(e); }}); }, 400); 
        }

        function getHp() { return 40 + (wave * 25); }
        function spawnEnemy() {
            if (wave % 5 === 0 && enemiesToSpawn === 1) { 
                play('boom', 0.4, 0.5); spawnText(W/2, UI_TOP+40, "БОСС ОГР!", "#ff4757", 32, true); triggerShake(10);
                enemies.push({ x: waypoints[0].x, y: waypoints[0].y, tid: 1, spd: 0.6, hp: getHp()*12, mhp: getHp()*12, c: '#2f3640', sz: 30, rew: 300, type: 'boss', fly: false });
            } else {
                let r = Math.random();
                if (wave >= 8 && r > 0.8) enemies.push({ x: waypoints[0].x+(Math.random()*60-30), y: UI_TOP-20, tid: 0, spd: 1.2, hp: getHp()*0.8, mhp: getHp()*0.8, c: '#8e44ad', sz: 14, rew: 20, type: 'fly', fly: true, tx: waypoints[waypoints.length-1].x, ty: waypoints[waypoints.length-1].y });
                else if (wave >= 3 && r > 0.7) enemies.push({ x: waypoints[0].x, y: waypoints[0].y, tid: 1, spd: 2.2, hp: getHp()*0.6, mhp: getHp()*0.6, c: '#f39c12', sz: 10, rew: 15, type: 'fast', fly: false }); 
                else if (wave >= 2 && r > 0.4) enemies.push({ x: waypoints[0].x, y: waypoints[0].y, tid: 1, spd: 1.0, hp: getHp()*2, mhp: getHp()*2, c: '#718093', sz: 16, rew: 20, type: 'tank', fly: false }); 
                else enemies.push({ x: waypoints[0].x, y: waypoints[0].y, tid: 1, spd: 1.4, hp: getHp(), mhp: getHp(), c: '#2ecc71', sz: 12, rew: 10, type: 'norm', fly: false }); 
            }
        }

        function nextWave() {
            wave++;
            enemiesToSpawn = wave % 5 === 0 ? 1 : (8 + Math.floor(wave * 3)); 
            waveTimer = 200; sessionGlobalCoins += 15;
            if(wave > 1) { gold += 50; createFloatText(W/2, UI_TOP + PLAY_H/2, `ВОЛНА ${wave} (+50g)`, "#fbc531", 24, true); }
            updateUI();
        }

        function updateLogic() {
            frame++; if(screenShake > 0) screenShake *= 0.9; if(screenShake < 0.5) screenShake = 0;

            if (enemiesToSpawn > 0) {
                if (waveTimer > 0) waveTimer--;
                else { spawnCooldown--; if (spawnCooldown <= 0) { spawnEnemy(); enemiesToSpawn--; spawnCooldown = wave%5===0?0:Math.max(15, 45-wave); } }
            } else if (enemies.length === 0) { nextWave(); }

            particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; if(p.sp){p.vx*=0.95; p.vy+=0.2;} p.life-=p.d; }); particles = particles.filter(p=>p.life>0);
            floatTexts.forEach(t=>{ t.y+=t.vy; t.life-=0.015; }); floatTexts = floatTexts.filter(t=>t.life>0);
            marks.forEach(m=>m.life--); marks=marks.filter(m=>m.life>0);
            shockwaves.forEach(s=>{s.r+=(s.mr-s.r)*0.15; s.life-=0.05;}); shockwaves=shockwaves.filter(s=>s.life>0);
            lightnings.forEach(l=>l.life-=0.1); lightnings=lightnings.filter(l=>l.life>0);

            // Враги
            enemies.forEach(e => {
                if(e.slw > 0) { e.slw--; e.curSpd = e.spd * 0.5; } else e.curSpd = e.spd;
                
                if (e.fly) {
                    let dx = e.tx - e.x; let dy = e.ty - e.y; let dist = Math.hypot(dx, dy);
                    if (dist < e.curSpd) { lives -= 2; triggerShake(5); explode(e.x, e.y, '#8e44ad', 1.5); e.dead = true; } 
                    else { e.x += (dx/dist)*e.curSpd; e.y += (dy/dist)*e.curSpd; }
                } else {
                    let t = waypoints[e.tid]; let dx = t.x - e.x; let dy = t.y - e.y; let dist = Math.hypot(dx, dy);
                    if (dist < e.curSpd) {
                        e.x = t.x; e.y = t.y; e.tid++;
                        if (e.tid >= waypoints.length) {
                            e.dead = true; lives -= (e.type==='boss'?10:(e.sz>13?2:1)); explode(e.x, e.y, '#ff4757', 3); triggerShake(15); updateUI();
                            if (lives <= 0 && gameState==='PLAYING') { gameState = 'GAME_OVER'; closeTowerMenu(); document.getElementById('goStats').innerText=`Волн: ${wave-1}\nВ Хаб: +${sessionGlobalCoins} 🪙`; document.getElementById('goOverlay').style.display='flex'; sendScoreToDatabase(sessionGlobalCoins); }
                        }
                    } else { e.x += (dx/dist)*e.curSpd; e.y += (dy/dist)*e.curSpd; }
                }
            });
            
            // Башни
            towers.forEach(t => {
                if (t.cd > 0) t.cd--; if(t.rec > 0) t.rec -= 0.6; 
                let ce = null, md = t.rng;
                enemies.filter(e=>!e.dead).forEach(e=>{ let d = Math.hypot(e.x-t.x, e.y-t.y); if(d<md){md=d; ce=e;} });

                if (ce && t.cd <= 0) {
                    t.ang = Math.atan2(ce.y-(t.y-20), ce.x-t.x); 
                    if(t.type === 'tesla') {
                        play('shoot', 0.1, 3); t.rec = 3; t.cd = t.fr;
                        let cur = ce, node = {x: t.x, y: t.y-20}, hit = [];
                        for(let i=0; i<=t.lvl; i++) {
                            if(!cur) break; hit.push(cur); lightnings.push({s: node, e: {x: cur.x, y: cur.y}, life: 1});
                            cur.hp -= t.dmg; particles.push({x: cur.x, y: cur.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, d: 0.1, col: '#fff', sz: 3, sp: true});
                            if(cur.hp <= 0 && !cur.dead) kill(cur);
                            node = {x: cur.x, y: cur.y}; let nt = null, nmd = 90; 
                            enemies.filter(e=>!e.dead && !hit.includes(e)).forEach(e=>{let d = Math.hypot(e.x-node.x, e.y-node.y); if(d<nmd){nmd=d; nt=e;}}); cur = nt;
                        }
                    } else {
                        play('shoot', t.type==='magic'?0.02:0.05, t.type==='magic'?1.5:1); t.rec = 8; t.cd = t.fr;
                        bullets.push({ x: t.x+Math.cos(t.ang)*10, y: (t.y-20)+Math.sin(t.ang)*10, t: ce, spd: t.type==='magic'?7:14, dmg: t.dmg, type: t.type, tx: ce.x, ty: ce.y, sx: t.x, sy: t.y-20 });
                        particles.push({x: t.x+Math.cos(t.ang)*20, y: (t.y-20)+Math.sin(t.ang)*20, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 1, d: 0.08, col: t.type==='magic'?'#00d2d3':'#dcdde1', sz: 5, sp: false});
                    }
                }
            });

            // Пули
            bullets.forEach(b => {
                let dx = (b.type==='magic'?b.tx:b.t.x) - b.x; let dy = (b.type==='magic'?b.ty:b.t.y) - b.y; let dist = Math.hypot(dx, dy);
                if (dist < b.spd) {
                    b.dead = true;
                    if (b.type === 'magic') {
                        explode(b.tx, b.ty, '#00d2d3', 1.8);
                        enemies.forEach(e=>{ if(Math.hypot(e.x-b.tx, e.y-b.ty)<60+b.dmg/2 && !e.dead){ e.hp-=b.dmg; e.slw=150; if(e.hp<=0 && !e.dead) kill(e); } });
                    } else {
                        if(b.t.dead) return; b.t.hp -= b.dmg; particles.push({x:b.t.x,y:b.t.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:0.8,d:0.1,col:'#f1c40f',sz:4,sp:true});
                        if(b.t.hp <= 0 && !b.t.dead) kill(b.t);
                    }
                } else { 
                    if(b.type === 'basic') { let p = 1 - (dist / Math.hypot(b.target.x - b.startX, b.target.y - b.startY)); b.arc = Math.sin(p * Math.PI) * 20; }
                    b.x += (dx / dist) * b.spd; b.y += (dy / dist) * b.spd; 
                    if(b.type === 'magic') particles.push({x: b.x, y: b.y, vx:0, vy:0, life:0.5, d:0.1, col:'#00d2d3', sz:4}); 
                }
            });

            enemies = enemies.filter(e => !e.dead); bullets = bullets.filter(b => !b.dead);
        }

        function update() { if(gameState !== 'PLAYING') return; for(let i=0; i<gameSpeed; i++) { updateLogic(); } }

        function kill(e) {
            e.dead = true; gold += e.rew; updateUI();
            createExplosion(e.x, e.y, '#e84118', e.type === 'boss' ? 4 : 1.2, true); 
            spawnText(e.x, e.y-10, `+${e.rew}`, "#fbc531", e.type === 'boss'? 24:16, e.type==='boss');
            if (e.type === 'boss') { sessionGlobalCoins += 200; triggerShake(20); }
        }

        function openTowerMenu(p) {
            selectedPlot = p; let menu = document.getElementById('towerMenu'); menu.style.display = 'flex';
            let mX = p.x; let mY = p.y - 60;
            if (mX < 70) mX = 70; if (mX > W - 70) mX = W - 70; if (mY < UI_TOP + 40) mY = p.y + 40; 
            menu.style.left = `${mX}px`; menu.style.top = `${mY}px`; 
            let bU = document.getElementById('btn-up'); document.getElementById('btn-sell').innerText = `ПРОДАТЬ (${Math.floor(p.tower.cost*0.8)})`;
            if(p.tower.lvl>=3){ bU.innerText='МАКСИМУМ'; bU.style.opacity=0.5; } else { bU.innerText=`АП (${p.tower.bc*p.tower.lvl})`; bU.style.opacity=1; }
        }
        function closeTowerMenu() { selectedPlot = null; document.getElementById('towerMenu').style.display = 'none'; }

        window.upgradeTower = function() {
            if(!selectedPlot || selectedPlot.tower.lvl>=3) return;
            let t = selectedPlot.tower; let upCost = t.bc * t.lvl;
            if (gold >= upCost) {
                gold -= upCost; updateUI(); t.cost += upCost; t.lvl++;
                t.dmg = Math.floor(t.dmg * 1.5); t.rng += 15; t.fr = Math.max(10, Math.floor(t.fr * 0.8));
                playSFX('shoot', 0.2, 0.5); createExplosion(t.x, t.y, '#f1c40f', 2); spawnText(t.x, t.y - 40, "UPGRADE!", "#f1c40f", 20, true);
                openTowerMenu(selectedPlot);
            } else { spawnText(t.x, t.y - 40, "НЕТ ЗОЛОТА!", "#ff4757", 18); }
        }

        window.sellTower = function() {
            if(!selectedPlot) return;
            let t = selectedPlot.tower; let refund = Math.floor(t.cost * 0.8);
            gold += refund; updateUI(); spawnText(t.x, t.y - 30, `+${refund}g`, "#f1c40f", 20); playSFX('boom', 0.1, 2);
            towers.splice(towers.indexOf(t), 1); selectedPlot.occ = false; selectedPlot.tower = null; closeTowerMenu();
        }

        // РЕНДЕР
        function drawTowers() {
            towers.forEach(t => {
                const bx = t.x; const by = t.y; const sz = 20; 
                ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(bx, by+10, sz*1.2, sz*0.6, 0, 0, Math.PI*2); ctx.fill();
                
                // 3D Основание
                ctx.fillStyle = '#485460'; ctx.fillRect(bx-15, by-10, 30, 15);
                ctx.beginPath(); ctx.ellipse(bx, by+5, 15, 8, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#808e9b'; ctx.beginPath(); ctx.ellipse(bx, by-10, 15, 8, 0, 0, Math.PI*2); ctx.fill();
                
                ctx.save(); ctx.translate(bx, by-20); ctx.rotate(t.ang);
                if (t.type === 'basic') {
                    ctx.fillStyle = '#1e272e'; ctx.fillRect(-10 - t.rec, -6, 26 + (t.lvl*3), 12); 
                    ctx.fillStyle = '#f1f2f6'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill(); 
                } else if (t.type === 'magic') {
                    let fy = Math.sin(frame * 0.12) * 3; ctx.shadowBlur = 15; ctx.shadowColor = '#00d8d6'; ctx.fillStyle = '#00d8d6'; 
                    ctx.beginPath(); ctx.moveTo(0, -16 - (t.lvl*2) + fy); ctx.lineTo(10+(t.lvl*2), 0+fy); ctx.lineTo(0, 16+(t.lvl*2)+fy); ctx.lineTo(-10-(t.lvl*2), 0+fy); ctx.fill(); ctx.shadowBlur = 0;
                } else if (t.type === 'tesla') {
                    ctx.shadowBlur = 10; ctx.shadowColor = '#575fcf'; ctx.fillStyle = '#3c40c6'; ctx.fillRect(-8, -8, 16, 16); 
                    ctx.fillStyle = '#fff'; ctx.fillRect(0, -4, 16 + t.rec + (t.lvl*2), 8); ctx.shadowBlur = 0;
                }
                ctx.restore();

                let ly = by - 40; ctx.shadowBlur = 8; ctx.shadowColor = '#f1c40f'; ctx.fillStyle = '#f1c40f';
                for(let i=0; i<t.lvl; i++) { let px = bx - ((t.lvl-1)*5) + (i*10); ctx.beginPath(); ctx.moveTo(px, ly-3); ctx.lineTo(px+3, ly); ctx.lineTo(px, ly+3); ctx.lineTo(px-3, ly); ctx.fill(); }
                ctx.shadowBlur = 0;

                if (selectedPlot && selectedPlot.tower === t) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.arc(bx, by-10, t.rng, 0, Math.PI*2); ctx.stroke(); ctx.setLineDash([]); }
            });
        }

        function drawEntities() {
            enemies.forEach(e => {
                if (e.fly) {
                    let wF = Math.sin(frame * 0.5) * 8;
                    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(e.x, e.y+40, e.sz*1.5, e.sz*0.5, 0, 0, Math.PI*2); ctx.fill(); 
                    ctx.fillStyle = e.c; ctx.beginPath(); ctx.arc(e.x, e.y, e.sz, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(e.x-e.sz*2, e.y-wF); ctx.lineTo(e.x-e.sz*0.5, e.y+e.sz); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(e.x+e.sz*2, e.y-wF); ctx.lineTo(e.x+e.sz*0.5, e.y+e.sz); ctx.fill();
                    ctx.fillStyle = '#ff4757'; ctx.fillRect(e.x - e.sz, e.y - e.sz - 8, e.sz*2, 4); ctx.fillStyle = '#2ecc71'; ctx.fillRect(e.x - e.sz, e.y - e.sz - 8, (e.sz*2) * (e.hp / e.mhp), 4);
                    return;
                }

                let w = Math.sin(frame * (e.type==='boss'?0.1:0.3)) * (e.type==='boss'?4:2); const s = e.sz; const ey = e.y - s*0.3 + w;
                ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(e.x, e.y+s*0.8, s*1.2, s*0.5, 0, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = e.c; ctx.beginPath(); ctx.ellipse(e.x, e.y+w, s, s*1.1, 0, 0, Math.PI*2); ctx.fill();
                if (e.type !== 'boss') { 
                    ctx.beginPath(); ctx.moveTo(e.x-s*0.6, e.y-s*0.5+w); ctx.lineTo(e.x-s*1.5, e.y-s*0.8+w); ctx.lineTo(e.x-s*0.8, e.y+w); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(e.x+s*0.6, e.y-s*0.5+w); ctx.lineTo(e.x+s*1.5, e.y-s*0.8+w); ctx.lineTo(e.x+s*0.8, e.y+w); ctx.fill();
                } else { 
                    ctx.fillStyle='#f1f2f6'; ctx.beginPath(); ctx.moveTo(e.x-s*0.5, e.y-s+w); ctx.lineTo(e.x-s*0.8, e.y-s*1.5+w); ctx.lineTo(e.x-s*0.2, e.y-s*0.8+w); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(e.x+s*0.5, e.y-s+w); ctx.lineTo(e.x+s*0.8, e.y-s*1.5+w); ctx.lineTo(e.x+s*0.2, e.y-s*0.8+w); ctx.fill();
                }

                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(e.x-s*0.3, ey, s*0.25, 0, Math.PI*2); ctx.arc(e.x+s*0.3, ey, s*0.25, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = e.slw > 0 ? '#00d8d6' : '#1e272e'; ctx.beginPath(); ctx.arc(e.x-s*0.3, ey, s*0.12, 0, Math.PI*2); ctx.arc(e.x+s*0.3, ey, s*0.12, 0, Math.PI*2); ctx.fill();
                
                if (e.slw > 0) { ctx.strokeStyle = 'rgba(0, 216, 214, 0.6)'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(e.x, e.y+w, s+4, 0, Math.PI*2); ctx.stroke(); }

                ctx.fillStyle = '#ff4757'; ctx.fillRect(e.x - s*1.2, e.y - s - 12 + w, s*2.4, 4); ctx.fillStyle = '#2ecc71'; ctx.fillRect(e.x - s*1.2, e.y - s - 12 + w, (s*2.4) * (e.hp / e.mhp), 4);
            });
        }

        function draw() {
            ctx.save(); ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);

            // Трава
            ctx.fillStyle = '#20bf6b'; ctx.fillRect(0, 0, W, canvas.height);
            ctx.fillStyle = '#1e9b54'; for(let i=0; i<W; i+=25) for(let j=UI_TOP; j<UI_BOT; j+=25) if((i+j)%50===0) { ctx.beginPath(); ctx.arc(i,j,2,0,Math.PI); ctx.fill(); }
            
            marks.forEach(s => { ctx.fillStyle = s.bl ? `rgba(142, 68, 173, ${s.life/400})` : `rgba(30, 39, 46, ${s.life/1000})`; ctx.beginPath(); ctx.ellipse(s.x, s.y, s.sz, s.sz*0.6, 0, 0, Math.PI*2); ctx.fill(); });

            if(waypoints.length > 0) {
                ctx.strokeStyle = '#d1ccc0'; ctx.lineWidth = pathW + 12; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; 
                ctx.beginPath(); ctx.moveTo(waypoints[0].x, waypoints[0].y); for (let i = 1; i < waypoints.length; i++) ctx.lineTo(waypoints[i].x, waypoints[i].y); ctx.stroke();
                ctx.strokeStyle = '#a4b0be'; ctx.lineWidth = pathW + 6; ctx.stroke(); 
                ctx.strokeStyle = '#f1f2f6'; ctx.lineWidth = pathW; ctx.stroke(); 
                ctx.strokeStyle = '#ced6e0'; ctx.lineWidth = pathW - 10; ctx.setLineDash([12, 12]); ctx.stroke(); ctx.setLineDash([]); 
            }

            env.forEach(e => {
                if(e.type==='tree'){ 
                    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(e.x+4, e.y+e.sz, e.sz, e.sz*0.5, 0, 0, Math.PI*2); ctx.fill(); 
                    ctx.fillStyle = '#006266'; ctx.beginPath(); ctx.moveTo(e.x, e.y-e.sz); ctx.lineTo(e.x+e.sz, e.y+e.sz); ctx.lineTo(e.x-e.sz, e.y+e.sz); ctx.fill(); 
                    ctx.fillStyle = '#009432'; ctx.beginPath(); ctx.moveTo(e.x, e.y-e.sz*1.5); ctx.lineTo(e.x+e.sz*0.8, e.y+e.sz*0.5); ctx.lineTo(e.x-e.sz*0.8, e.y+e.sz*0.5); ctx.fill(); 
                } else { 
                    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(e.x+3, e.y+3, e.sz, e.sz*0.6, 0, 0, Math.PI*2); ctx.fill(); 
                    ctx.fillStyle = '#718093'; ctx.beginPath(); ctx.arc(e.x, e.y, e.sz, 0, Math.PI*2); ctx.fill(); 
                    ctx.fillStyle = '#dcdde1'; ctx.beginPath(); ctx.arc(e.x-2, e.y-2, e.sz*0.5, 0, Math.PI*2); ctx.fill(); 
                }
            });

            plots.forEach(p => {
                ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(p.x, p.y+8, 24, 12, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = p.occ ? '#485460' : '#808e9b'; ctx.beginPath(); ctx.ellipse(p.x, p.y, 22, 11, 0, 0, Math.PI*2); ctx.fill();
                if (!p.occ && selectedAction !== 'meteor') { let cost = selectedAction === 'magic' ? 120 : (selectedAction === 'tesla' ? 200 : 50); ctx.strokeStyle = gold >= cost ? '#0be881' : '#ff4757'; ctx.lineWidth = 2; ctx.stroke(); }
            });

            if(waypoints.length > 0) {
                let bW = waypoints[waypoints.length-1];
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.ellipse(bW.x, bW.y+15, 65, 25, 0, 0, Math.PI*2); ctx.fill();
                let grad=ctx.createLinearGradient(0,bW.y-60,0,bW.y); grad.addColorStop(0,'#718093'); grad.addColorStop(1,'#2f3640'); ctx.fillStyle=grad; ctx.fillRect(bW.x-55,bW.y-60,110,70); 
                ctx.fillStyle = '#1e272e'; ctx.fillRect(bW.x-65, bW.y-80, 30, 40); ctx.fillRect(bW.x+35, bW.y-80, 30, 40);
                ctx.fillStyle = '#ee5253'; ctx.beginPath(); ctx.moveTo(bW.x-70, bW.y-80); ctx.lineTo(bW.x-50, bW.y-120); ctx.lineTo(bW.x-30, bW.y-80); ctx.fill(); ctx.beginPath(); ctx.moveTo(bW.x+30, bW.y-80); ctx.lineTo(bW.x+50, bW.y-120); ctx.lineTo(bW.x+70, bW.y-80); ctx.fill();
                ctx.fillStyle='#dcdde1'; ctx.fillRect(bW.x-15,bW.y-20,30,30); ctx.fillStyle='#1e272e'; ctx.beginPath(); ctx.arc(bW.x,bW.y-20,15,Math.PI,0); ctx.fill(); 
            }

            drawTowers();
            
            enemies.filter(e => !e.fly).forEach(e => drawEnemyGoblins(ctx, e));

            shockwaves.forEach(sw => { ctx.strokeStyle = `rgba(255, 255, 255, ${sw.life})`; ctx.lineWidth = 4; ctx.beginPath(); ctx.ellipse(sw.x, sw.y, sw.r, sw.r*0.6, 0, 0, Math.PI*2); ctx.stroke(); });

            lightnings.forEach(l => {
                ctx.shadowBlur = 15; ctx.shadowColor = '#575fcf'; ctx.strokeStyle = `rgba(95, 39, 205, ${l.life})`; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(l.s.x, l.s.y); let midX = (l.s.x + l.e.x)/2 + (Math.random()-0.5)*20; let midY = (l.s.y + l.e.y)/2 + (Math.random()-0.5)*20; ctx.lineTo(midX, midY); ctx.lineTo(l.e.x, l.e.y); ctx.stroke();
                ctx.shadowBlur = 0; ctx.strokeStyle = `rgba(255, 255, 255, ${l.life})`; ctx.lineWidth = 2; ctx.stroke();
            });

            bullets.forEach(b => {
                let yo = b.arc ? -b.arc : 0; ctx.fillStyle = b.type === 'magic' ? '#00d8d6' : '#2f3640'; ctx.shadowBlur = b.type === 'magic' ? 15 : 0; ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath(); ctx.arc(b.x, b.y + yo, b.type === 'magic' ? 6 : 4, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            });

            enemies.filter(e => e.fly).forEach(e => drawEnemyGoblins(ctx, e));

            particles.forEach(p => { ctx.fillStyle = p.col; ctx.globalAlpha = Math.max(0, p.life); ctx.beginPath(); ctx.arc(p.x, p.y, p.sz, 0, Math.PI * 2); ctx.fill(); }); ctx.globalAlpha = 1.0;
            floatTexts.forEach(ft => { ctx.fillStyle = ft.col; ctx.globalAlpha = Math.max(0, ft.life); ctx.font = `${ft.sz}px Montserrat`; ctx.textAlign = 'center'; ctx.shadowBlur = 4; ctx.shadowColor = '#000'; ctx.fillText(ft.txt, ft.x, ft.y); ctx.shadowBlur = 0; }); ctx.globalAlpha = 1.0;

            ctx.restore(); 

            if (selectedAction === 'meteor' && gold >= 150 && gameState === 'PLAYING') {
                ctx.fillStyle = 'rgba(238, 82, 83, 0.2)'; ctx.fillRect(0, UI_TOP, W, PLAY_H);
                ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.font='900 20px Montserrat'; ctx.shadowBlur = 5; ctx.shadowColor = '#000';
                ctx.fillText("ТАПНИ В ТОЛПУ ВРАГОВ", W/2, UI_TOP + PLAY_H/2); ctx.shadowBlur = 0;
            }

            update(); requestAnimationFrame(draw);
        }

        window.addEventListener('touchstart', (e) => {
            initAudio(); if (e.target.tagName === 'BUTTON' || e.target.closest('#bottomUI') || e.target.closest('#topUI') || e.target.closest('#towerMenu') || document.getElementById('tutOverlay').style.display === 'flex' || document.getElementById('goOverlay').style.display === 'flex') return;
            if (gameState !== 'PLAYING') return;

            let tx = e.touches[0].clientX, ty = e.touches[0].clientY;
            if(ty < UI_TOP || ty > UI_BOT) return; 

            if (selectedAction === 'meteor') {
                if (gold >= 150) { castMeteor(tx, ty); } 
                else { spawnText(tx, ty-30, "НЕТ ЗОЛОТА!", "#ff4757", 22, true); selectedAction = 'basic'; document.querySelectorAll('.build-card').forEach(c=>c.classList.remove('active')); document.getElementById('bottomUI').children[0].classList.add('active'); }
                return;
            }

            let clickedPlot = null; plots.forEach(p => { if (Math.hypot(tx - p.x, ty - p.y) < 35) clickedPlot = p; });

            if (clickedPlot) {
                if (clickedPlot.occ) { openTowerMenu(clickedPlot); } 
                else {
                    closeTowerMenu(); let cost = selectedAction === 'tesla' ? 200 : (selectedAction === 'magic' ? 120 : 50);
                    if (gold >= cost) {
                        gold -= cost; updateUI(); clickedPlot.occ = true;
                        let tData = { x: clickedPlot.x, y: clickedPlot.y, ang: 0, rec: 0, cd: 0, type: selectedAction, lvl: 1, bc: cost, cost: cost };
                        if (selectedAction === 'basic') { tData.rng = 130; tData.fr = 35; tData.dmg = 20; }
                        else if (selectedAction === 'magic') { tData.rng = 110; tData.fr = 90; tData.dmg = 45; }
                        else { tData.rng = 95; tData.fr = 80; tData.dmg = 30; } 
                        
                        towers.push(tData); clickedPlot.tower = tData;
                        playSFX('shoot', 0.1, 0.5); explode(clickedPlot.x, clickedPlot.y, '#f1f2f6', 2); 
                    } else { spawnText(clickedPlot.x, clickedPlot.y-30, "НЕТ ЗОЛОТА!", "#ff4757", 22, true); }
                }
            } else { closeTowerMenu(); }
        }, { passive: false });

    </script>
</body>
</html>
