<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Defense - Action (New UX)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #1e272e; overflow: hidden; touch-action: none; font-family: 'Montserrat', sans-serif; user-select: none; color: white; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ */
        #topUI {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: linear-gradient(180deg, #1e272e 0%, rgba(30, 39, 46, 0.9) 100%);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; box-sizing: border-box; z-index: 100;
            border-bottom: 2px solid #f1c40f; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        #backBtn {
            background: linear-gradient(to bottom, #ff9f43, #ee5253); color: #fff;
            border: 2px solid #ff9f43; border-radius: 8px;
            padding: 8px 12px; font-weight: 900; font-size: 12px;
            cursor: pointer; box-shadow: 0 4px 0 #833471; text-transform: uppercase;
        }
        #backBtn:active { transform: translateY(4px); box-shadow: 0 0 0 #833471; }

        #speedBtn {
            background: linear-gradient(to bottom, #0fb9b1, #38ada9); color: #fff;
            border: 2px solid #fff; border-radius: 8px;
            padding: 8px 12px; font-weight: 900; font-size: 12px;
            cursor: pointer; box-shadow: 0 4px 0 #079992;
        }
        #speedBtn:active { transform: translateY(4px); box-shadow: 0 0 0 #079992; }

        .stat-bar { 
            position: absolute; top: 65px; width: 100%; z-index: 90;
            display: flex; justify-content: space-between; font-size: 16px; font-weight: 900; 
            padding: 0 15px; box-sizing: border-box; text-shadow: 0 2px 4px #000;
        }
        .stat-gold { color: #f1c40f; } .stat-lives { color: #ff4757; }

        /* НИЖНЯЯ ПАНЕЛЬ СТРОИТЕЛЬСТВА */
        #bottomUI {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 95px;
            background: linear-gradient(0deg, #1e272e 0%, rgba(30, 39, 46, 0.95) 100%);
            display: flex; justify-content: space-around; align-items: flex-end;
            padding: 10px 5px 20px 5px; box-sizing: border-box; z-index: 100;
            border-top: 2px solid #f1c40f; box-shadow: 0 -5px 20px rgba(0,0,0,0.6);
        }
        .build-btn {
            width: 70px; height: 75px; background: #2f3640; border: 2px solid #718093;
            border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 6px 0 #192a56; transition: 0.1s; cursor: pointer; position: relative;
        }
        .build-btn.active { border-color: #f1c40f; background: #353b48; transform: translateY(-6px); box-shadow: 0 12px 0 #192a56, 0 0 15px rgba(241, 196, 15, 0.5); }
        .build-btn.meteor.active { border-color: #ff4757; box-shadow: 0 12px 0 #833471, 0 0 15px rgba(255, 71, 87, 0.5); }
        
        .card-icon { font-size: 26px; margin-bottom: 2px; }
        .card-price { font-size: 14px; font-weight: 900; color: #f1c40f; text-shadow: 1px 1px 0 #000; margin-top: 2px;}
        .card-name { font-size: 9px; font-weight: 700; color: #dcdde1; text-transform: uppercase; }

        /* ИКОНКИ CSS */
        .icon-cannon { position: relative; width: 26px; height: 26px; }
        .icon-cannon::before { content: ''; position: absolute; bottom: 2px; left: 3px; width: 20px; height: 12px; background: #808e9b; border-radius: 4px; border: 2px solid #fff; }
        .icon-cannon::after { content: ''; position: absolute; top: 4px; left: 10px; width: 16px; height: 8px; background: #1e272e; transform: rotate(-30deg); }
        
        .icon-magic { position: relative; width: 26px; height: 26px; }
        .icon-magic::before { content: ''; position: absolute; bottom: 2px; left: 3px; width: 20px; height: 12px; background: #485460; border-radius: 4px; border: 2px solid #fff; }
        .icon-magic::after { content: ''; position: absolute; top: -4px; left: 8px; width: 10px; height: 16px; background: #00d2d3; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        
        .icon-tesla { position: relative; width: 26px; height: 26px; }
        .icon-tesla::before { content: ''; position: absolute; bottom: 2px; left: 3px; width: 20px; height: 12px; background: #3c40c6; border-radius: 4px; border: 2px solid #fff; }
        .icon-tesla::after { content: ''; position: absolute; top: 0px; left: 11px; width: 4px; height: 14px; background: #fff; }

        /* МЕНЮ АПГРЕЙДА */
        #towerMenu {
            position: absolute; display: none; flex-direction: row; gap: 8px;
            background: rgba(30, 39, 46, 0.95); padding: 12px; border-radius: 16px;
            border: 2px solid #00d2d3; z-index: 150; transform: translate(-50%, -120%);
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }
        .action-btn { background: linear-gradient(to bottom, #01a3a4, #009432); border: none; border-radius: 8px; color: #fff; font-weight: 900; font-size: 13px; padding: 10px; cursor: pointer; box-shadow: 0 4px 0 #006266; text-transform: uppercase; }
        .action-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #006266; }
        .action-btn.sell { background: linear-gradient(to bottom, #ff4757, #e84118); box-shadow: 0 4px 0 #833471; }

        /* ОВЕРЛЕИ */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,20,23,0.9); z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; backdrop-filter: blur(5px);}
        .overlay h1 { color: #f1c40f; font-size: 38px; margin-bottom: 10px; text-transform: uppercase; text-shadow: 0 4px 10px #000;}
        .overlay-btn { background: linear-gradient(to bottom, #00d2d3, #01a3a4); color: #fff; padding: 15px 40px; border-radius: 12px; font-size: 22px; font-weight: 900; border: none; box-shadow: 0 6px 0 #006266; cursor: pointer; margin-top: 30px;}
        .overlay-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #006266; }
    </style>
</head>
<body>
    
    <div id="topUI">
        <button id="backBtn" onclick="window.location.href='../index.html'">◀ ХАБ</button>
        <div style="text-align: center; line-height: 1.2;">
            <div style="font-weight: 900; font-size: 18px; text-shadow: 0 2px 4px #000;">ВОЛНА <span id="waveUi" style="color: #f1c40f;">1</span></div>
        </div>
        <button id="speedBtn" onclick="toggleSpeed()">⏩ x1</button>
    </div>
    
    <div class="stat-bar">
        <span class="stat-gold" id="goldUi">🪙 150</span>
        <span class="stat-lives" id="livesUi">20 ❤️</span>
    </div>

    <div id="bottomUI">
        <div class="build-btn active" id="btn-basic" onclick="selectAction('basic')">
            <div class="icon-cannon"></div><div class="card-name">Пушка</div><div class="card-price">50g</div>
        </div>
        <div class="build-btn" id="btn-magic" onclick="selectAction('magic')">
            <div class="icon-magic"></div><div class="card-name">Кристалл</div><div class="card-price">120g</div>
        </div>
        <div class="build-btn" id="btn-tesla" onclick="selectAction('tesla')">
            <div class="icon-tesla"></div><div class="card-name">Тесла</div><div class="card-price">200g</div>
        </div>
        <div class="build-btn meteor" id="btn-meteor" onclick="selectAction('meteor')">
            <div class="card-icon">☄️</div><div class="card-name">Метеорит</div><div class="card-price">150g</div>
        </div>
    </div>

    <div id="towerMenu">
        <button class="action-btn" id="btn-upgrade" onclick="upgradeSelectedTower()">АПГРЕЙД (100)</button>
        <button class="action-btn sell" id="btn-sell" onclick="sellSelectedTower()">ПРОДАТЬ (40)</button>
    </div>

    <div id="tutOverlay" class="overlay">
        <h1>ЗАЩИТА ЗАМКА</h1>
        <p style="color: #dcdde1; font-size: 16px; max-width: 320px; line-height: 1.6; font-weight: 700;">
            1. Выбирай пушки в меню снизу.<br>
            2. Строй их на <span style="color:#f1c40f">каменных плитах</span>.<br>
            3. Тапай по башне для улучшения.<br>
            4. "Метеорит" выжигает толпу.<br><br>
            <span style="color:#ff4757">Огр-Босс придет на 5 волне! Не зевай.</span>
        </p>
        <button class="overlay-btn" onclick="startGame()">В БОЙ!</button>
    </div>

    <div id="goOverlay" class="overlay">
        <h1 style="color:#ff4757">ЗАМОК ПАЛ</h1>
        <p id="goStats" style="font-size: 22px; color: #f1c40f; font-weight: 900; line-height: 1.5;"></p>
        <button class="overlay-btn" onclick="resetGameFromUI()">РЕВАНШ</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
        tg.setHeaderColor('#1e272e');

        const user = tg.initDataUnsafe?.user || { id: 12345, first_name: "Hero", username: "Player" };
        const BACKEND_URL = "https://coral-app-jxzy5.ondigitalocean.app/game-api";
        let nickname = user.username || user.first_name || "Игрок";

        async function sendScoreToDatabase(collectedCoins) {
            try { await fetch(`${BACKEND_URL}/save_score`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ telegram_id: user.id, username: nickname, score: wave, coins: collectedCoins }) }); } catch (e) {}
        }

        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let audioCtx; const sfxBuffers = {};
        async function initWebAudio() {
            if (audioCtx) return; audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const loadBuffer = async (url, key) => { try { const res = await fetch(url); const buf = await res.arrayBuffer(); sfxBuffers[key] = await audioCtx.decodeAudioData(buf); } catch (e) {} };
            await Promise.all([ loadBuffer('https://coral-app-jxzy5.ondigitalocean.app/game/shoot.mp3', 'shoot'), loadBuffer('https://coral-app-jxzy5.ondigitalocean.app/game/boom.mp3', 'boom') ]);
        }
        function playSFX(key, vol, pitch=1) {
            if (!audioCtx || !sfxBuffers[key]) return; if (audioCtx.state === 'suspended') audioCtx.resume();
            const source = audioCtx.createBufferSource(); source.buffer = sfxBuffers[key]; source.playbackRate.value = pitch;
            const gainNode = audioCtx.createGain(); gainNode.gain.value = vol; 
            source.connect(gainNode); gainNode.connect(audioCtx.destination); source.start(0);
        }

        // ИГРОВЫЕ ПЕРЕМЕННЫЕ
        let gameState = 'PLAYING'; 
        let gameSpeed = 1; 
        let lives = 20; let inGameGold = 250; let sessionGlobalCoins = 0; let wave = 1;
        let enemies = []; let towers = []; let bullets = []; let particles = []; let floatTexts = []; let buildPlots = [];
        let scorchMarks = []; let shockwaves = []; let lightnings = []; 
        
        let selectedAction = 'basic'; // basic, magic, tesla, meteor
        let frameCount = 0; let waveTimer = 100; let enemiesToSpawn = 5; let spawnCooldown = 0;
        let screenShake = 0;

        let selectedTowerForUpgrade = null;

        // ПРОВЕРКА ОБУЧЕНИЯ
        let showTut = localStorage.getItem('td_tut_final');
        if (!showTut) { document.getElementById('tutOverlay').style.display = 'flex'; gameState = 'TUTORIAL'; } 
        
        window.startGame = function() { localStorage.setItem('td_tut_final', 'true'); document.getElementById('tutOverlay').style.display = 'none'; gameState = 'PLAYING'; }

        window.toggleSpeed = function() {
            gameSpeed = gameSpeed === 1 ? 2 : 1;
            document.getElementById('speedBtn').innerText = `⏩ x${gameSpeed}`;
            document.getElementById('speedBtn').style.background = gameSpeed === 2 ? 'linear-gradient(to bottom, #ff4757, #e84118)' : 'linear-gradient(to bottom, #0fb9b1, #38ada9)';
        }

        window.selectAction = function(action) {
            selectedAction = action;
            document.querySelectorAll('.build-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${action}`).classList.add('active');
            closeTowerMenu(); playSFX('shoot', 0.05, 2);
        }

        function updateUI() {
            document.getElementById('waveUi').innerText = wave;
            document.getElementById('goldUi').innerText = `🪙 ${inGameGold}`;
            document.getElementById('livesUi').innerText = `${lives} ❤️`;
        }

        // ПУТЬ (скорректирован, чтобы замок был выше кнопок)
        const pathW = 40; 
        const waypoints = [
            { x: canvas.width * 0.15, y: -50 }, { x: canvas.width * 0.15, y: canvas.height * 0.20 },
            { x: canvas.width * 0.80, y: canvas.height * 0.20 }, { x: canvas.width * 0.80, y: canvas.height * 0.45 },
            { x: canvas.width * 0.20, y: canvas.height * 0.45 }, { x: canvas.width * 0.20, y: canvas.height * 0.70 },
            { x: canvas.width * 0.70, y: canvas.height * 0.70 }, { x: canvas.width * 0.70, y: canvas.height - 120 } 
        ];

        function generateMapDetails() {
            buildPlots = [];
            for(let x = 45; x < canvas.width - 45; x += 60) {
                // Башни генерируются только до UI_BOT (чтобы не лезть под кнопки)
                for(let y = 100; y < canvas.height - 130; y += 60) {
                    let tooClose = false;
                    for (let j = 0; j < waypoints.length - 1; j++) {
                        if (Math.sqrt(distToSegmentSquared({x, y}, waypoints[j], waypoints[j+1])) < pathW/2 + 25) { tooClose = true; break; }
                    }
                    if (!tooClose) buildPlots.push({ x: x + (Math.random()*10-5), y: y + (Math.random()*10-5), occupied: false, tower: null });
                }
            }
        }
        generateMapDetails();

        function triggerShake(intensity) { screenShake = Math.max(screenShake, intensity); }
        
        function createExplosion(x, y, color, sizeMult = 1, isBlood = false) {
            if (!isBlood) {
                playSFX('boom', 0.15 * sizeMult, 0.8 + Math.random()*0.4);
                shockwaves.push({ x, y, radius: 5, maxRadius: 60 * sizeMult, life: 1.0, color: '#fff' });
                if(sizeMult > 1.5) triggerShake(6 * sizeMult);
                scorchMarks.push({ x, y, size: 25 * sizeMult, life: 1000 }); 
            } else {
                scorchMarks.push({ x, y, size: 15 * sizeMult, life: 400, isBlood: true });
            }
            for (let i = 0; i < 15 * sizeMult; i++) {
                particles.push({
                    x: x, y: y, vx: (Math.random() - 0.5) * 14 * sizeMult, vy: (Math.random() - 0.5) * 14 * sizeMult - (isBlood ? 2 : 0),
                    life: 1.0 + Math.random()*0.5, decay: 0.02 + Math.random() * 0.04, color: color, size: Math.random() * 6 * sizeMult + 2, isSpark: !isBlood
                });
            }
        }

        function createFloatText(x, y, text, color, size=16, isCrit=false) {
            floatTexts.push({ x, y, text, color, life: 1.0, vy: isCrit ? -2 : -1, size: isCrit ? size*1.5 : size, isCrit });
        }

        // АКТИВНЫЙ НАВЫК: МЕТЕОРИТ
        function castMeteor(tx, ty) {
            inGameGold -= 150;
            updateUI();
            selectedAction = 'basic'; // Сброс выбора
            document.querySelectorAll('.build-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-basic').classList.add('active');
            
            createFloatText(tx, ty - 50, "ВХОДЯЩИЙ УДАР!", "#ff4757", 24, true);
            
            setTimeout(() => {
                if(gameState !== 'PLAYING') return;
                createExplosion(tx, ty, '#ff7f50', 4); 
                enemies.forEach(e => {
                    if (Math.hypot(e.x - tx, e.y - ty) < 150 && !e.dead) { 
                        e.hp -= 500; 
                        if (e.hp <= 0 && !e.dead) killEnemy(e);
                    }
                });
            }, 500); 
        }

        function spawnEnemy() {
            let hpBase = 40 + (wave * 25); 
            
            if (wave % 5 === 0 && enemiesToSpawn === 1) { 
                triggerShake(10); playSFX('boom', 0.4, 0.5);
                enemies.push({ x: waypoints[0].x, y: waypoints[0].y, targetIdx: 1, baseSpeed: 0.5, speed: 0.5, hp: hpBase * 12, maxHp: hpBase * 12, color: '#2f3640', size: 35, reward: 300, slowTimer: 0, type: 'boss', regen: wave * 2, isFlying: false });
                createFloatText(canvas.width/2, 100, "БОСС ОГР!", "#ff4757", 40, true);
            } else {
                let rand = Math.random();
                if (wave >= 8 && rand > 0.8) { 
                    let baseTarget = waypoints[waypoints.length-1];
                    enemies.push({ x: waypoints[0].x + (Math.random()*100-50), y: -50, targetIdx: 0, baseSpeed: 1.0, speed: 1.0, hp: hpBase * 0.8, maxHp: hpBase * 0.8, color: '#8e44ad', size: 14, reward: 20, slowTimer: 0, type: 'fly', isFlying: true, targetX: baseTarget.x, targetY: baseTarget.y });
                }
                else if (wave >= 3 && rand > 0.6) { 
                    enemies.push({ x: waypoints[0].x, y: waypoints[0].y, targetIdx: 1, baseSpeed: 2.2, speed: 2.2, hp: hpBase * 0.6, maxHp: hpBase * 0.6, color: '#f39c12', size: 10, reward: 15, slowTimer: 0, type: 'wolf', isFlying: false }); 
                } 
                else if (wave >= 2 && rand > 0.4) { 
                    enemies.push({ x: waypoints[0].x, y: waypoints[0].y, targetIdx: 1, baseSpeed: 1.0, speed: 1.0, hp: hpBase * 2, maxHp: hpBase * 2, color: '#718093', size: 16, reward: 20, slowTimer: 0, type: 'tank', isFlying: false }); 
                } 
                else { 
                    enemies.push({ x: waypoints[0].x, y: waypoints[0].y, targetIdx: 1, baseSpeed: 1.4, speed: 1.4, hp: hpBase, maxHp: hpBase, color: '#2ecc71', size: 12, reward: 10, slowTimer: 0, type: 'normal', isFlying: false }); 
                }
            }
        }

        function nextWave() {
            wave++;
            enemiesToSpawn = wave % 5 === 0 ? 1 : (8 + Math.floor(wave * 3)); 
            waveTimer = 200; 
            sessionGlobalCoins += 15;
            if(wave > 1) {
                inGameGold += 50;
                createFloatText(canvas.width/2, 120, `ВОЛНА ${wave} (+50g)`, "#fbc531", 24, true);
            }
            updateUI();
        }

        function resetGame() {
            wave = 0; inGameGold = 250; sessionGlobalCoins = 0; lives = 20; screenShake = 0; gameSpeed = 1; closeTowerMenu();
            enemies = []; towers = []; bullets = []; particles = []; floatTexts = []; scorchMarks = []; shockwaves = []; lightnings = [];
            buildPlots.forEach(p => { p.occupied = false; p.tower = null; });
            gameState = 'PLAYING'; nextWave();
        }

        window.resetGameFromUI = function() {
            document.getElementById('goOverlay').style.display = 'none';
            document.getElementById('bottomUI').style.display = 'flex';
            resetGame();
        }

        function distToSegmentSquared(p, v, w) {
            let l2 = (v.x - w.x)**2 + (v.y - w.y)**2; if (l2 === 0) return (p.x - v.x)**2 + (p.y - v.y)**2;
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2; t = Math.max(0, Math.min(1, t));
            return (p.x - (v.x + t * (w.x - v.x)))**2 + (p.y - (v.y + t * (w.y - v.y)))**2;
        }

        function updateLogic() {
            frameCount++;
            if (screenShake > 0) screenShake *= 0.9; if (screenShake < 0.5) screenShake = 0;

            if (enemiesToSpawn > 0) {
                if (waveTimer > 0) waveTimer--;
                else { spawnCooldown--; if (spawnCooldown <= 0) { spawnEnemy(); enemiesToSpawn--; spawnCooldown = wave % 5 === 0 ? 0 : Math.max(15, 40 - wave); } }
            } else if (enemies.length === 0) { nextWave(); }

            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= p.decay; if(p.isSpark) { p.vx *= 0.95; p.vy += 0.2; } }); particles = particles.filter(p => p.life > 0);
            floatTexts.forEach(ft => { ft.y += ft.vy; ft.life -= 0.015; }); floatTexts = floatTexts.filter(ft => ft.life > 0);
            scorchMarks.forEach(s => s.life--); scorchMarks = scorchMarks.filter(s => s.life > 0);
            shockwaves.forEach(sw => { sw.radius += (sw.maxRadius - sw.radius) * 0.15; sw.life -= 0.05; }); shockwaves = shockwaves.filter(sw => sw.life > 0);
            lightnings.forEach(l => l.life -= 0.1); lightnings = lightnings.filter(l => l.life > 0);

            // ВРАГИ
            enemies.forEach(e => {
                if (e.slowTimer > 0) { e.slowTimer--; e.speed = e.baseSpeed * 0.5; } else { e.speed = e.baseSpeed; }
                if (e.type === 'boss' && frameCount % 30 === 0 && e.hp < e.maxHp) e.hp = Math.min(e.maxHp, e.hp + e.regen); 

                if (e.isFlying) {
                    let dx = e.targetX - e.x; let dy = e.targetY - e.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist < e.speed) {
                        lives -= 2; triggerShake(5); createExplosion(e.x, e.y, '#8e44ad', 1.5); e.dead = true;
                    } else {
                        e.x += (dx / dist) * e.speed; e.y += (dy / dist) * e.speed;
                    }
                } else {
                    let target = waypoints[e.targetIdx];
                    let dx = target.x - e.x; let dy = target.y - e.y;
                    let dist = Math.hypot(dx, dy);

                    if (dist < e.speed) {
                        e.x = target.x; e.y = target.y; e.targetIdx++;
                        if (e.targetIdx >= waypoints.length) {
                            lives -= (e.type === 'boss' ? 10 : (e.size > 13 ? 2 : 1));
                            triggerShake(15); createExplosion(e.x, e.y, '#e84118', 3); e.dead = true;
                        }
                    } else { e.x += (dx / dist) * e.speed; e.y += (dy / dist) * e.speed; }
                }
            });
            
            if(enemies.some(e => e.dead)) updateUI();
            
            // ЛОГИКА ПОРАЖЕНИЯ (С ОВЕРЛЕЕМ)
            if (lives <= 0 && gameState === 'PLAYING') { 
                gameState = 'GAME_OVER'; 
                closeTowerMenu(); 
                document.getElementById('bottomUI').style.display = 'none'; 
                document.getElementById('goStats').innerText = `Волн пережито: ${wave-1}\nВ Хаб: +${sessionGlobalCoins} 🪙`;
                document.getElementById('goOverlay').style.display = 'flex';
                sendScoreToDatabase(sessionGlobalCoins); 
            }

            // БАШНИ
            towers.forEach(t => {
                if (t.cooldown > 0) t.cooldown--;
                if (t.recoil > 0) t.recoil -= 0.6; 

                let closestEnemy = null; let minDist = t.range;
                enemies.filter(e => !e.dead).forEach(e => {
                    let d = Math.hypot(e.x - t.x, e.y - t.y);
                    if (d < minDist) { minDist = d; closestEnemy = e; }
                });

                if (closestEnemy && t.cooldown <= 0) {
                    t.angle = Math.atan2(closestEnemy.y - (t.y-25), closestEnemy.x - t.x); 
                    
                    if (t.type === 'tesla') {
                        playSFX('shoot', 0.1, 3); t.recoil = 3; t.cooldown = t.fireRate;
                        let chainCount = t.level; 
                        let currentTarget = closestEnemy; let lastNode = {x: t.x, y: t.y-25}; let hitEnemies = [];

                        for(let i=0; i<=chainCount; i++) {
                            if(!currentTarget) break;
                            hitEnemies.push(currentTarget);
                            lightnings.push({ start: lastNode, end: {x: currentTarget.x, y: currentTarget.y}, life: 1.0 });
                            
                            currentTarget.hp -= t.damage;
                            particles.push({x: currentTarget.x, y: currentTarget.y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1, decay:0.1, color:'#fff', size:4, isSpark:true});
                            if (currentTarget.hp <= 0 && !currentTarget.dead) killEnemy(currentTarget);

                            lastNode = {x: currentTarget.x, y: currentTarget.y};
                            let nextTarget = null; let nextMinDist = 90; 
                            enemies.filter(e => !e.dead && !hitEnemies.includes(e)).forEach(e => {
                                let d = Math.hypot(e.x - lastNode.x, e.y - lastNode.y);
                                if(d < nextMinDist) { nextMinDist = d; nextTarget = e; }
                            });
                            currentTarget = nextTarget;
                        }
                    } else {
                        playSFX('shoot', t.type==='basic'?0.05:0.02, t.type==='basic'?1:1.5); 
                        t.recoil = 8; t.cooldown = t.fireRate;
                        bullets.push({ x: t.x + Math.cos(t.angle)*15, y: (t.y-25) + Math.sin(t.angle)*15, target: closestEnemy, speed: t.type === 'magic' ? 7 : 14, damage: t.damage, type: t.type, targetX: closestEnemy.x, targetY: closestEnemy.y });
                        particles.push({x: t.x + Math.cos(t.angle)*25, y: (t.y-25) + Math.sin(t.angle)*25, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, life:1, decay:0.08, color: t.type === 'magic' ? '#00d2d3' : '#d2dae2', size: 6});
                    }
                }
            });

            // ПУЛИ
            bullets.forEach(b => {
                let dx = (b.type === 'magic' ? b.targetX : b.target.x) - b.x;
                let dy = (b.type === 'magic' ? b.targetY : b.target.y) - b.y;
                let dist = Math.hypot(dx, dy);

                if (dist < b.speed) {
                    b.dead = true;
                    if (b.type === 'magic') {
                        createExplosion(b.targetX, b.targetY, '#0fb9b1', 1.8 + b.damage/40);
                        enemies.forEach(e => {
                            if (Math.hypot(e.x - b.targetX, e.y - b.targetY) < 60 + b.damage/2 && !e.dead) { 
                                e.hp -= b.damage; e.slowTimer = 180; 
                                if (e.hp <= 0 && !e.dead) killEnemy(e);
                            }
                        });
                    } else {
                        if(b.target.dead) return;
                        b.target.hp -= b.damage;
                        particles.push({x: b.target.x, y: b.target.y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life:0.8, decay:0.1, color:'#f1c40f', size:4, isSpark:true});
                        if (b.target.hp <= 0 && !b.target.dead) killEnemy(b.target);
                    }
                } else { 
                    b.x += (dx / dist) * b.speed; b.y += (dy / dist) * b.speed; 
                    if(b.type === 'magic') particles.push({x: b.x, y: b.y, vx:0, vy:0, life:0.5, decay:0.1, color:'#00d2d3', size:4}); 
                }
            });

            enemies = enemies.filter(e => !e.dead); bullets = bullets.filter(b => !b.dead);
        }

        function update() {
            if(gameState !== 'PLAYING') return;
            for(let i=0; i<gameSpeed; i++) { updateLogic(); }
        }

        function killEnemy(e) {
            e.dead = true; inGameGold += e.reward; updateUI();
            createExplosion(e.x, e.y, '#e84118', e.type === 'boss' ? 4 : 1.2, true); 
            createFloatText(e.x, e.y-10, `+${e.reward}`, "#fbc531", e.type === 'boss'? 24:16);
            if (e.type === 'boss') { sessionGlobalCoins += 200; triggerShake(20); }
        }

        function openTowerMenu(plot) {
            selectedTowerForUpgrade = plot.tower;
            let menu = document.getElementById('towerMenu');
            menu.style.display = 'flex';
            
            let mX = plot.x; let mY = plot.y - 60;
            if (mX < 70) mX = 70; if (mX > canvas.width - 70) mX = canvas.width - 70;
            if (mY < 120) mY = plot.y + 40; 

            menu.style.left = `${mX}px`; menu.style.top = `${mY}px`; 
            updateMenuButtons();
        }

        function closeTowerMenu() { selectedTowerForUpgrade = null; document.getElementById('towerMenu').style.display = 'none'; }

        function updateMenuButtons() {
            if(!selectedTowerForUpgrade) return;
            let t = selectedTowerForUpgrade;
            let btnUp = document.getElementById('btn-upgrade');
            let btnSell = document.getElementById('btn-sell');
            
            btnSell.innerText = `ПРОДАТЬ (${Math.floor(t.totalCost * 0.8)})`;
            if (t.level >= 3) { btnUp.innerText = "МАКСИМУМ"; btnUp.style.opacity = '0.5'; } 
            else { let upCost = t.baseCost * t.level; btnUp.innerText = `АПГРЕЙД (${upCost})`; btnUp.style.opacity = '1.0'; }
        }

        window.upgradeSelectedTower = function() {
            if(!selectedTowerForUpgrade || selectedTowerForUpgrade.level >= 3) return;
            let t = selectedTowerForUpgrade; let upCost = t.baseCost * t.level;

            if (inGameGold >= upCost) {
                inGameGold -= upCost; updateUI();
                t.totalCost += upCost; t.level++;
                
                t.damage = Math.floor(t.damage * 1.5);
                t.range += 10;
                t.fireRate = Math.max(10, Math.floor(t.fireRate * 0.8));

                playSFX('shoot', 0.2, 0.5); createExplosion(t.x, t.y, '#f1c40f', 2);
                createFloatText(t.x, t.y - 40, "UPGRADE!", "#f1c40f", 20, true);
                updateMenuButtons();
            } else { createFloatText(t.x, t.y - 40, "НЕТ ЗОЛОТА!", "#e84118", 18); }
        }

        window.sellSelectedTower = function() {
            if(!selectedTowerForUpgrade) return;
            let t = selectedTowerForUpgrade;
            let refund = Math.floor(t.totalCost * 0.8);
            inGameGold += refund; updateUI();
            createFloatText(t.x, t.y - 30, `+${refund}g`, "#f1c40f", 20);
            playSFX('boom', 0.1, 2);
            
            towers.splice(towers.indexOf(t), 1);
            let plot = buildPlots.find(p => p.x === t.x && p.y === t.y);
            if(plot) { plot.occupied = false; plot.tower = null; }
            closeTowerMenu();
        }

        function drawIsometricTower(ctx, t) {
            const bx = t.x; const by = t.y; const size = 20; 
            ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(bx, by+12, size*1.2, size*0.6, 0, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = '#485460'; ctx.beginPath(); ctx.moveTo(bx-size, by-size*0.5); ctx.lineTo(bx+size, by-size*0.5); ctx.lineTo(bx+size, by+size*0.5); ctx.lineTo(bx-size, by+size*0.5); ctx.fill(); 
            ctx.fillStyle = '#808e9b'; ctx.beginPath(); ctx.moveTo(bx-size, by-size*0.5); ctx.lineTo(bx, by-size); ctx.lineTo(bx+size, by-size*0.5); ctx.lineTo(bx, by); ctx.fill(); 
            
            ctx.save(); ctx.translate(bx, by-25); ctx.rotate(t.angle);
            if (t.type === 'basic') {
                ctx.fillStyle = '#1e272e'; ctx.fillRect(-12 - t.recoil, -8, 32 + (t.level*4), 16); 
                ctx.fillStyle = '#f1f2f6'; ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill(); 
            } else if (t.type === 'magic') {
                let floatY = Math.sin(frameCount * 0.12) * 4;
                ctx.shadowBlur = 15; ctx.shadowColor = '#00d2d3'; ctx.fillStyle = '#00d2d3'; 
                ctx.beginPath(); ctx.moveTo(0, -18 - (t.level*3) + floatY); ctx.lineTo(12+(t.level*2), 0+floatY); ctx.lineTo(0, 18+(t.level*3)+floatY); ctx.lineTo(-12-(t.level*2), 0+floatY); ctx.fill(); ctx.shadowBlur = 0;
            } else if (t.type === 'tesla') {
                ctx.shadowBlur = 10; ctx.shadowColor = '#575fcf';
                ctx.fillStyle = '#3c40c6'; ctx.fillRect(-10, -10, 20, 20); 
                ctx.fillStyle = '#fff'; ctx.fillRect(0, -5, 18 + t.recoil + (t.level*2), 10); 
                ctx.shadowBlur = 0;
            }
            ctx.restore();

            let lvlY = by - 45;
            ctx.shadowBlur = 10; ctx.shadowColor = '#f1c40f'; ctx.fillStyle = '#f1c40f';
            for(let i=0; i<t.level; i++) {
                let pX = bx - ((t.level-1)*6) + (i*12);
                ctx.beginPath(); ctx.moveTo(pX, lvlY-4); ctx.lineTo(pX+4, lvlY); ctx.lineTo(pX, lvlY+4); ctx.lineTo(pX-4, lvlY); ctx.fill();
            }
            ctx.shadowBlur = 0;

            if (selectedTowerForUpgrade === t) {
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]);
                ctx.beginPath(); ctx.arc(bx, by-10, t.range, 0, Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
            }
        }

        function drawEnemyGoblins(ctx, e) {
            if (e.isFlying) {
                let wingFlap = Math.sin(frameCount * 0.5) * 10;
                ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(e.x, e.y+40, e.size*1.5, e.size*0.5, 0, 0, Math.PI*2); ctx.fill(); 
                
                ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(e.x-e.size*2, e.y-wingFlap); ctx.lineTo(e.x-e.size*0.5, e.y+e.size); ctx.fill();
                ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(e.x+e.size*2, e.y-wingFlap); ctx.lineTo(e.x+e.size*0.5, e.y+e.size); ctx.fill();
                
                let hpW = e.size * 2; ctx.fillStyle = '#ff3f34'; ctx.fillRect(e.x - hpW/2, e.y - e.size - 10, hpW, 3);
                ctx.fillStyle = '#0be881'; ctx.fillRect(e.x - hpW/2, e.y - e.size - 10, hpW * (e.hp / e.maxHp), 3);
                return;
            }

            let wobble = Math.sin(frameCount * (e.type==='boss'?0.1:0.3)) * (e.type==='boss'?4:2); 
            const s = e.size; const eyeY = e.y - s*0.3 + wobble;
            ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(e.x, e.y+s*0.8, s*1.2, s*0.5, 0, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = e.color; ctx.beginPath(); ctx.ellipse(e.x, e.y+wobble, s, s*1.1, 0, 0, Math.PI*2); ctx.fill();
            if (e.type !== 'boss') { 
                ctx.beginPath(); ctx.moveTo(e.x-s*0.6, e.y-s*0.5+wobble); ctx.lineTo(e.x-s*1.5, e.y-s*0.8+wobble); ctx.lineTo(e.x-s*0.8, e.y+wobble); ctx.fill();
                ctx.beginPath(); ctx.moveTo(e.x+s*0.6, e.y-s*0.5+wobble); ctx.lineTo(e.x+s*1.5, e.y-s*0.8+wobble); ctx.lineTo(e.x+s*0.8, e.y+wobble); ctx.fill();
            } else { 
                ctx.fillStyle='#f1f2f6'; ctx.beginPath(); ctx.moveTo(e.x-s*0.5, e.y-s+wobble); ctx.lineTo(e.x-s*0.8, e.y-s*1.5+wobble); ctx.lineTo(e.x-s*0.2, e.y-s*0.8+wobble); ctx.fill();
                ctx.beginPath(); ctx.moveTo(e.x+s*0.5, e.y-s+wobble); ctx.lineTo(e.x+s*0.8, e.y-s*1.5+wobble); ctx.lineTo(e.x+s*0.2, e.y-s*0.8+wobble); ctx.fill();
            }

            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(e.x-s*0.3, eyeY, s*0.25, 0, Math.PI*2); ctx.arc(e.x+s*0.3, eyeY, s*0.25, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = e.slowTimer > 0 ? '#00d2d3' : '#1e272e'; ctx.beginPath(); ctx.arc(e.x-s*0.3, eyeY, s*0.12, 0, Math.PI*2); ctx.arc(e.x+s*0.3, eyeY, s*0.12, 0, Math.PI*2); ctx.fill();
            
            if (e.slowTimer > 0) { ctx.strokeStyle = 'rgba(0, 210, 211, 0.6)'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(e.x, e.y+wobble, s+5, 0, Math.PI*2); ctx.stroke(); }

            let hpW = s * 2.5; let hpY = e.y - s - 15 + wobble;
            ctx.fillStyle = '#ff3f34'; ctx.fillRect(e.x - hpW/2, hpY, hpW, 5);
            ctx.fillStyle = '#0be881'; ctx.fillRect(e.x - hpW/2, hpY, hpW * (e.hp / e.maxHp), 5);
        }

        function draw() {
            let sx = (Math.random()-0.5)*screenShake; let sy = (Math.random()-0.5)*screenShake;
            ctx.save(); ctx.translate(sx, sy);

            ctx.fillStyle = '#20bf6b'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            scorchMarks.forEach(s => {
                ctx.fillStyle = s.isBlood ? `rgba(142, 68, 173, ${s.life/400})` : `rgba(30, 39, 46, ${s.life/1000})`;
                ctx.beginPath(); ctx.ellipse(s.x, s.y, s.size, s.size*0.6, 0, 0, Math.PI*2); ctx.fill();
            });

            ctx.strokeStyle = '#d1ccc0'; ctx.lineWidth = pathW + 12; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; 
            ctx.beginPath(); ctx.moveTo(waypoints[0].x, waypoints[0].y); for (let i = 1; i < waypoints.length; i++) ctx.lineTo(waypoints[i].x, waypoints[i].y); ctx.stroke();
            ctx.strokeStyle = '#a4b0be'; ctx.lineWidth = pathW + 6; ctx.stroke(); 
            ctx.strokeStyle = '#f1f2f6'; ctx.lineWidth = pathW; ctx.stroke(); 
            ctx.strokeStyle = '#ced6e0'; ctx.lineWidth = pathW - 10; ctx.setLineDash([15, 10]); ctx.stroke(); ctx.setLineDash([]); 

            buildPlots.forEach(p => {
                ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(p.x, p.y+8, 26, 13, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = p.occupied ? '#485460' : '#808e9b'; ctx.beginPath(); ctx.ellipse(p.x, p.y, 24, 12, 0, 0, Math.PI*2); ctx.fill();
                
                if (!p.occupied && selectedAction && selectedAction !== 'meteor') {
                    let cost = selectedAction === 'magic' ? 120 : (selectedAction === 'tesla' ? 200 : 50);
                    ctx.strokeStyle = inGameGold >= cost ? '#0be881' : '#ff3f34'; ctx.lineWidth = 2; ctx.stroke();
                }
            });

            let baseW = waypoints[waypoints.length-1];
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.ellipse(baseW.x, baseW.y+10, 60, 30, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#485460'; ctx.fillRect(baseW.x-50, baseW.y-50, 100, 60); 
            ctx.fillStyle = '#1e272e'; ctx.fillRect(baseW.x-60, baseW.y-75, 30, 35); ctx.fillRect(baseW.x+30, baseW.y-75, 30, 35);
            ctx.fillStyle = '#38ada9'; ctx.beginPath(); ctx.moveTo(baseW.x-65, baseW.y-75); ctx.lineTo(baseW.x-45, baseW.y-110); ctx.lineTo(baseW.x-25, baseW.y-75); ctx.fill(); ctx.beginPath(); ctx.moveTo(baseW.x+25, baseW.y-75); ctx.lineTo(baseW.x+45, baseW.y-110); ctx.lineTo(baseW.x+65, baseW.y-75); ctx.fill();

            towers.forEach(t => drawIsometricTower(ctx, t));
            
            enemies.filter(e => !e.isFlying).forEach(e => drawEnemyGoblins(ctx, e));

            shockwaves.forEach(sw => {
                ctx.strokeStyle = `rgba(255, 255, 255, ${sw.life})`; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.ellipse(sw.x, sw.y, sw.radius, sw.radius*0.6, 0, 0, Math.PI*2); ctx.stroke();
            });

            lightnings.forEach(l => {
                ctx.shadowBlur = 15; ctx.shadowColor = '#575fcf';
                ctx.strokeStyle = `rgba(95, 39, 205, ${l.life})`; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(l.start.x, l.start.y); 
                let midX = (l.start.x + l.end.x)/2 + (Math.random()-0.5)*20; let midY = (l.start.y + l.end.y)/2 + (Math.random()-0.5)*20;
                ctx.lineTo(midX, midY); ctx.lineTo(l.end.x, l.end.y); ctx.stroke();
                ctx.shadowBlur = 0; ctx.strokeStyle = `rgba(255, 255, 255, ${l.life})`; ctx.lineWidth = 2; ctx.stroke();
            });

            bullets.forEach(b => {
                ctx.fillStyle = b.type === 'magic' ? '#00d2d3' : '#f1c40f';
                ctx.shadowBlur = b.type === 'magic' ? 15 : 5; ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.type === 'magic' ? 7 : 4, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            });

            enemies.filter(e => e.isFlying).forEach(e => drawEnemyGoblins(ctx, e));

            particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life); ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); }); ctx.globalAlpha = 1.0;
            floatTexts.forEach(ft => { ctx.fillStyle = ft.color; ctx.globalAlpha = Math.max(0, ft.life); ctx.font = `${ft.isCrit?'900':'bold'} ${ft.size}px Montserrat`; ctx.textAlign = 'center'; ctx.shadowBlur = 4; ctx.shadowColor = '#000'; ctx.fillText(ft.text, ft.x, ft.y); ctx.shadowBlur = 0; }); ctx.globalAlpha = 1.0;

            ctx.restore(); 

            if (selectedAction === 'meteor' && inGameGold >= 150) {
                ctx.fillStyle = 'rgba(232, 65, 24, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.font='bold 20px Montserrat';
                ctx.fillText("ТАПНИ В ЛЮБУЮ ТОЧКУ ДЛЯ УДАРА", canvas.width/2, canvas.height/2);
            }

            update(); requestAnimationFrame(draw);
        }

        window.addEventListener('touchstart', (e) => {
            initWebAudio();
            // Защита от мисскликов по интерфейсу
            if (e.target.id === 'backBtn' || e.target.id === 'speedBtn' || e.target.closest('#bottomUI') || e.target.closest('#towerMenu') || document.getElementById('tutOverlay').style.display === 'flex' || document.getElementById('goOverlay').style.display === 'flex') return;

            if (gameState === 'PLAYING') {
                const touch = e.touches[0]; let tx = touch.clientX; let ty = touch.clientY;
                if(ty < 60 || ty > canvas.height - 100) return; 

                if (selectedAction === 'meteor') {
                    if (inGameGold >= 150) { castMeteor(tx, ty); } 
                    else { createFloatText(tx, ty-30, "НЕТ ЗОЛОТА!", "#ff3f34", 22, true); selectedAction = 'basic'; document.querySelectorAll('.build-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-basic').classList.add('active'); }
                    return;
                }

                let clickedPlot = null;
                buildPlots.forEach(p => { if (Math.hypot(tx - p.x, ty - p.y) < 30) clickedPlot = p; });

                if (clickedPlot) {
                    if (clickedPlot.occupied) {
                        openTowerMenu(clickedPlot);
                    } else {
                        closeTowerMenu();
                        let cost = selectedAction === 'tesla' ? 200 : (selectedAction === 'magic' ? 120 : 50);
                        if (inGameGold >= cost) {
                            inGameGold -= cost; updateUI(); clickedPlot.occupied = true;
                            let tData = { x: clickedPlot.x, y: clickedPlot.y, angle: 0, recoil: 0, cooldown: 0, type: selectedAction, level: 1, baseCost: cost, totalCost: cost };
                            if (selectedAction === 'basic') { tData.range = 140; tData.fireRate = 35; tData.damage = 15; }
                            else if (selectedAction === 'magic') { tData.range = 120; tData.fireRate = 100; tData.damage = 40; }
                            else { tData.range = 100; tData.fireRate = 80; tData.damage = 25; } 
                            
                            towers.push(tData); clickedPlot.tower = tData;
                            playSFX('shoot', 0.1, 0.5); createExplosion(clickedPlot.x, clickedPlot.y, '#f1f2f6', 2); 
                        } else { createFloatText(clickedPlot.x, clickedPlot.y-30, "НЕТ ЗОЛОТА!", "#ff3f34", 22, true); }
                    }
                } else { closeTowerMenu(); }
            }
        }, { passive: false });

        draw(); tg.ready();
    </script>
</body>
