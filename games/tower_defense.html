<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Defense</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #4cd137; overflow: hidden; touch-action: none; font-family: 'Trebuchet MS', Arial, sans-serif; user-select: none; }
        canvas { display: block; }
        
        #backBtn {
            position: absolute; top: 15px; left: 15px;
            background: linear-gradient(to bottom, #f1c40f, #e67e22); color: #2c3e50;
            border: 2px solid #fff; border-radius: 10px;
            padding: 8px 15px; font-weight: 900; font-size: 14px;
            z-index: 100; cursor: pointer; text-decoration: none;
            box-shadow: 0 4px 0 #d35400, 0 8px 10px rgba(0,0,0,0.3); 
            text-transform: uppercase; transition: 0.1s;
        }
        #backBtn:active { transform: translateY(4px); box-shadow: 0 0 0 #d35400; }

        /* КРАСИВЫЙ ИНТЕРФЕЙС ALAWAR STYLE */
        #buildUI {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(to bottom, #8e44ad, #2c3e50); 
            padding: 8px; border-radius: 20px;
            display: flex; gap: 10px; border: 3px solid #f1c40f; z-index: 50;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,0,0,0.5);
        }
        .build-btn {
            background: linear-gradient(to bottom, #34495e, #2c3e50);
            border: 2px solid #7f8c8d; border-radius: 12px;
            padding: 8px 15px; color: white; font-weight: bold; text-align: center;
            font-size: 12px; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            box-shadow: 0 4px 0 #1a252f;
        }
        .build-btn.active { 
            border-color: #f1c40f; background: linear-gradient(to bottom, #2980b9, #2c3e50); 
            transform: translateY(4px); box-shadow: 0 0 0 #1a252f, 0 0 15px rgba(241, 196, 15, 0.5); 
        }
        .build-btn span { color: #f1c40f; font-size: 15px; text-shadow: 1px 1px 0 #000; }
        
        .tower-icon { width: 24px; height: 24px; position: relative; }
        .icon-cannon::before { content: ''; position: absolute; bottom: 0; left: 4px; width: 16px; height: 12px; background: #95a5a6; border-radius: 4px; }
        .icon-cannon::after { content: ''; position: absolute; top: 4px; left: 10px; width: 14px; height: 6px; background: #2c3e50; transform: rotate(-30deg); }
        
        .icon-magic::before { content: ''; position: absolute; bottom: 0; left: 4px; width: 16px; height: 12px; background: #34495e; border-radius: 4px; }
        .icon-magic::after { content: ''; position: absolute; top: 0; left: 8px; width: 8px; height: 14px; background: #00ffcc; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
    </style>
</head>
<body>
    <button id="backBtn" onclick="window.location.href='../index.html'">◀ В МЕНЮ</button>
    
    <div id="buildUI">
        <div class="build-btn active" id="btn-basic" onclick="selectTower('basic')">
            <div class="tower-icon icon-cannon"></div> Каменная <span>50g</span>
        </div>
        <div class="build-btn" id="btn-magic" onclick="selectTower('magic')">
            <div class="tower-icon icon-magic"></div> Магическая <span>120g</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
        tg.setHeaderColor('#27ae60');

        const user = tg.initDataUnsafe?.user || { id: 12345, first_name: "General", username: "Guest" };
        const BACKEND_URL = "https://coral-app-jxzy5.ondigitalocean.app/game-api";

        let bankCoins = 0;       
        let nickname = user.username || user.first_name || "Генерал";

        async function loadUserData() {
            try {
                const res = await fetch(`${BACKEND_URL}/get_user`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ telegram_id: user.id, username: nickname }) });
                const data = await res.json(); bankCoins = Number(data.coins) || 0;
            } catch(e) {}
        }
        async function sendScoreToDatabase(collectedCoins) {
            try {
                const res = await fetch(`${BACKEND_URL}/save_score`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ telegram_id: user.id, username: nickname, score: 0, coins: collectedCoins }) });
                const result = await res.json(); bankCoins = Number(result.coins_total); 
            } catch (e) {}
        }
        loadUserData();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let audioCtx; const sfxBuffers = {};
        async function initWebAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const loadBuffer = async (url, key) => { try { const res = await fetch(url); const buf = await res.arrayBuffer(); sfxBuffers[key] = await audioCtx.decodeAudioData(buf); } catch (e) {} };
            await Promise.all([ loadBuffer('https://coral-app-jxzy5.ondigitalocean.app/game/shoot.mp3', 'shoot'), loadBuffer('https://coral-app-jxzy5.ondigitalocean.app/game/boom.mp3', 'boom') ]);
        }
        function playSFX(key, vol) {
            if (!audioCtx || !sfxBuffers[key]) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const source = audioCtx.createBufferSource(); source.buffer = sfxBuffers[key];
            const gainNode = audioCtx.createGain(); gainNode.gain.value = vol; 
            source.connect(gainNode); gainNode.connect(audioCtx.destination); source.start(0);
        }

        // ИГРОВЫЕ ПЕРЕМЕННЫЕ
        let gameState = 'PLAYING'; 
        let lives = 20; let inGameGold = 150; let sessionGlobalCoins = 0; let wave = 1;
        let enemies = []; let towers = []; let bullets = []; let particles = []; let floatTexts = []; let decorations = [];
        let selectedTowerType = 'basic'; 

        window.selectTower = function(type) {
            selectedTowerType = type;
            document.getElementById('btn-basic').classList.remove('active');
            document.getElementById('btn-magic').classList.remove('active');
            document.getElementById(`btn-${type}`).classList.add('active');
            playSFX('shoot', 0.05);
        }

        // КРАСИВЫЙ ИЗВИЛИСТЫЙ ПУТЬ
        const pathW = 45; 
        const waypoints = [
            { x: canvas.width * 0.15, y: -50 },
            { x: canvas.width * 0.15, y: canvas.height * 0.25 },
            { x: canvas.width * 0.85, y: canvas.height * 0.25 },
            { x: canvas.width * 0.85, y: canvas.height * 0.55 },
            { x: canvas.width * 0.25, y: canvas.height * 0.55 },
            { x: canvas.width * 0.25, y: canvas.height * 0.85 },
            { x: canvas.width * 0.75, y: canvas.height * 0.85 },
            { x: canvas.width * 0.75, y: canvas.height + 50 } 
        ];

        // ГЕНЕРАЦИЯ ДЕКОРАЦИЙ (Ёлочки и Камни)
        function generateDecorations() {
            decorations = [];
            for (let i = 0; i < 40; i++) {
                let dx = Math.random() * canvas.width; let dy = Math.random() * canvas.height;
                if (dy < 60 || dy > canvas.height - 100) continue; // Не лезем на UI
                
                let tooCloseToPath = false;
                for (let j = 0; j < waypoints.length - 1; j++) {
                    if (Math.sqrt(distToSegmentSquared({x: dx, y: dy}, waypoints[j], waypoints[j+1])) < pathW/2 + 20) { tooCloseToPath = true; break; }
                }
                if (!tooCloseToPath) {
                    let type = Math.random() > 0.3 ? 'tree' : 'rock';
                    decorations.push({ x: dx, y: dy, type: type, size: Math.random() * 10 + 15 });
                }
            }
        }
        generateDecorations();

        let waveTimer = 100; let enemiesToSpawn = 5; let spawnCooldown = 0; let frameCount = 0;

        function createExplosion(x, y, color, sizeMult = 1, isBlood = false) {
            if (!isBlood) playSFX('boom', 0.1 * sizeMult);
            for (let i = 0; i < 15 * sizeMult; i++) {
                particles.push({
                    x: x, y: y, vx: (Math.random() - 0.5) * 8 * sizeMult, vy: (Math.random() - 0.5) * 8 * sizeMult - (isBlood ? 2 : 0),
                    life: 1.0, decay: 0.02 + Math.random() * 0.03, color: color, size: Math.random() * 6 * sizeMult + 2
                });
            }
        }

        function createFloatText(x, y, text, color, size=18) {
            floatTexts.push({ x: x, y: y, text: text, color: color, life: 1.0, vy: -1, size: size });
        }

        function distToSegmentSquared(p, v, w) {
            let l2 = (v.x - w.x)**2 + (v.y - w.y)**2;
            if (l2 === 0) return (p.x - v.x)**2 + (p.y - v.y)**2;
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return (p.x - (v.x + t * (w.x - v.x)))**2 + (p.y - (v.y + t * (w.y - v.y)))**2;
        }

        function isValidBuildSpot(tx, ty) {
            if (ty < 60 || ty > canvas.height - 100) return false; 
            for (let t of towers) { if (Math.hypot(tx - t.x, ty - t.y) < 45) return false; }
            for (let i = 0; i < waypoints.length - 1; i++) {
                if (Math.sqrt(distToSegmentSquared({x: tx, y: ty}, waypoints[i], waypoints[i+1])) < pathW/2 + 25) return false; 
            }
            return true;
        }

        function spawnEnemy() {
            let rand = Math.random();
            let hpBase = 30 + (wave * 18);
            
            if (wave >= 5 && rand < 0.15) { // ТАНК (Орк)
                enemies.push({ x: waypoints[0].x, y: waypoints[0].y, targetIdx: 1, baseSpeed: 0.7, speed: 0.7, hp: hpBase * 4, maxHp: hpBase * 4, color: '#2c3e50', size: 16, reward: 25, slowTimer: 0 });
            } else if (wave >= 3 && rand > 0.7) { // БЫСТРЫЙ (Волк)
                enemies.push({ x: waypoints[0].x, y: waypoints[0].y, targetIdx: 1, baseSpeed: 2.2, speed: 2.2, hp: hpBase * 0.6, maxHp: hpBase * 0.6, color: '#e67e22', size: 10, reward: 10, slowTimer: 0 });
            } else { // ОБЫЧНЫЙ (Гоблин)
                enemies.push({ x: waypoints[0].x, y: waypoints[0].y, targetIdx: 1, baseSpeed: 1.2, speed: 1.2, hp: hpBase, maxHp: hpBase, color: '#27ae60', size: 12, reward: 10, slowTimer: 0 });
            }
        }

        function nextWave() {
            wave++; enemiesToSpawn = 5 + Math.floor(wave * 2); waveTimer = 250; 
            sessionGlobalCoins += 15;
            createFloatText(canvas.width/2, 120, "ВОЛНА ПРОЙДЕНА! +15 🪙 В БАНК!", "#f1c40f", 22);
        }

        function update() {
            if (gameState !== 'PLAYING') return;
            frameCount++;

            if (enemiesToSpawn > 0) {
                if (waveTimer > 0) waveTimer--;
                else {
                    spawnCooldown--;
                    if (spawnCooldown <= 0) { spawnEnemy(); enemiesToSpawn--; spawnCooldown = Math.max(30, 80 - wave * 2); }
                }
            } else if (enemies.length === 0) { nextWave(); }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }
            for (let i = floatTexts.length - 1; i >= 0; i--) {
                let ft = floatTexts[i]; ft.y += ft.vy; ft.life -= 0.02;
                if (ft.life <= 0) floatTexts.splice(i, 1);
            }

            // ВРАГИ (Движение + Замедление)
            enemies.forEach(e => {
                if (e.slowTimer > 0) { e.slowTimer--; e.speed = e.baseSpeed * 0.5; } 
                else { e.speed = e.baseSpeed; }

                let target = waypoints[e.targetIdx];
                let dx = target.x - e.x; let dy = target.y - e.y;
                let dist = Math.hypot(dx, dy);

                if (dist < e.speed) {
                    e.x = target.x; e.y = target.y; e.targetIdx++;
                    if (e.targetIdx >= waypoints.length) {
                        lives -= (e.size > 14 ? 3 : 1);
                        createExplosion(e.x, e.y, '#e74c3c', 2);
                        e.dead = true;
                        if (lives <= 0) { gameState = 'GAME_OVER'; document.getElementById('buildUI').style.display = 'none'; sendScoreToDatabase(sessionGlobalCoins); }
                    }
                } else {
                    e.x += (dx / dist) * e.speed; e.y += (dy / dist) * e.speed;
                }
            });

            // БАШНИ (Стрельба и Анимация отдачи)
            towers.forEach(t => {
                if (t.cooldown > 0) t.cooldown--;
                if (t.recoil > 0) t.recoil -= 0.5; // Возврат ствола

                let closestEnemy = null; let minDist = t.range;
                enemies.filter(e => !e.dead).forEach(e => {
                    let d = Math.hypot(e.x - t.x, e.y - t.y);
                    if (d < minDist) { minDist = d; closestEnemy = e; }
                });

                if (closestEnemy) {
                    // Плавный поворот пушки
                    let targetAngle = Math.atan2(closestEnemy.y - t.y, closestEnemy.x - t.x);
                    t.angle = targetAngle; 

                    if (t.cooldown <= 0) {
                        playSFX('shoot', 0.05);
                        t.recoil = 5; // Отдача
                        bullets.push({
                            x: t.x + Math.cos(t.angle)*10, y: t.y - 15 + Math.sin(t.angle)*10,
                            target: closestEnemy, speed: t.type === 'magic' ? 5 : 10, 
                            damage: t.damage, type: t.type, targetX: closestEnemy.x, targetY: closestEnemy.y
                        });
                        t.cooldown = t.fireRate;
                        
                        // Дымок из дула
                        particles.push({x: t.x + Math.cos(t.angle)*20, y: t.y - 15 + Math.sin(t.angle)*20, vx:(Math.random()-0.5), vy:(Math.random()-0.5), life:1, decay:0.05, color: t.type === 'magic' ? '#00ffcc' : '#fff', size: 6});
                    }
                }
            });

            // ПУЛИ И УРОН
            bullets.forEach(b => {
                if (b.type === 'magic') {
                    let dx = b.targetX - b.x; let dy = b.targetY - b.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist < b.speed) {
                        b.dead = true;
                        createExplosion(b.targetX, b.targetY, '#00ffcc', 1.5);
                        enemies.forEach(e => {
                            if (Math.hypot(e.x - b.targetX, e.y - b.targetY) < 70 && !e.dead) { 
                                e.hp -= b.damage; e.slowTimer = 120; // 2 секунды замедления
                                if (e.hp <= 0) { e.dead = true; inGameGold += e.reward; createFloatText(e.x, e.y-10, `+${e.reward}g`, "#f1c40f"); createExplosion(e.x, e.y, '#8e44ad', 1, true); }
                            }
                        });
                    } else {
                        b.x += (dx / dist) * b.speed; b.y += (dy / dist) * b.speed;
                        particles.push({x: b.x, y: b.y, vx:0, vy:0, life:0.5, decay:0.1, color:'#00ffcc', size:4}); 
                    }
                } 
                else {
                    if (b.target.dead) { b.dead = true; return; }
                    let dx = b.target.x - b.x; let dy = b.target.y - b.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist < b.speed) {
                        b.dead = true;
                        b.target.hp -= b.damage;
                        particles.push({x: b.target.x, y: b.target.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life:1, decay:0.1, color:'#bdc3c7', size:3});
                        if (b.target.hp <= 0) {
                            b.target.dead = true; inGameGold += b.target.reward;
                            createExplosion(b.target.x, b.target.y, '#8e44ad', 1, true); // Зеленая кровь гоблина
                            createFloatText(b.target.x, b.target.y-10, `+${b.target.reward}g`, "#f1c40f");
                        }
                    } else {
                        b.x += (dx / dist) * b.speed; b.y += (dy / dist) * b.speed;
                    }
                }
            });

            // ОЧИСТКА ПАМЯТИ (ЗАЩИТА ОТ ЗАВИСАНИЙ)
            enemies = enemies.filter(e => !e.dead);
            bullets = bullets.filter(b => !b.dead);
        }

        function draw() {
            // ФОН (Трава с шумом)
            ctx.fillStyle = '#4cd137'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            for(let i=0; i<100; i++) { ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 4, 4); }

            // ДОРОГА (Грунтовка с краями)
            ctx.strokeStyle = '#8d6e63'; ctx.lineWidth = pathW + 6; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(waypoints[0].x, waypoints[0].y);
            for (let i = 1; i < waypoints.length; i++) ctx.lineTo(waypoints[i].x, waypoints[i].y); ctx.stroke();
            
            ctx.strokeStyle = '#d35400'; ctx.lineWidth = pathW; ctx.stroke();
            ctx.strokeStyle = '#e67e22'; ctx.lineWidth = pathW - 10; ctx.stroke();

            // ДЕКОРАЦИИ
            decorations.forEach(d => {
                if (d.type === 'tree') {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(d.x+5, d.y+5, d.size, d.size/2, 0, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#27ae60'; ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#2ecc71'; ctx.beginPath(); ctx.arc(d.x-3, d.y-3, d.size*0.7, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(d.x+3, d.y+3, d.size, d.size/2, 0, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#7f8c8d'; ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#95a5a6'; ctx.beginPath(); ctx.arc(d.x-2, d.y-2, d.size*0.6, 0, Math.PI*2); ctx.fill();
                }
            });

            // БАЗА (Замок)
            let baseW = waypoints[waypoints.length-1];
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.ellipse(baseW.x, baseW.y, 45, 25, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#34495e'; ctx.fillRect(baseW.x - 35, baseW.y - 40, 70, 40);
            ctx.fillStyle = '#2c3e50'; ctx.fillRect(baseW.x - 40, baseW.y - 60, 20, 25); ctx.fillRect(baseW.x + 20, baseW.y - 60, 20, 25);
            ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.moveTo(baseW.x - 15, baseW.y - 40); ctx.lineTo(baseW.x, baseW.y - 70); ctx.lineTo(baseW.x + 15, baseW.y - 40); ctx.fill();

            // БАШНИ (Изометрия)
            towers.forEach(t => {
                // Тень
                ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(t.x, t.y + 10, 22, 12, 0, 0, Math.PI*2); ctx.fill();
                
                // Каменное основание (Цилиндр)
                ctx.fillStyle = '#7f8c8d'; ctx.fillRect(t.x - 18, t.y - 15, 36, 18);
                ctx.beginPath(); ctx.ellipse(t.x, t.y + 3, 18, 9, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#95a5a6'; ctx.beginPath(); ctx.ellipse(t.x, t.y - 15, 18, 9, 0, 0, Math.PI*2); ctx.fill();

                // Пушка/Магия
                ctx.save(); ctx.translate(t.x, t.y - 15); ctx.rotate(t.angle);
                
                if (t.type === 'basic') {
                    ctx.fillStyle = '#2c3e50'; ctx.fillRect(-10 - t.recoil, -6, 26, 12); // Ствол (откатывается назад)
                    ctx.fillStyle = '#bdc3c7'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill(); // Башня
                } else if (t.type === 'magic') {
                    // Левитирующий кристалл
                    let floatY = Math.sin(frameCount * 0.1) * 3;
                    ctx.shadowBlur = 15; ctx.shadowColor = '#00ffcc';
                    ctx.fillStyle = '#00ffcc'; 
                    ctx.beginPath(); ctx.moveTo(0, -12 + floatY); ctx.lineTo(8, 0 + floatY); ctx.lineTo(0, 12 + floatY); ctx.lineTo(-8, 0 + floatY); ctx.fill();
                    ctx.shadowBlur = 0;
                }
                ctx.restore();
            });

            // ВРАГИ (Wobble анимация)
            enemies.forEach(e => {
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(e.x, e.y + e.size*0.8, e.size, e.size/2, 0, 0, Math.PI*2); ctx.fill();
                
                let wobble = Math.sin(frameCount * 0.3) * 2; // Прыгающая походка
                
                ctx.fillStyle = e.color; 
                ctx.beginPath(); ctx.arc(e.x, e.y + wobble, e.size, 0, Math.PI*2); ctx.fill(); // Тело
                ctx.beginPath(); ctx.arc(e.x - e.size*0.7, e.y - e.size*0.3 + wobble, e.size*0.4, 0, Math.PI*2); ctx.fill(); // Ухо Л
                ctx.beginPath(); ctx.arc(e.x + e.size*0.7, e.y - e.size*0.3 + wobble, e.size*0.4, 0, Math.PI*2); ctx.fill(); // Ухо П
                
                // Глаза
                ctx.fillStyle = '#fff'; ctx.fillRect(e.x - e.size*0.4, e.y - e.size*0.2 + wobble, e.size*0.25, e.size*0.25); ctx.fillRect(e.x + e.size*0.15, e.y - e.size*0.2 + wobble, e.size*0.25, e.size*0.25);
                ctx.fillStyle = '#000'; ctx.fillRect(e.x - e.size*0.3, e.y - e.size*0.1 + wobble, e.size*0.1, e.size*0.1); ctx.fillRect(e.x + e.size*0.25, e.y - e.size*0.1 + wobble, e.size*0.1, e.size*0.1);

                // Эффект замедления
                if (e.slowTimer > 0) {
                    ctx.fillStyle = 'rgba(0, 255, 204, 0.4)'; ctx.beginPath(); ctx.arc(e.x, e.y + wobble, e.size + 4, 0, Math.PI*2); ctx.fill();
                }

                // Полоска ХП
                let hpW = e.size * 2;
                ctx.fillStyle = '#c0392b'; ctx.fillRect(e.x - hpW/2, e.y - e.size - 10 + wobble, hpW, 4);
                ctx.fillStyle = '#2ecc71'; ctx.fillRect(e.x - hpW/2, e.y - e.size - 10 + wobble, hpW * (e.hp / e.maxHp), 4);
            });

            // ПУЛИ
            bullets.forEach(b => {
                ctx.fillStyle = b.type === 'magic' ? '#00ffcc' : '#34495e';
                ctx.shadowBlur = b.type === 'magic' ? 10 : 0; ctx.shadowColor = b.type === 'magic' ? '#00ffcc' : 'transparent';
                ctx.beginPath(); ctx.arc(b.x, b.y, b.type === 'magic' ? 5 : 4, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            });

            // ЭФФЕКТЫ И ТЕКСТ
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life); ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); }); ctx.globalAlpha = 1.0;
            floatTexts.forEach(ft => { ctx.fillStyle = ft.color; ctx.globalAlpha = Math.max(0, ft.life); ctx.font = `900 ${ft.size}px Trebuchet MS`; ctx.textAlign = 'center'; ctx.shadowBlur = 4; ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.fillText(ft.text, ft.x, ft.y); ctx.shadowBlur = 0; }); ctx.globalAlpha = 1.0;

            // UI ВЕРХНЯЯ ПАНЕЛЬ
            ctx.fillStyle = 'rgba(44, 62, 80, 0.9)'; ctx.fillRect(0, 0, canvas.width, 50);
            ctx.fillStyle = '#bdc3c7'; ctx.fillRect(0, 50, canvas.width, 3);
            
            ctx.fillStyle = '#fff'; ctx.font = '900 16px Trebuchet MS'; ctx.textAlign = 'left';
            ctx.fillText(`ВОЛНА: ${wave}`, 15, 32);
            
            ctx.fillStyle = '#f1c40f'; ctx.textAlign = 'center'; ctx.font = '900 22px Trebuchet MS';
            ctx.shadowBlur = 5; ctx.shadowColor = '#000'; ctx.fillText(`🪙 ${inGameGold}`, canvas.width/2, 34); ctx.shadowBlur = 0;

            ctx.fillStyle = '#e74c3c'; ctx.textAlign = 'right'; ctx.font = '900 16px Trebuchet MS';
            ctx.fillText(`БАЗА: ${lives} ❤️`, canvas.width - 15, 32);

            if (gameState === 'GAME_OVER') {
                ctx.fillStyle = 'rgba(10, 20, 30, 0.9)'; ctx.fillRect(0, 0, canvas.width, canvas.height); 
                ctx.fillStyle = '#e74c3c'; ctx.textAlign = 'center'; ctx.font = '900 50px Trebuchet MS'; ctx.fillText('ЗАМОК ПАЛ!', canvas.width / 2, canvas.height / 2 - 50); 
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 24px Trebuchet MS'; ctx.fillText(`Пережито волн: ${wave}`, canvas.width / 2, canvas.height / 2 + 10); 
                ctx.fillStyle = '#f1c40f'; ctx.font = '900 30px Trebuchet MS'; ctx.fillText(`Добыто: +${sessionGlobalCoins} 🪙`, canvas.width / 2, canvas.height / 2 + 60); 
                
                ctx.globalAlpha = Math.abs(Math.sin(frameCount * 0.05));
                ctx.font = 'bold 20px Trebuchet MS'; ctx.fillStyle = '#00ffcc'; ctx.fillText('ТАПНИ ЧТОБЫ ПЕРЕИГРАТЬ', canvas.width / 2, canvas.height / 2 + 130);
                ctx.globalAlpha = 1.0;
            }

            update(); requestAnimationFrame(draw);
        }

        window.addEventListener('touchstart', (e) => {
            initWebAudio();
            if (e.target.id === 'backBtn' || e.target.closest('#buildUI')) return;

            if (gameState === 'GAME_OVER') {
                wave = 1; enemiesToSpawn = 5; enemies = []; towers = []; bullets = []; floatTexts = []; particles = [];
                inGameGold = 150; sessionGlobalCoins = 0; lives = 20; generateDecorations(); gameState = 'PLAYING';
                document.getElementById('buildUI').style.display = 'flex';
                return;
            }

            if (gameState === 'PLAYING') {
                const touch = e.touches[0];
                let tx = touch.clientX; let ty = touch.clientY;

                if (ty < 60 || ty > canvas.height - 100) return; 

                let cost = selectedTowerType === 'magic' ? 120 : 50;

                if (inGameGold >= cost) {
                    if (isValidBuildSpot(tx, ty)) {
                        inGameGold -= cost;
                        
                        let tData = { x: tx, y: ty, angle: 0, recoil: 0 };
                        if (selectedTowerType === 'basic') { tData.range = 130; tData.fireRate = 35; tData.cooldown = 0; tData.damage = 15; tData.type = 'basic'; }
                        if (selectedTowerType === 'magic') { tData.range = 110; tData.fireRate = 100; tData.cooldown = 0; tData.damage = 30; tData.type = 'magic'; }
                        
                        towers.push(tData);
                        playSFX('shoot', 0.1); createExplosion(tx, ty, '#bdc3c7', 2); 
                    } else {
                        createFloatText(tx, ty - 20, "НЕЛЬЗЯ!", "#e74c3c", 22);
                    }
                } else {
                    createFloatText(tx, ty - 20, "НЕТ ЗОЛОТА!", "#f1c40f", 22);
                }
            }
        }, { passive: false });

        draw(); tg.ready();
    </script>
</body>
</html>
