<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Breach - Ultra Graphics</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #020204; color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; touch-action: none; user-select: none; }
        
        /* УЛЬТРА-UI (Glassmorphism + Neon) */
        #topUI { 
            position: absolute; top: 0; left: 0; width: 100%; height: 75px; 
            background: linear-gradient(180deg, rgba(10, 15, 30, 0.8) 0%, rgba(5, 5, 10, 0.2) 100%); 
            backdrop-filter: blur(15px) saturate(150%); display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; box-sizing: border-box; z-index: 100; 
            border-bottom: 1px solid rgba(0, 243, 255, 0.2); box-shadow: 0 10px 40px rgba(0,0,0,0.9), inset 0 -1px 5px rgba(0,243,255,0.1); 
        }
        
        .stat-group { display: flex; flex-direction: column; }
        .rating { font-size: 18px; font-weight: 900; color: #ffea00; text-shadow: 0 0 15px rgba(255,234,0,0.8); display: flex; align-items: center; gap: 6px; letter-spacing: 1px; }
        .session-coins { font-size: 12px; color: #a5b1c2; margin-top: 3px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .session-coins span { color: #00f3ff; text-shadow: 0 0 8px rgba(0,243,255,0.6); }
        
        .top-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
        .timer { font-size: 28px; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(0,243,255,1), 0 0 40px rgba(0,243,255,0.5); line-height: 1; }
        .timer-warning { color: #ff003c; text-shadow: 0 0 20px rgba(255,0,60,1), 0 0 40px rgba(255,0,60,0.5); animation: pulseTimer 0.8s infinite alternate; }
        @keyframes pulseTimer { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
        
        .btn-pause { 
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)); color: #fff; 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 14px; width: 44px; height: 44px; 
            display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.3); transition: 0.1s;
        }
        .btn-pause:active { transform: translateY(4px); box-shadow: 0 0 0 #000; }

        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        /* ПАНЕЛЬ КОЛОДЫ */
        #bottomUI { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 180px; 
            background: linear-gradient(0deg, rgba(5,5,15,0.95) 20%, rgba(10,15,30,0.6) 100%); 
            backdrop-filter: blur(20px) saturate(120%); display: flex; flex-direction: column; justify-content: flex-end; 
            padding: 10px 15px 30px; box-sizing: border-box; z-index: 100; 
            border-top: 1px solid rgba(0, 243, 255, 0.3); box-shadow: 0 -15px 50px rgba(0,0,0,0.9); 
        }
        
        .mana-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; padding: 0 5px; }
        .mana-text { font-size: 12px; font-weight: 900; color: #00f3ff; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,243,255,0.5); }
        .mana-count { font-size: 26px; font-weight: 900; color: #fff; text-shadow: 0 0 20px #00f3ff; line-height: 1;}
        .mana-container { width: 100%; height: 14px; background: rgba(0,0,0,0.8); border-radius: 7px; position: relative; overflow: hidden; box-shadow: inset 0 3px 8px rgba(0,0,0,0.9), 0 1px 0 rgba(255,255,255,0.1); margin-bottom: 20px; }
        .mana-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #b534fa, #00f3ff); transition: width 0.1s linear; position: relative; box-shadow: 0 0 20px #00f3ff; }
        .mana-bar::after { content: ''; position: absolute; top:0; right:0; width:30px; height:100%; background: #fff; filter: blur(6px); }

        .cards-deck { display: flex; justify-content: space-between; width: 100%; gap: 12px; perspective: 800px; }
        .card { 
            flex: 1; background: linear-gradient(180deg, rgba(40,45,60,0.8) 0%, rgba(20,25,35,0.8) 100%); 
            border: 2px solid rgba(255,255,255,0.1); border-radius: 18px; height: 95px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            position: relative; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            opacity: 0.3; filter: grayscale(100%); box-shadow: 0 10px 20px rgba(0,0,0,0.8); touch-action: none;
        }
        .card.ready { opacity: 1; filter: grayscale(0%); border-color: rgba(0, 243, 255, 0.4); box-shadow: 0 10px 20px rgba(0,0,0,0.6), inset 0 2px 10px rgba(0,243,255,0.1); }
        .card.selected { transform: translateY(-15px) rotateX(15deg) scale(1.05); border-color: #fff; box-shadow: 0 20px 30px rgba(0,0,0,0.8), 0 0 30px rgba(0, 243, 255, 0.8); background: linear-gradient(180deg, rgba(0,243,255,0.2) 0%, rgba(0,150,255,0.2) 100%); }
        .card.dragging { opacity: 0; transform: scale(0.5); } 
        
        .card-icon { font-size: 36px; margin-bottom: 4px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.8)); pointer-events: none; }
        .card-cost { 
            position: absolute; top: -12px; left: -12px; background: linear-gradient(135deg, #ff003c 0%, #8a0020 100%); 
            border-radius: 50%; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; 
            font-size: 16px; font-weight: 900; color: #fff; border: 2px solid #fff; box-shadow: 0 5px 15px rgba(255,0,60,0.8); pointer-events: none;
        }
        .card-name { font-size: 11px; font-weight: 900; color: #fff; letter-spacing: 1px; text-shadow: 0 2px 4px #000; pointer-events: none; text-transform: uppercase; }

        /* ОВЕРЛЕИ */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 2, 5, 0.95); z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(20px); }
        .overlay h1 { font-size: 55px; margin-bottom: 10px; text-transform: uppercase; text-align: center; line-height: 1; font-style: italic; letter-spacing: 2px; }
        
        .lootbox-container { text-align: center; margin: 40px 0; cursor: pointer; position: relative; }
        .lootbox { font-size: 120px; filter: drop-shadow(0 0 50px rgba(255,234,0,0.8)); animation: float 2s infinite ease-in-out; transition: 0.1s; user-select: none; }
        .lootbox:active { transform: scale(0.85); filter: drop-shadow(0 0 20px rgba(255,234,0,0.5)); }
        
        @keyframes float { 0% {transform: translateY(0);} 50% {transform: translateY(-20px);} 100% {transform: translateY(0);} }

        .btn-primary { margin-top: 20px; background: linear-gradient(135deg, #00f3ff 0%, #0066ff 100%); color: #fff; font-size: 22px; font-weight: 900; padding: 20px 60px; border: none; border-radius: 18px; cursor: pointer; text-transform: uppercase; box-shadow: 0 8px 0 #0044aa, 0 20px 40px rgba(0,102,255,0.5); transition: 0.1s; letter-spacing: 1px;}
        .btn-primary:active { transform: translateY(8px); box-shadow: 0 0 0 #0044aa; }
        .btn-secondary { margin-top: 15px; background: transparent; color: #fff; font-size: 16px; font-weight: bold; border: 2px solid rgba(255,255,255,0.3); padding: 15px 40px; border-radius: 14px; cursor: pointer; transition: 0.2s; }
        .btn-secondary:active { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="topUI">
        <div class="stat-group">
            <div class="rating">🏆 <span id="ratingVal">1250</span></div>
            <div class="session-coins">Фарм: <span id="sessionCoins">0</span> 🪙</div>
        </div>
        <div class="top-center">
            <div class="timer" id="gameTimer">3:00</div>
        </div>
        <button class="btn-pause" onclick="togglePause()">⏸</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="bottomUI">
        <div class="mana-header">
            <div class="mana-text">Энергия ядра</div>
            <div class="mana-count"><span id="manaVal">0</span><span style="color:#576574; font-size:16px;">/10</span></div>
        </div>
        <div class="mana-container">
            <div class="mana-bar" id="manaBar"></div>
        </div>
        <div class="cards-deck" id="deckContainer"></div>
    </div>

    <div class="overlay" id="pauseOverlay">
        <h1 style="color: #fff; text-shadow: 0 0 30px rgba(255,255,255,0.8);">ПАУЗА</h1>
        <button class="btn-primary" onclick="togglePause()">ПРОДОЛЖИТЬ</button>
        <button class="btn-secondary" onclick="window.location.href='../index.html'">ВЫЙТИ В ХАБ</button>
    </div>

    <div class="overlay" id="gameOverOverlay">
        <h1 id="goTitle"></h1>
        
        <div class="lootbox-container" id="lootboxContainer" style="display:none;" onclick="openChest()">
            <div class="lootbox" id="chestEmoji">📦</div>
            <div style="font-size:18px; font-weight:900; color:#ffea00; margin-top:20px; animation: blink 1s infinite;">ТАПНИ ЧТОБЫ ОТКРЫТЬ!</div>
        </div>

        <div id="finalStats" style="display:none; text-align: center; margin-top: 20px;">
            <div style="font-size: 32px; font-weight: 900; color: #ffea00; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255,234,0,0.5);">+<span id="finalCoins">0</span> 🪙</div>
            <div style="font-size: 26px; font-weight: 900; color: #00f3ff; text-shadow: 0 0 20px rgba(0,243,255,0.5);">+<span id="finalRating">0</span> 🏆</div>
        </div>

        <button class="btn-primary" id="btnRestart" style="display:none;" onclick="location.reload()">СЛЕДУЮЩИЙ БОЙ</button>
        <button class="btn-secondary" id="btnHub" style="display:none;" onclick="window.location.href='../index.html'">В ХАБ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.disableVerticalSwipes && tg.disableVerticalSwipes();
        tg.setHeaderColor('#020204');

        const user = tg.initDataUnsafe?.user || { id: 12345, first_name: "Netrunner" };
        const BACKEND_URL = "https://coral-app-jxzy5.ondigitalocean.app/game-api";

        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        const UI_TOP = 75; const UI_BOT = 180;
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const W = canvas.width; const H = canvas.height; const midY = (UI_TOP + (H - UI_BOT)) / 2;

        let gameState = 'PLAYING'; 
        let frameCount = 0; let mana = 4; const MAX_MANA = 10; const MANA_REGEN = 0.025;
        let enemyMana = 5; 
        let sessionCoins = 0; let currentRating = 1250;
        let timeLeft = 180; let lastTimeUpdate = Date.now();
        let screenShake = 0; let gridOffsetY = 0;

        let isDragging = false; let dragCardIndex = null; let dragX = 0; let dragY = 0; let isValidSpawn = false;

        const deck = [
            { id: 'tank', name: 'ТРОЯН', cost: 5, icon: '👾', type: 'tank' },
            { id: 'shooter', name: 'DDOS', cost: 3, icon: '🛰️', type: 'shooter' },
            { id: 'swarm', name: 'РОЙ', cost: 2, icon: '🦠', type: 'swarm' },
            { id: 'laser', name: 'УДАР', cost: 4, icon: '⚡', type: 'spell' }
        ];

        const UNIT_STATS = {
            tank: { hp: 2000, spd: 0.5, dmg: 120, rng: 30, atkSpd: 80, bOnly: true, icon: '👾', sz: 24 },
            shooter: { hp: 400, spd: 1.0, dmg: 45, rng: 150, atkSpd: 35, bOnly: false, icon: '🛰️', sz: 14 },
            swarm: { hp: 150, spd: 2.0, dmg: 20, rng: 20, atkSpd: 20, bOnly: false, icon: '🦠', sz: 10 }
        };

        let nodes = []; let units = []; let lasers = []; let floatTexts = []; let particles = []; let shockwaves = []; let spawnBeams = [];

        function initMap() {
            nodes = [
                { id: 'p_l', x: W*0.22, y: H - UI_BOT - 110, hp: 2500, maxHp: 2500, team: 'player', type: 'side' },
                { id: 'p_r', x: W*0.78, y: H - UI_BOT - 110, hp: 2500, maxHp: 2500, team: 'player', type: 'side' },
                { id: 'p_m', x: W*0.5,  y: H - UI_BOT - 30,  hp: 4500, maxHp: 4500, team: 'player', type: 'main' },
                { id: 'e_l', x: W*0.22, y: UI_TOP + 100, hp: 2500, maxHp: 2500, team: 'enemy', type: 'side' },
                { id: 'e_r', x: W*0.78, y: UI_TOP + 100, hp: 2500, maxHp: 2500, team: 'enemy', type: 'side' },
                { id: 'e_m', x: W*0.5,  y: UI_TOP + 20,  hp: 4500, maxHp: 4500, team: 'enemy', type: 'main' }
            ];
            nodes.forEach(n => n.hitTimer = 0);
        }
        initMap();

        function initDeckUI() {
            const c = document.getElementById('deckContainer'); c.innerHTML = '';
            deck.forEach((card, index) => {
                let el = document.createElement('div'); el.className = 'card'; el.id = `card-${index}`;
                let costColor = card.type === 'spell' ? '#ff003c' : '#00f3ff';
                el.innerHTML = `<div class="card-cost" style="background:linear-gradient(135deg, ${costColor} 0%, #000 100%); border-color:${costColor}">${card.cost}</div><div class="card-icon">${card.icon}</div><div class="card-name">${card.name}</div>`;
                
                el.addEventListener('touchstart', (e) => {
                    if (mana >= card.cost && gameState === 'PLAYING') {
                        isDragging = true; dragCardIndex = index;
                        dragX = e.touches[0].clientX; dragY = e.touches[0].clientY;
                        el.classList.add('dragging');
                    }
                });
                c.appendChild(el);
            });
        }
        
        function updateCardsUI() {
            deck.forEach((c, i) => {
                let el = document.getElementById(`card-${i}`);
                if (!isDragging) el.classList.remove('dragging');
                if (mana >= c.cost) el.classList.add('ready'); else el.classList.remove('ready');
            });
        }

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault(); 
            dragX = e.touches[0].clientX; dragY = e.touches[0].clientY;
            let cardType = deck[dragCardIndex].type;
            isValidSpawn = cardType === 'spell' ? (dragY > UI_TOP && dragY < H - UI_BOT) : (dragY > midY && dragY < H - UI_BOT);
        }, {passive: false});

        document.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            isDragging = false; updateCardsUI();
            
            if (isValidSpawn) {
                let card = deck[dragCardIndex];
                mana -= card.cost;
                if (card.type === 'spell') {
                    triggerShake(25);
                    createShockwave(dragX, dragY, '#ff003c', 120);
                    emitParticles(dragX, dragY, '#ff003c', 60, true); 
                    spawnText(dragX, dragY-40, "CRITICAL!", "#ff003c", 28);
                    spawnBeams.push({x: dragX, y: dragY, c: '#ff003c', life: 1, w: 80});
                    
                    nodes.concat(units).forEach(ent => { 
                        if (ent.team !== 'player' && Math.hypot(ent.x - dragX, ent.y - dragY) < 120) { 
                            ent.hp -= 600; ent.hitTimer = 10; 
                            spawnText(ent.x+(Math.random()*40-20), ent.y+(Math.random()*40-20), "-600", "#fff", 20);
                        } 
                    });
                } else { 
                    spawnUnit(card.type, dragX, dragY, 'player'); 
                }
            }
            dragCardIndex = null;
        });

        function triggerShake(val) { screenShake = Math.max(screenShake, val); }
        function spawnText(x, y, txt, col, sz=18) { floatTexts.push({x, y, txt, col, sz, life: 1, vy: -2, scale: 0.5}); }
        function createShockwave(x, y, c, maxR) { shockwaves.push({x, y, c, r: 0, maxR, life: 1}); }
        
        function emitParticles(x, y, color, count, isExplosion=false) {
            let speed = isExplosion ? 20 : 8;
            for(let i=0; i<count; i++) particles.push({x, y, vx:(Math.random()-0.5)*speed, vy:(Math.random()-0.5)*speed, life:1, decay:0.03 + Math.random()*0.05, color, size:Math.random()*6+2});
        }

        function spawnUnit(type, x, y, team) {
            let s = UNIT_STATS[type]; let c = team === 'player' ? '#00f3ff' : '#ff003c';
            spawnBeams.push({x, y, c, life: 1, w: s.sz * 3}); // Телепорт луч
            
            if (type === 'swarm') {
                for(let i=0; i<3; i++) units.push({ x: x+(Math.random()*40-20), y: y+(Math.random()*40-20), team, type, c, hp: s.hp, maxHp: s.hp, spd: s.spd, dmg: s.dmg, rng: s.rng, atkSpd: s.atkSpd, cd: 0, bOnly: s.bOnly, icon: s.icon, sz: s.sz, hitTimer: 0, scale: 0 });
            } else {
                units.push({ x, y, team, type, c, hp: s.hp, maxHp: s.hp, spd: s.spd, dmg: s.dmg, rng: s.rng, atkSpd: s.atkSpd, cd: 0, bOnly: s.bOnly, icon: s.icon, sz: s.sz, hitTimer: 0, scale: 0 });
            }
            emitParticles(x, y, c, 30, true);
            createShockwave(x, y, c, 50);
        }

        function enemyAI() {
            if (enemyMana < MAX_MANA) enemyMana += MANA_REGEN;
            if (frameCount % 80 === 0 && Math.random() > 0.2) {
                let types = ['tank', 'shooter', 'swarm'];
                let typeToSpawn = types[Math.floor(Math.random() * types.length)];
                let cost = deck.find(c => c.type === typeToSpawn).cost;
                if (enemyMana >= cost) {
                    enemyMana -= cost;
                    let sx = Math.random() > 0.5 ? W*0.22 : W*0.78;
                    spawnUnit(typeToSpawn, sx, UI_TOP + 150, 'enemy');
                }
            }
        }

        function updateLogic() {
            if (gameState !== 'PLAYING') return;
            frameCount++;
            if (screenShake > 0) screenShake *= 0.85; if (screenShake < 0.5) screenShake = 0;
            
            let now = Date.now();
            if (now - lastTimeUpdate > 1000) {
                timeLeft--; lastTimeUpdate = now;
                let timerEl = document.getElementById('gameTimer');
                let m = Math.floor(timeLeft / 60); let s = timeLeft % 60;
                timerEl.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if (timeLeft <= 10) timerEl.classList.add('timer-warning');
                if (timeLeft <= 0) resolveMatchByTime();
            }

            if (mana < MAX_MANA) {
                mana += MANA_REGEN; if (mana > MAX_MANA) mana = MAX_MANA;
                document.getElementById('manaBar').style.width = `${(mana / MAX_MANA) * 100}%`; 
                document.getElementById('manaVal').innerText = Math.floor(mana);
                if (frameCount % 5 === 0) updateCardsUI();
            }

            enemyAI();
            nodes.forEach(n => { if (n.hitTimer > 0) n.hitTimer--; });

            units.forEach(u => {
                if (u.scale < 1) u.scale += 0.2; 
                if (u.hitTimer > 0) u.hitTimer--;
                if (u.cd > 0) u.cd--;
                
                let target = null; let minDist = Infinity;
                let enemiesArray = u.bOnly ? nodes : nodes.concat(units);
                
                enemiesArray.filter(e => e.team !== u.team).forEach(e => {
                    let d = Math.hypot(e.x - u.x, e.y - u.y);
                    if (d < minDist) { minDist = d; target = e; }
                });

                if (target) {
                    if (minDist <= u.rng + u.sz) {
                        if (u.cd <= 0) {
                            u.cd = u.atkSpd;
                            if (u.type === 'shooter') {
                                lasers.push({ x1: u.x, y1: u.y, x2: target.x, y2: target.y, c: u.c, life: 8 });
                                target.hp -= u.dmg; target.hitTimer = 6;
                                spawnText(target.x, target.y - 20, `-${u.dmg}`, "#fff", 14);
                                emitParticles(target.x, target.y, u.c, 8);
                            } else {
                                target.hp -= u.dmg; target.hitTimer = 6;
                                spawnText(target.x, target.y - 20, `-${u.dmg}`, "#fff", 16);
                                emitParticles(target.x, target.y, '#fff', 12);
                            }
                        }
                    } else {
                        let tx = target.x; let ty = target.y;
                        let onPlayerSide = u.y > midY; let targetOnEnemySide = target.y < midY;
                        
                        if ((onPlayerSide && targetOnEnemySide) || (!onPlayerSide && !targetOnEnemySide)) {
                            let b1 = W*0.25; let b2 = W*0.75;
                            let targetBridge = Math.abs(u.x - b1) < Math.abs(u.x - b2) ? b1 : b2;
                            if (Math.abs(u.x - targetBridge) > 20 && Math.abs(u.y - midY) > 35) { tx = targetBridge; ty = u.y; }
                        }

                        let angle = Math.atan2(ty - u.y, tx - u.x);
                        u.x += Math.cos(angle) * u.spd; u.y += Math.sin(angle) * u.spd;
                    }
                }
            });

            units = units.filter(u => u.hp > 0);
            lasers.forEach(l => l.life--); lasers = lasers.filter(l => l.life > 0);
            
            // Физика частиц (трение)
            particles.forEach(p => { 
                p.x += p.vx; p.y += p.vy; p.vx *= 0.92; p.vy *= 0.92; p.life -= p.decay; 
            }); particles = particles.filter(p => p.life > 0);
            
            shockwaves.forEach(s => { s.r += (s.maxR - s.r)*0.15; s.life -= 0.05; }); shockwaves = shockwaves.filter(s => s.life > 0);
            spawnBeams.forEach(b => { b.life -= 0.05; }); spawnBeams = spawnBeams.filter(b => b.life > 0);
            
            // Анимация текста урона
            floatTexts.forEach(t=>{ t.y+=t.vy; t.life-=0.02; if(t.scale<1) t.scale+=0.1; }); floatTexts = floatTexts.filter(t=>t.life>0);

            // СМЕРТЬ БАШЕН
            nodes.forEach(n => {
                if (n.hp <= 0 && !n.dead) {
                    n.dead = true; triggerShake(30);
                    emitParticles(n.x, n.y, n.team==='player'?'#00f3ff':'#ff003c', 100, true);
                    createShockwave(n.x, n.y, '#fff', 200);
                    
                    if (n.team === 'enemy') {
                        if (n.type === 'side') { sessionCoins += 25; spawnText(n.x, n.y-40, "+25 🪙", "#ffea00", 28); } 
                        else if (n.type === 'main') { sessionCoins += 150; endMatch(true); }
                        document.getElementById('sessionCoins').innerText = sessionCoins;
                    } else if (n.type === 'main') { endMatch(false); }
                }
            });
            nodes = nodes.filter(n => !n.dead);
        }

        // ОТРИСОВКА
        function drawServerNode(n) {
            let size = n.type === 'main' ? 36 : 24; 
            let c = n.team === 'player' ? '#00f3ff' : '#ff003c';
            if (n.hitTimer > 0) c = '#ffffff';
            let pulse = Math.sin(frameCount * 0.08) * 5;
            
            ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.beginPath(); ctx.ellipse(n.x, n.y + size/2, size*1.5, size*0.8, 0, 0, Math.PI*2); ctx.fill();
            
            ctx.globalCompositeOperation = 'lighter'; // СВЕЧЕНИЕ
            ctx.strokeStyle = c; ctx.lineWidth = 3; ctx.setLineDash([20, 10]);
            ctx.beginPath(); ctx.arc(n.x, n.y, size + 15 + pulse, frameCount*0.04, Math.PI*2 + frameCount*0.04); ctx.stroke(); ctx.setLineDash([]);
            
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#0a0a14'; ctx.strokeStyle = c; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(n.x, n.y, size, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = c; ctx.shadowBlur = 30; ctx.shadowColor = c;
            ctx.beginPath(); ctx.arc(n.x, n.y, size/2, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            ctx.globalCompositeOperation = 'source-over';

            let hpW = size * 2.5; ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(n.x - hpW/2 - 2, n.y - size - 26, hpW + 4, 10);
            ctx.fillStyle = n.team === 'player' ? '#00f3ff' : '#ff003c'; ctx.fillRect(n.x - hpW/2, n.y - size - 24, hpW * (n.hp / n.maxHp), 6);
        }

        function draw() {
            ctx.save(); ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
            ctx.fillStyle = '#020204'; ctx.fillRect(0, 0, W, H);
            
            // Динамический Грид
            gridOffsetY = (gridOffsetY + 1.2) % 60;
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.05)'; ctx.lineWidth = 2;
            for(let i = -W; i < W*2; i+=60) { ctx.beginPath(); ctx.moveTo(i, H); ctx.lineTo(W/2 + (i-W/2)*0.05, UI_TOP); ctx.stroke(); }
            for(let i = UI_TOP + gridOffsetY; i < H; i+=60) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke(); }

            // Лазерная река (Фаервол)
            ctx.globalCompositeOperation = 'lighter';
            let fwGrad = ctx.createLinearGradient(0, midY-30, 0, midY+30);
            fwGrad.addColorStop(0, 'transparent'); fwGrad.addColorStop(0.5, 'rgba(255, 0, 60, 0.2)'); fwGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = fwGrad; ctx.fillRect(0, midY - 30, W, 60);
            
            ctx.strokeStyle = '#ff003c'; ctx.lineWidth = 4; ctx.setLineDash([30, 20]); ctx.lineDashOffset = -frameCount*3;
            ctx.shadowBlur = 20; ctx.shadowColor = '#ff003c';
            ctx.beginPath(); ctx.moveTo(0, midY); ctx.lineTo(W, midY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, midY-15); ctx.lineTo(W, midY-15); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, midY+15); ctx.lineTo(W, midY+15); ctx.stroke();
            ctx.setLineDash([]); ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';

            // Мосты
            const bW = 80; 
            ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(W*0.25 - bW/2, midY - 30, bW, 60); ctx.fillRect(W*0.75 - bW/2, midY - 30, bW, 60);
            ctx.fillStyle = '#0a0a14'; ctx.fillRect(W*0.25 - bW/2, midY - 35, bW, 70); ctx.fillRect(W*0.75 - bW/2, midY - 35, bW, 70);
            ctx.strokeStyle = '#00f3ff'; ctx.lineWidth = 3; ctx.strokeRect(W*0.25 - bW/2, midY - 35, bW, 70); ctx.strokeRect(W*0.75 - bW/2, midY - 35, bW, 70);

            // Зона высадки
            if (selectedCard !== null) {
                let type = deck[selectedCard].type;
                if (type === 'spell') {
                    ctx.fillStyle = 'rgba(255, 0, 60, 0.05)'; ctx.fillRect(0, UI_TOP, W, H-UI_TOP-UI_BOT); 
                } else {
                    let grad = ctx.createLinearGradient(0, midY, 0, H);
                    grad.addColorStop(0, 'rgba(0, 243, 255, 0)'); grad.addColorStop(1, 'rgba(0, 243, 255, 0.2)');
                    ctx.fillStyle = grad; ctx.fillRect(0, midY, W, H - midY);
                }
            }

            let renderList = [...nodes, ...units].sort((a, b) => a.y - b.y);

            renderList.forEach(ent => {
                if (ent.maxHp >= 1500) { drawServerNode(ent); } 
                else {
                    ctx.save(); let c = ent.hitTimer > 0 ? '#fff' : ent.c;
                    ctx.translate(ent.x, ent.y); ctx.scale(ent.scale, ent.scale);
                    
                    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.beginPath(); ctx.ellipse(0, ent.sz/2, ent.sz*1.3, ent.sz*0.6, 0, 0, Math.PI*2); ctx.fill();
                    let bounce = Math.abs(Math.sin(frameCount * 0.3 + ent.x)) * (ent.sz * 0.5);
                    
                    ctx.fillStyle = '#151522'; ctx.strokeStyle = c; ctx.lineWidth = 3;
                    ctx.shadowBlur = 15; ctx.shadowColor = c;
                    ctx.beginPath(); ctx.arc(0, -bounce, ent.sz, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.shadowBlur = 0;
                    
                    ctx.fillStyle = '#fff'; ctx.font = `${ent.sz * 1.2}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(ent.icon, 0, -bounce);
                    ctx.restore();

                    let hw = ent.sz * 2.5; ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(ent.x - hw/2 - 1, ent.y - ent.sz - 22, hw+2, 5);
                    ctx.fillStyle = ent.team === 'player' ? '#00f3ff' : '#ff003c'; ctx.fillRect(ent.x - hw/2, ent.y - ent.sz - 21, hw * (ent.hp / ent.maxHp), 3);
                }
            });

            // ЭФФЕКТЫ (Additive Blending)
            ctx.globalCompositeOperation = 'lighter';
            
            // Лучи высадки
            spawnBeams.forEach(b => {
                let grad = ctx.createLinearGradient(0, b.y - 300, 0, b.y);
                grad.addColorStop(0, 'transparent'); grad.addColorStop(1, b.c);
                ctx.fillStyle = grad; ctx.globalAlpha = b.life;
                ctx.fillRect(b.x - b.w/2, b.y - 300, b.w, 300);
            }); ctx.globalAlpha = 1;

            lasers.forEach(l => {
                ctx.strokeStyle = l.c; ctx.lineWidth = l.life * 1.5; ctx.shadowBlur = 20; ctx.shadowColor = l.c;
                ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke();
                ctx.lineWidth = l.life * 0.5; ctx.strokeStyle = '#fff'; ctx.stroke(); // Белое ядро лазера
            }); ctx.shadowBlur = 0;

            shockwaves.forEach(s => {
                ctx.strokeStyle = s.c; ctx.lineWidth = 4 * s.life; ctx.globalAlpha = s.life;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.stroke();
            }); ctx.globalAlpha = 1;

            particles.forEach(p => { 
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.shadowBlur = 10; ctx.shadowColor = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); 
            }); ctx.globalAlpha = 1; ctx.shadowBlur = 0;
            
            ctx.globalCompositeOperation = 'source-over';

            floatTexts.forEach(ft => { 
                ctx.save(); ctx.translate(ft.x, ft.y); ctx.scale(ft.scale, ft.scale);
                ctx.fillStyle=ft.col; ctx.globalAlpha=Math.max(0, ft.life); ctx.font=`900 ${ft.sz}px Montserrat`; ctx.textAlign='center'; 
                ctx.shadowBlur=10; ctx.shadowColor='#000'; ctx.fillText(ft.txt, 0, 0); 
                ctx.restore();
            });

            // DRAG & DROP ХОЛОГРАММА
            if (isDragging && dragCardIndex !== null) {
                let card = deck[dragCardIndex]; let isSpell = card.type === 'spell';
                ctx.save(); ctx.translate(dragX, dragY);
                ctx.globalCompositeOperation = 'lighter';
                
                // Линия связи с пальцем (Tether)
                ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, H - dragY); ctx.stroke();

                if (isSpell) {
                    ctx.strokeStyle = isValidSpawn ? 'rgba(255, 0, 60, 1)' : 'rgba(255, 255, 255, 0.2)';
                    ctx.lineWidth = 6; ctx.setLineDash([20, 15]); ctx.beginPath(); ctx.arc(0, 0, 120, frameCount*0.05, Math.PI*2 + frameCount*0.05); ctx.stroke();
                    ctx.fillStyle = isValidSpawn ? 'rgba(255, 0, 60, 0.15)' : 'transparent'; ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.font = '50px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(card.icon, 0, 0);
                } else {
                    let cColor = isValidSpawn ? '#00f3ff' : '#ff003c';
                    ctx.strokeStyle = cColor; ctx.lineWidth = 4; ctx.setLineDash([10, 10]);
                    ctx.beginPath(); ctx.arc(0, 0, 30, frameCount*0.1, Math.PI*2 + frameCount*0.1); ctx.stroke();
                    ctx.fillStyle = isValidSpawn ? 'rgba(0, 243, 255, 0.2)' : 'rgba(255, 0, 60, 0.2)'; ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.font = '35px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(card.icon, 0, 0);
                }
                ctx.restore();
            }
            ctx.restore();
        }

        function loop() { updateLogic(); draw(); requestAnimationFrame(loop); }

        window.togglePause = function() {
            if (gameState === 'GAME_OVER') return;
            let ov = document.getElementById('pauseOverlay');
            if (gameState === 'PLAYING') { gameState = 'PAUSED'; ov.style.display = 'flex'; } 
            else { gameState = 'PLAYING'; ov.style.display = 'none'; lastTimeUpdate = Date.now(); }
        }

        function resolveMatchByTime() { let pM = nodes.find(n => n.id === 'p_m'); let eM = nodes.find(n => n.id === 'e_m'); endMatch(pM.hp >= eM.hp); }

        async function endMatch(isWin) {
            gameState = 'GAME_OVER'; let ov = document.getElementById('gameOverOverlay'); ov.style.display = 'flex';
            document.getElementById('goTitle').innerText = isWin ? 'СИСТЕМА ВЗЛОМАНА' : 'КРИТИЧЕСКИЙ СБОЙ';
            document.getElementById('goTitle').style.color = isWin ? '#00f3ff' : '#ff003c';
            document.getElementById('goTitle').style.textShadow = isWin ? '0 0 40px #00f3ff' : '0 0 40px #ff003c';
            
            if (isWin) document.getElementById('lootboxContainer').style.display = 'block';
            else {
                document.getElementById('finalStats').style.display = 'block'; document.getElementById('btnRestart').style.display = 'block'; document.getElementById('btnHub').style.display = 'block';
                document.getElementById('finalCoins').innerText = sessionCoins; document.getElementById('finalRating').innerText = "-15";
            }
        }

        window.openChest = function() {
            let c = document.getElementById('lootboxContainer'); let e = document.getElementById('chestEmoji');
            e.style.animation = 'none'; let s = 0;
            let int = setInterval(() => {
                e.style.transform = `translateX(${(Math.random()-0.5)*30}px) translateY(${(Math.random()-0.5)*30}px)`; s++;
                if (s > 20) {
                    clearInterval(int);
                    e.innerText = '💎'; e.style.transform = 'scale(1.8)'; e.style.filter = 'drop-shadow(0 0 80px #00f3ff)';
                    setTimeout(() => {
                        c.style.display = 'none';
                        document.getElementById('finalStats').style.display = 'block'; document.getElementById('btnRestart').style.display = 'block'; document.getElementById('btnHub').style.display = 'block';
                        document.getElementById('finalCoins').innerText = sessionCoins; document.getElementById('finalRating').innerText = "+30";
                        fetch(`${BACKEND_URL}/save_score`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ telegram_id: user.id, username: nickname, score: 30, coins: sessionCoins, game: 'clash' }) }).catch(e=>{});
                    }, 1000);
                }
            }, 40);
        }

        initDeckUI(); requestAnimationFrame(loop);
    </script>
</body>
