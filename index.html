<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fly Invaders</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #05050a; overflow: hidden; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        // --- Настройка Telegram и Бэкенда ---
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();

        // Безопасное получение данных (если зашли не из ТГ, даем случайный ID для тестов)
        const user = tg.initDataUnsafe?.user || { 
            id: Math.floor(Math.random() * 1000000), 
            first_name: "TestPlayer", 
            username: "Guest" 
        };

        const BACKEND_URL = "https://coral-app-jxzy5.ondigitalocean.app/game-api";

        // Функция отправки очков на твой сервер
        async function sendScoreToDatabase(finalScore) {
            try {
                const response = await fetch(`${BACKEND_URL}/save_score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegram_id: user.id,
                        username: user.username || user.first_name || "Unknown",
                        score: finalScore
                    })
                });
                const result = await response.json();
                console.log("Успех! Ответ сервера:", result.message);
            } catch (e) {
                console.error("Ошибка сохранения очков:", e);
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- Загрузка картинок ---
        const playerImg = new Image();
        playerImg.src = 'https://coral-app-jxzy5.ondigitalocean.app/game/ship.png?v=3';
        const enemyImg = new Image();
        enemyImg.src = 'https://coral-app-jxzy5.ondigitalocean.app/game/diamond.png?v=3';

        // --- Аудио-Пулы ---
        class AudioPool {
            constructor(src, size, volume) {
                this.pool = [];
                for (let i = 0; i < size; i++) {
                    let audio = new Audio(src);
                    audio.volume = volume;
                    this.pool.push(audio);
                }
                this.index = 0;
            }
            play() {
                let audio = this.pool[this.index];
                audio.currentTime = 0; 
                audio.play().catch(() => {});
                this.index = (this.index + 1) % this.pool.length;
            }
        }

        const bgMusic = new Audio('https://coral-app-jxzy5.ondigitalocean.app/game/bgm.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.3; 

        const shootSound = new AudioPool('https://coral-app-jxzy5.ondigitalocean.app/game/shoot.mp3', 5, 0.05); 
        const boomSound = new AudioPool('https://coral-app-jxzy5.ondigitalocean.app/game/boom.mp3', 3, 0.2);

        // --- Игровые переменные ---
        let gameState = 'MENU'; // 'MENU', 'PLAYING', 'LEVEL_TRANSITION', 'GAME_OVER'
        let score = 0;
        let lives = 3;
        let level = 1;
        let hitEffectTimer = 0;
        let menuPulseTimer = 0;
        let transitionTimer = 0;

        const player = {
            width: 70, height: 70,
            x: canvas.width / 2 - 35, y: canvas.height - 120
        };

        let bullets = [];
        let enemies = [];
        let stars = [];
        let particles = []; 

        const starColors = ['#ffffff', '#aaddff', '#446688'];
        for (let i = 0; i < 120; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2.5 + 0.5,
                speed: Math.random() * 2 + 0.2, 
                color: starColors[Math.floor(Math.random() * starColors.length)]
            });
        }
        
        let lastShootTime = 0;
        const shootDelay = 150; 
        let isTouching = false;

        function createExplosion(x, y, color) {
            boomSound.play();
            for (let i = 0; i < 20; i++) { 
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10,
                    life: 1.0, decay: Math.random() * 0.03 + 0.02,
                    color: color, size: Math.random() * 5 + 2
                });
            }
        }

        function createEngineTrail(x, y, isHyper = false) {
            particles.push({
                x: x + (Math.random() - 0.5) * 12, y: y,
                vx: (Math.random() - 0.5) * (isHyper ? 4 : 2), 
                vy: Math.random() * (isHyper ? 15 : 6) + 3,
                life: 1.0, decay: isHyper ? 0.03 : 0.06,
                color: isHyper ? '#ffffff' : '#00ccff', 
                size: Math.random() * (isHyper ? 6 : 4) + 1 
            });
        }

        function resetGame() {
            score = 0;
            lives = 3;
            level = 1;
            gameState = 'PLAYING';
            bullets = [];
            enemies = [];
            particles = [];
            player.x = canvas.width / 2 - player.width / 2;
            player.y = canvas.height - 120;
            bgMusic.play().catch(() => {});
        }

        function update() {
            menuPulseTimer += 0.05;

            // --- ЛОГИКА ПЕРЕХОДА НА УРОВЕНЬ ---
            if (gameState === 'LEVEL_TRANSITION') {
                transitionTimer++;
                
                // Звезды летят как сумасшедшие (гиперпрыжок)
                stars.forEach(s => {
                    s.y += s.speed * 15;
                    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
                });

                // Корабль улетает вверх
                if (transitionTimer < 60) {
                    player.y -= 10; 
                    createEngineTrail(player.x + player.width / 2, player.y + player.height, true);
                } 
                // Ждем секунду и возвращаем корабль снизу
                else if (transitionTimer === 90) {
                    level++;
                    player.y = canvas.height + 100; // Прячем снизу
                } 
                // Корабль выплывает на новую позицию
                else if (transitionTimer > 90 && transitionTimer < 130) {
                    player.y -= 5;
                    createEngineTrail(player.x + player.width / 2, player.y + player.height, false);
                } 
                // Переход закончен
                else if (transitionTimer >= 130) {
                    gameState = 'PLAYING';
                    player.y = canvas.height - 120; // Фиксируем
                }

                // Обновляем частицы гиперпрыжка
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i, 1);
                }
                return; // Остальная логика игры на паузе во время прыжка
            }

            // Звезды в обычном режиме
            let starMultiplier = gameState === 'PLAYING' ? (1 + level * 0.2) : 0.3;
            stars.forEach(s => {
                s.y += s.speed * starMultiplier;
                if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
            });

            if (gameState !== 'PLAYING') return;

            // Проверка на запуск перехода (каждые 500 очков)
            if (score > 0 && score % 500 === 0 && enemies.length === 0) {
                gameState = 'LEVEL_TRANSITION';
                transitionTimer = 0;
                bullets = [];
                return;
            }

            createEngineTrail(player.x + player.width / 2, player.y + player.height - 10, false);

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Враги не появляются, если скоро переход (например, 490 очков)
            let isApproachingTransition = (score % 500 >= 480);
            
            if (!isApproachingTransition) {
                let spawnRate = 0.02 + (level * 0.008);
                if (Math.random() < spawnRate) {
                    enemies.push({
                        x: Math.random() * (canvas.width - 50), 
                        y: -50,
                        width: 50, height: 50, 
                        speed: (2 + Math.random() * 2) + (level * 0.5), 
                        wiggleOffset: Math.random() * Math.PI * 2 
                    });
                }
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed;
                e.x += Math.sin((e.y / 50) + e.wiggleOffset) * (level * 0.4);

                if (e.x < 0) e.x = 0;
                if (e.x + e.width > canvas.width) e.x = canvas.width - e.width;

                if (e.y > canvas.height) { enemies.splice(i, 1); continue; }

                let hitPadding = 12;
                if (e.x + hitPadding < player.x + player.width - hitPadding && e.x + e.width - hitPadding > player.x + hitPadding &&
                    e.y + hitPadding < player.y + player.height - hitPadding && e.y + e.height - hitPadding > player.y + hitPadding) {
                    lives--;
                    hitEffectTimer = 15;
                    createExplosion(player.x + player.width/2, player.y + player.height/2, '#00ffcc');
                    enemies.splice(i, 1);
                    
                    // СМЕРТЬ И ОТПРАВКА ОЧКОВ
                    if (lives <= 0) {
                        gameState = 'GAME_OVER';
                        bgMusic.pause();
                        sendScoreToDatabase(score); // <--- ОТПРАВКА НА СЕРВЕР
                    }
                    continue;
                }

                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    if (b.x < e.x + e.width && b.x + b.width > e.x && b.y < e.y + e.height && b.y + b.height > e.y) {
                        score += 10;
                        createExplosion(e.x + e.width/2, e.y + e.height/2, '#ffcc00');
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        break; 
                    }
                }
            }

            if (isTouching && Date.now() - lastShootTime > shootDelay) {
                if (level >= 3) {
                    bullets.push({ x: player.x + 10, y: player.y + 10, width: 4, height: 20, speed: 14 });
                    bullets.push({ x: player.x + player.width - 14, y: player.y + 10, width: 4, height: 20, speed: 14 });
                } else {
                    bullets.push({ x: player.x + player.width / 2 - 3, y: player.y + 10, width: 6, height: 20, speed: 12 });
                }
                
                shootSound.play();
                player.y += 1; 
                lastShootTime = Date.now();
            }
        }

        function draw() {
            // Динамический фон (становится краснее и агрессивнее с каждым уровнем)
            let bgR = Math.min(20 + level * 8, 80);
            let bgB = Math.max(15 - level * 2, 0);
            ctx.fillStyle = `rgba(${bgR}, 5, ${bgB}, 0.8)`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(s => {
                ctx.fillStyle = s.color; ctx.globalAlpha = s.size / 3;
                if (gameState === 'LEVEL_TRANSITION') ctx.globalAlpha = 1.0; // Яркие звезды при прыжке
                ctx.fillRect(s.x, s.y, s.size, s.size * (gameState === 'LEVEL_TRANSITION' ? 5 : 1)); // Вытягиваем звезды в линии
            });
            ctx.globalAlpha = 1.0;

            if (gameState === 'MENU') {
                ctx.fillStyle = '#ffcc00'; ctx.textAlign = 'center'; ctx.font = 'bold 42px Courier New';
                ctx.fillText('FLY INVADERS', canvas.width / 2, canvas.height / 3);
                
                ctx.globalAlpha = Math.abs(Math.sin(menuPulseTimer));
                ctx.fillStyle = '#00ffcc'; ctx.font = 'bold 24px Courier New';
                ctx.fillText('>>> ТАПНИ ДЛЯ СТАРТА <<<', canvas.width / 2, canvas.height / 2);
                ctx.globalAlpha = 1.0;

                ctx.fillStyle = '#666666'; ctx.font = '18px Courier New';
                ctx.fillText('[ МАГАЗИН - Скоро ]', canvas.width / 2, canvas.height / 2 + 80);
                ctx.fillText('[ ТОП ИГРОКОВ - Скоро ]', canvas.width / 2, canvas.height / 2 + 130);
            } 
            else if (gameState === 'PLAYING' || gameState === 'GAME_OVER' || gameState === 'LEVEL_TRANSITION') {
                if (hitEffectTimer > 0) {
                    ctx.fillStyle = `rgba(255, 0, 0, ${hitEffectTimer / 30})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    hitEffectTimer--;
                }

                particles.forEach(p => {
                    ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life);
                    ctx.shadowBlur = 15; ctx.shadowColor = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                });
                ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;

                ctx.fillStyle = '#ffff00'; ctx.shadowBlur = 10; ctx.shadowColor = '#ffff00';
                bullets.forEach(b => {
                    ctx.beginPath(); ctx.roundRect(b.x, b.y, b.width, b.height, 3); ctx.fill();
                });
                ctx.shadowBlur = 0;

                enemies.forEach(e => {
                    if (enemyImg.complete && enemyImg.naturalHeight !== 0) ctx.drawImage(enemyImg, e.x, e.y, e.width, e.height);
                });

                // Отрисовка игрока (даже во время перехода)
                if ((gameState === 'PLAYING' || gameState === 'LEVEL_TRANSITION' || hitEffectTimer > 0) && player.y < canvas.height + 50) {
                    if (playerImg.complete && playerImg.naturalHeight !== 0) ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
                }

                // Надпись ПЕРЕХОДА
                if (gameState === 'LEVEL_TRANSITION') {
                    ctx.fillStyle = '#ffcc00'; ctx.textAlign = 'center'; ctx.font = 'bold 32px Courier New';
                    ctx.fillText(`УРОВЕНЬ ПРОЙДЕН`, canvas.width / 2, canvas.height / 2 - 20);
                    ctx.fillStyle = '#00ffcc'; ctx.font = 'bold 20px Courier New';
                    ctx.fillText(`ПОЛЕТ К УРОВНЮ ${level + 1}...`, canvas.width / 2, canvas.height / 2 + 20);
                }

                // UI Игры
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 20px Courier New'; ctx.textAlign = 'left';
                ctx.fillText(`SCORE: ${score}`, 15, 40);
                ctx.fillStyle = '#00ffcc';
                ctx.fillText(`MAP: ${level}`, 15, 65);
                
                ctx.textAlign = 'right';
                ctx.fillText('❤️'.repeat(Math.max(0, lives)), canvas.width - 15, 40);

                if (gameState === 'GAME_OVER') {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#ff3366'; ctx.textAlign = 'center'; ctx.font = 'bold 48px Courier New';
                    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 40);
                    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 24px Courier New';
                    ctx.fillText(`Счет: ${score} (Map ${level})`, canvas.width / 2, canvas.height / 2 + 20);
                    ctx.font = '18px Courier New'; ctx.fillStyle = '#00ffcc';
                    ctx.fillText('Тапни, чтобы выйти в меню', canvas.width / 2, canvas.height / 2 + 80);
                    
                    // Мигающая надпись о сохранении
                    ctx.globalAlpha = Math.abs(Math.sin(menuPulseTimer));
                    ctx.fillStyle = '#ffff00'; ctx.font = '14px Courier New';
                    ctx.fillText('Сохранение результата...', canvas.width / 2, canvas.height - 50);
                    ctx.globalAlpha = 1.0;
                }
            }

            update();
            requestAnimationFrame(draw);
        }

        canvas.addEventListener('touchstart', (e) => {
            if (gameState === 'MENU') { resetGame(); return; }
            if (gameState === 'GAME_OVER') { gameState = 'MENU'; return; }
            isTouching = true;
            // Управление только если не в переходе
            if (gameState === 'PLAYING') {
                const touch = e.touches[0];
                player.x = touch.clientX - player.width / 2;
                player.y = touch.clientY - player.height / 2;
            }
        }, { passive: false });
        
        canvas.addEventListener('touchend', () => isTouching = false, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameState !== 'PLAYING') return;
            const touch = e.touches[0];
            player.x = touch.clientX - player.width / 2;
            player.y = touch.clientY - player.height / 2;
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;
        }, { passive: false });

        draw();
        tg.ready();
    </script>
</body>
</html>
