<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fly Invaders</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0b0b1a; overflow: hidden; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- Игровые переменные ---
        let score = 0;
        let lives = 3;
        let isGameOver = false;
        let hitEffectTimer = 0; // Для мигания экрана при уроне

        const player = {
            width: 50, height: 50,
            x: canvas.width / 2 - 25, y: canvas.height - 100,
            color: '#00ffcc'
        };

        let bullets = [];
        let enemies = [];
        let stars = [];

        // Создаем звезды для фона
        for (let i = 0; i < 70; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 3 + 1
            });
        }
        
        let lastShootTime = 0;
        const shootDelay = 150; 
        let isTouching = false;

        // --- Перезапуск игры ---
        function resetGame() {
            score = 0;
            lives = 3;
            isGameOver = false;
            bullets = [];
            enemies = [];
            player.x = canvas.width / 2 - player.width / 2;
            player.y = canvas.height - 100;
        }

        // --- Логика ---
        function update() {
            if (isGameOver) return;

            // Движение звезд
            stars.forEach(s => {
                s.y += s.speed;
                if (s.y > canvas.height) {
                    s.y = 0;
                    s.x = Math.random() * canvas.width;
                }
            });

            // Усложнение: чем больше очков, тем чаще спавн
            let spawnRate = 0.02 + (score * 0.0005);
            if (Math.random() < spawnRate) {
                enemies.push({
                    x: Math.random() * (canvas.width - 40),
                    y: -40,
                    width: 40, height: 40,
                    speed: 2 + Math.random() * 3 + (score * 0.05) // Мухи ускоряются
                });
            }

            // Движение пуль
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }

            // Движение врагов
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed;
                
                // Враг улетел за экран (пропустили)
                if (e.y > canvas.height) {
                    lives--;
                    hitEffectTimer = 10;
                    enemies.splice(i, 1);
                    if (lives <= 0) isGameOver = true;
                    continue;
                }

                // Столкновение врага с ИГРОКОМ
                if (e.x < player.x + player.width && e.x + e.width > player.x &&
                    e.y < player.y + player.height && e.y + e.height > player.y) {
                    lives--;
                    hitEffectTimer = 10;
                    enemies.splice(i, 1);
                    if (lives <= 0) isGameOver = true;
                    continue;
                }

                // Столкновение пули с ВРАГОМ
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    if (b.x < e.x + e.width && b.x + b.width > e.x &&
                        b.y < e.y + e.height && b.y + b.height > e.y) {
                        score += 10;
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        break; 
                    }
                }
            }

            // Автострельба
            if (isTouching && Date.now() - lastShootTime > shootDelay) {
                bullets.push({
                    x: player.x + player.width / 2 - 3,
                    y: player.y,
                    width: 6, height: 20,
                    speed: 12
                });
                // Легкая отдача корабля вниз при выстреле
                player.y += 2; 
                lastShootTime = Date.now();
            }
        }

        // --- Отрисовка ---
        function drawPlayer(x, y, w, h) {
            ctx.save();
            ctx.translate(x + w/2, y + h/2);
            ctx.beginPath();
            ctx.moveTo(0, -h/2); // Нос
            ctx.lineTo(w/2, h/2); // Правое крыло
            ctx.lineTo(0, h/4);  // Вырез сзади
            ctx.lineTo(-w/2, h/2); // Левое крыло
            ctx.closePath();
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fill();
            ctx.restore();
        }

        function drawEnemy(x, y, w, h) {
            ctx.save();
            ctx.translate(x + w/2, y + h/2);
            ctx.beginPath();
            ctx.moveTo(0, h/2); // Хвост
            ctx.lineTo(w/2, -h/4); // Правое крыло
            ctx.lineTo(w/4, -h/2); // Правый глаз
            ctx.lineTo(-w/4, -h/2); // Левый глаз
            ctx.lineTo(-w/2, -h/4); // Левое крыло
            ctx.closePath();
            ctx.fillStyle = '#ff3366';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff3366';
            ctx.fill();
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Отрисовка звезд
            ctx.fillStyle = '#ffffff';
            stars.forEach(s => {
                ctx.globalAlpha = s.size / 3;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });
            ctx.globalAlpha = 1.0;

            // Красная вспышка при получении урона
            if (hitEffectTimer > 0) {
                ctx.fillStyle = `rgba(255, 0, 0, ${hitEffectTimer / 30})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                hitEffectTimer--;
            }

            // Отрисовка пуль
            ctx.fillStyle = '#ffff00';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffff00';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.roundRect(b.x, b.y, b.width, b.height, 3);
                ctx.fill();
            });
            ctx.shadowBlur = 0; // Сбрасываем свечение

            // Враги и Игрок
            enemies.forEach(e => drawEnemy(e.x, e.y, e.width, e.height));
            drawPlayer(player.x, player.y, player.width, player.height);

            // --- UI (Интерфейс) ---
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 24px Courier New';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 20, 40);
            
            ctx.textAlign = 'right';
            // Рисуем сердечки жизней
            let livesText = '❤️'.repeat(Math.max(0, lives));
            ctx.fillText(livesText, canvas.width - 20, 40);

            // Экран Game Over
            if (isGameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#ff3366';
                ctx.textAlign = 'center';
                ctx.font = 'bold 48px Courier New';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 24px Courier New';
                ctx.fillText(`Счет: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
                
                ctx.font = '18px Courier New';
                ctx.fillStyle = '#00ffcc';
                ctx.fillText('Тапни, чтобы начать заново', canvas.width / 2, canvas.height / 2 + 80);
            }

            update();
            requestAnimationFrame(draw);
        }

        // --- Управление ---
        canvas.addEventListener('touchstart', (e) => {
            if (isGameOver) {
                resetGame();
                return;
            }
            isTouching = true;
            
            // Центрируем корабль по тапу сразу же
            const touch = e.touches[0];
            player.x = touch.clientX - player.width / 2;
            player.y = touch.clientY - player.height / 2;
        }, { passive: false });
        
        canvas.addEventListener('touchend', () => isTouching = false, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isGameOver) return;
            
            const touch = e.touches[0];
            player.x = touch.clientX - player.width / 2;
            player.y = touch.clientY - player.height / 2;

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;
        }, { passive: false });

        draw();
        tg.ready();
    </script>
</body>
</html>
