<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Shooter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0f0f1a; overflow: hidden; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- Игровые объекты ---
        const player = {
            width: 40, height: 40,
            x: window.innerWidth / 2 - 20, y: window.innerHeight - 80,
            color: '#00ffcc'
        };

        const bullets = [];
        const enemies = [];
        
        // Настройки игры
        let lastShootTime = 0;
        const shootDelay = 200; // задержка между выстрелами (миллисекунды)
        let isTouching = false;

        // --- Игровой цикл ---
        function update() {
            // Спавн врагов (случайным образом)
            if (Math.random() < 0.03) { // 3% шанс спавна каждый кадр
                enemies.push({
                    x: Math.random() * (canvas.width - 30),
                    y: -30,
                    width: 30, height: 30,
                    color: '#ff3366',
                    speed: 2 + Math.random() * 2 // случайная скорость падения
                });
            }

            // Движение пуль
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                // Удаляем пули, улетевшие за экран
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }

            // Движение врагов
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;
                // Удаляем врагов, улетевших за экран
                if (enemies[i].y > canvas.height) enemies.splice(i, 1);
            }

            // Проверка столкновений (Коллизии)
            for (let i = enemies.length - 1; i >= 0; i--) {
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let e = enemies[i];
                    let b = bullets[j];
                    
                    if (e && b &&
                        b.x < e.x + e.width && b.x + b.width > e.x &&
                        b.y < e.y + e.height && b.y + b.height > e.y) {
                        // Попали! Удаляем и врага, и пулю
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        break; 
                    }
                }
            }

            // Автострельба при удержании пальца
            if (isTouching && Date.now() - lastShootTime > shootDelay) {
                bullets.push({
                    x: player.x + player.width / 2 - 2.5, // по центру корабля
                    y: player.y,
                    width: 5, height: 15,
                    color: '#ffff00',
                    speed: 10
                });
                lastShootTime = Date.now();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Отрисовка пуль
            ctx.fillStyle = '#ffff00';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

            // Отрисовка врагов
            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x, e.y, e.width, e.height);
            });

            // Отрисовка игрока
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            update();
            requestAnimationFrame(draw);
        }

        // --- Управление ---
        canvas.addEventListener('touchstart', () => isTouching = true, { passive: false });
        canvas.addEventListener('touchend', () => isTouching = false, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            player.x = touch.clientX - player.width / 2;
            player.y = touch.clientY - player.height / 2;

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;
        }, { passive: false });

        draw();
        tg.ready();
    </script>
</body>
</html>
