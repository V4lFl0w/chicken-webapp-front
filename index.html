<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fly Invaders</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #080812; overflow: hidden; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- Загрузка картинок (с полными URL и защитой от кэша) ---
        const playerImg = new Image();
        playerImg.src = 'https://coral-app-jxzy5.ondigitalocean.app/game/ship.png?v=3';

        const enemyImg = new Image();
        enemyImg.src = 'https://coral-app-jxzy5.ondigitalocean.app/game/diamond.png?v=3';

        // --- Игровые переменные ---
        let score = 0;
        let lives = 3;
        let isGameOver = false;
        let hitEffectTimer = 0;
        let globalSpeedMultiplier = 1;

        const player = {
            width: 70, height: 70,
            x: canvas.width / 2 - 35, y: canvas.height - 120
        };

        let bullets = [];
        let enemies = [];
        let stars = [];
        let particles = []; 

        const starColors = ['#ffffff', '#aaddff', '#ffeedd'];

        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2.5 + 0.5,
                speed: Math.random() * 3 + 0.5,
                color: starColors[Math.floor(Math.random() * starColors.length)]
            });
        }
        
        let lastShootTime = 0;
        const shootDelay = 150; 
        let isTouching = false;

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0,
                    decay: Math.random() * 0.03 + 0.02,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function createEngineTrail(x, y) {
            particles.push({
                x: x + (Math.random() - 0.5) * 10,
                y: y,
                vx: (Math.random() - 0.5) * 2,
                vy: Math.random() * 5 + 2,
                life: 1.0,
                decay: 0.05,
                color: '#ffaa00',
                size: Math.random() * 5 + 2
            });
        }

        function resetGame() {
            score = 0;
            lives = 3;
            isGameOver = false;
            globalSpeedMultiplier = 1;
            bullets = [];
            enemies = [];
            particles = [];
            player.x = canvas.width / 2 - player.width / 2;
            player.y = canvas.height - 120;
        }

        function update() {
            if (isGameOver) return;

            globalSpeedMultiplier = 1 + Math.floor(score / 100) * 0.15;

            stars.forEach(s => {
                s.y += s.speed * (globalSpeedMultiplier * 0.5);
                if (s.y > canvas.height) {
                    s.y = 0;
                    s.x = Math.random() * canvas.width;
                }
            });

            createEngineTrail(player.x + player.width / 2, player.y + player.height - 10);

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }

            let spawnRate = 0.02 + (globalSpeedMultiplier * 0.005);
            if (Math.random() < spawnRate) {
                enemies.push({
                    x: Math.random() * (canvas.width - 50),
                    y: -50,
                    width: 50, height: 50,
                    speed: (2 + Math.random() * 3) * globalSpeedMultiplier
                });
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed;
                
                if (e.y > canvas.height) {
                    enemies.splice(i, 1);
                    continue;
                }

                let hitPadding = 10;
                if (e.x + hitPadding < player.x + player.width - hitPadding && 
                    e.x + e.width - hitPadding > player.x + hitPadding &&
                    e.y + hitPadding < player.y + player.height - hitPadding && 
                    e.y + e.height - hitPadding > player.y + hitPadding) {
                    lives--;
                    hitEffectTimer = 10;
                    createExplosion(player.x + player.width/2, player.y + player.height/2, '#00ffcc');
                    enemies.splice(i, 1);
                    if (lives <= 0) isGameOver = true;
                    continue;
                }

                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    if (b.x < e.x + e.width && b.x + b.width > e.x &&
                        b.y < e.y + e.height && b.y + b.height > e.y) {
                        score += 10;
                        createExplosion(e.x + e.width/2, e.y + e.height/2, '#ff3366');
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        break; 
                    }
                }
            }

            if (isTouching && Date.now() - lastShootTime > shootDelay) {
                bullets.push({
                    x: player.x + player.width / 2 - 3,
                    y: player.y + 10,
                    width: 6, height: 20,
                    speed: 12
                });
                player.y += 1;
                lastShootTime = Date.now();
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(8, 8, 18, 0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(s => {
                ctx.fillStyle = s.color;
                ctx.globalAlpha = s.size / 3;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });
            ctx.globalAlpha = 1.0;

            if (hitEffectTimer > 0) {
                ctx.fillStyle = `rgba(255, 0, 0, ${hitEffectTimer / 30})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                hitEffectTimer--;
            }

            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#ffff00';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffff00';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.roundRect(b.x, b.y, b.width, b.height, 3);
                ctx.fill();
            });
            ctx.shadowBlur = 0;

            // БЕЗОПАСНАЯ ОТРИСОВКА ВРАГОВ
            enemies.forEach(e => {
                if (enemyImg.complete && enemyImg.naturalHeight !== 0) {
                    ctx.drawImage(enemyImg, e.x, e.y, e.width, e.height);
                } else {
                    ctx.fillStyle = '#ff3366'; // Красный квадрат, если грузится
                    ctx.fillRect(e.x, e.y, e.width, e.height);
                }
            });

            // БЕЗОПАСНАЯ ОТРИСОВКА ИГРОКА
            if (!isGameOver || hitEffectTimer > 0) {
                if (playerImg.complete && playerImg.naturalHeight !== 0) {
                    ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
                } else {
                    ctx.fillStyle = '#00ffcc'; // Бирюзовый квадрат, если грузится
                    ctx.fillRect(player.x, player.y, player.width, player.height);
                }
            }

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 24px Courier New';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 20, 40);
            
            ctx.textAlign = 'right';
            let livesText = '❤️'.repeat(Math.max(0, lives));
            ctx.fillText(livesText, canvas.width - 20, 40);

            if (isGameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff3366';
                ctx.textAlign = 'center';
                ctx.font = 'bold 48px Courier New';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 24px Courier New';
                ctx.fillText(`Счет: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
                ctx.font = '18px Courier New';
                ctx.fillStyle = '#00ffcc';
                ctx.fillText('Тапни, чтобы начать заново', canvas.width / 2, canvas.height / 2 + 80);
            }

            update();
            requestAnimationFrame(draw);
        }

        canvas.addEventListener('touchstart', (e) => {
            if (isGameOver) {
                resetGame();
                return;
            }
            isTouching = true;
            const touch = e.touches[0];
            player.x = touch.clientX - player.width / 2;
            player.y = touch.clientY - player.height / 2;
        }, { passive: false });
        
        canvas.addEventListener('touchend', () => isTouching = false, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isGameOver) return;
            const touch = e.touches[0];
            player.x = touch.clientX - player.width / 2;
            player.y = touch.clientY - player.height / 2;
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;
        }, { passive: false });

        draw();
        tg.ready();
    </script>
</body>
</html>
